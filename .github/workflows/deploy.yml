name: Deploy proxy
# Production deploy of the agent model proxy (services/agent-model-proxy).
#
# Security model (see the deploy-security design):
#  - Fires ONLY on a human-cut `deploy-v*` tag. Agents cannot push tags, and the `production`
#    environment's deployment policy admits only `deploy-v*` tags — so nothing deploys without an
#    affirmative human promotion (the allowlist wall).
#  - `production` also carries a required-reviewer gate: a maintainer approves each deployment.
#  - The code is human-promoted AND human-reviewed (services/** is a human_required_path), so the
#    build here runs trusted code — no build/publish split needed.
#  - Egress is locked to npm + Cloudflare, so the scoped deploy token cannot be exfiltrated to any
#    other host. The token itself is scoped to Workers-edit on this one worker (set as the
#    CLOUDFLARE_API_TOKEN environment secret), so even a leak can do nothing but redeploy this worker.
#  - Backstop (outside this repo's trust loop): hard provider-side spend caps + instant Cloudflare
#    rollback bound the worst case of a bad deploy.
on:
  push:
    tags: ['deploy-v*']
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Lock down egress (the scoped deploy token must not leave to a non-Cloudflare host)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            api.cloudflare.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
          no-cache: true # no restored cache can poison a privileged tag-publish deploy
      - name: Install proxy deps (frozen)
        working-directory: services/agent-model-proxy
        run: bun install --frozen-lockfile
      - name: Deploy (wrangler — pinned in the lockfile, integrity-verified by check:security)
        working-directory: services/agent-model-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: bun run deploy # resolves the local pinned wrangler@4.104.0 from the frozen install above
