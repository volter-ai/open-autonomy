name: upgrade
on:
  workflow_dispatch: {}
permissions: { contents: write, id-token: write, pull-requests: write, checks: read }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      OPEN_AUTONOMY_TEMPLATE_REPO: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REPO || 'volter-ai/open-autonomy' }}
      OPEN_AUTONOMY_TEMPLATE_REF: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REF || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/agent-upgrade.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: upgrade-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
