name: supply-chain
# C7 as a blocking required check on bot PRs. repository_dispatch fixes the workflow revision to the
# accepted default branch. Status-writing jobs never check out the candidate; the read-only scan uses the
# trusted default-branch analyzer and executes no candidate package lifecycle.
on:
  repository_dispatch:
    types: [open-autonomy-supply-chain]
permissions:
  contents: read
jobs:
  publish-pending:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Bind exact PR head and post pending
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state=pending -f context=supply-chain \
            -f description="trusted lockfile integrity + advisory scan running" >/dev/null

  scan:
    needs: publish-pending
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Check out candidate without retaining a repository credential
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.client_payload.sha }}
          path: candidate
          persist-credentials: false
      - name: Check out trusted analyzer from the default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Scan candidate lockfiles without executing candidate code
        run: (cd candidate && bun ../trusted/scripts/check-supply-chain.ts)

  publish-result:
    needs: [publish-pending, scan]
    if: ${{ always() && needs.publish-pending.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Re-bind exact PR head and publish immutable scan result
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
          SCAN_RESULT: ${{ needs.scan.result }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          state=failure; desc="supply-chain gate failed (integrity or advisory)"
          if [ "$SCAN_RESULT" = success ]; then
            state=success; desc="lockfiles registry-pinned + no known advisories"
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" -f context=supply-chain -f description="$desc" >/dev/null
          test "$state" = success
