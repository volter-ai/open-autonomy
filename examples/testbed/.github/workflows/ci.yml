name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Testbed CI-failure fixture
        # Deterministic, testbed-only failure condition for the retry-ci-failure scenario.
        # A develop run that adds `.testbed/force-ci-failure` (per its seed issue) makes this
        # required check fail for real, exercising the CI retry loop and its stop condition.
        run: |
          if [ -f .testbed/force-ci-failure ]; then
            echo "Testbed fixture: forced CI failure (.testbed/force-ci-failure present)" >&2
            exit 1
          fi
      - run: bun install --frozen-lockfile || bun install
      - run: bun run check
