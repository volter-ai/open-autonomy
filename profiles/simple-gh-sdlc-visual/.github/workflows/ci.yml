name: ci
# The `ci` required check — wires ztrack (an adopter dev-dependency; this profile does not pin a version
# here, see README.md's "ztrack version floor") into a profile workflow: typecheck + `ztrack check` against
# the committed backlog (`.volter/tracker/markdown/` — the single, committed, gitignore-free source of
# truth declared in `.volter/tracker-config.json`'s `sources`; ztrack reads it directly with no
# import/export step and no dependency on any gitignored local store or doc-source — the sqlite/local-store
# files remain gitignored derived cache, never authoritative).
#
# Same two-trigger pattern as security.yml / security-gate.yml (see that file's comment): a HUMAN-authored
# PR fires `pull_request` and this job posts `ci` itself (Actions' default status for a job named `ci` on a
# required check). A BOT-authored PR (agent-propose.ts) fires no `pull_request` (GITHUB_TOKEN
# anti-recursion), so agent-propose.ts DISPATCHES this workflow directly with `sha` + `pr` inputs and this
# workflow posts a `ci` commit status on that sha explicitly via `gh api .../statuses`. One logical check,
# two trigger paths depending on PR authorship.
#
# Deliberately does NOT reimplement PR #174's `undeliverableEventAgents` compile-time trigger-support check
# (that guard lives in the compiler itself — `open-autonomy lint`/`compile` refuses a profile with an
# undeliverable event trigger before writing anything — so it is not this workflow's job to re-check it at
# PR time) and carries no skill-drift guard (this profile ships one skill copy per agent, under
# `profiles/simple-gh-sdlc-visual/skills/`, not a second `.codex/skills` mirror to keep in sync).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "head SHA to gate + post the ci status on (bot-PR path only)"
        required: false
        type: string
      pr:
        description: "PR number (context only)"
        required: false
        type: string
permissions:
  contents: read
  statuses: write
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.sha || github.event.pull_request.head.sha || github.sha }}
          # fetch-depth: 0 (full history, not the default shallow depth-1 clone): `ztrack check`'s gitWorld
          # verifies cited evidence commits via `git log --all` reachability and resolves each issue's `PR:`
          # value with `git rev-parse --verify <sha>^{commit}` + `merge-base --is-ancestor … main` — none of
          # that can see anything but the tip commit in a shallow clone.
          fetch-depth: 0
      # actions/checkout only ever fetches the ref given above (the PR head sha/branch) — even at
      # fetch-depth 0 it does NOT fetch `main` as a separate ref, so `main` does not exist in this checkout
      # yet. gitWorld hardcodes the literal ref name `main` for its `merge-base --is-ancestor <sha> main`
      # merged-check — no config knob, so a literal local `main` must exist for `done_requires_merged_pr` to
      # ever resolve true. Fetch + create it explicitly here — except on the `push` trigger (this job's own
      # trigger is `main`), where the checkout is ALREADY the `main` branch and
      # `git fetch origin main:refs/heads/main` errors ("refusing to fetch into branch checked out");
      # `git symbolic-ref` names the currently-checked-out branch, so this only fetches when it's something
      # else (a PR head sha/ref, which is never named `main`).
      - name: Fetch main (ztrack's gitWorld needs a literal local `main` ref to resolve merged-PR checks)
        run: |
          current="$(git symbolic-ref --short -q HEAD || true)"
          if [ "$current" = "main" ]; then
            echo "already on main — nothing to fetch"
          else
            git fetch --no-tags origin main:refs/heads/main
          fi
      # An in-review issue's `PR:` value is the local branch name `agent/issue-<id>` (the simple-gh-sdlc
      # ztrack preset's defaultPrBranches/prBranchesFrom) until the PR merges, at which point the store is
      # updated to the merge-commit sha. Before that, gitWorld's `git rev-parse --verify
      # agent/issue-<id>^{commit}` needs that branch to exist locally — actions/checkout only fetches the
      # ref it was told to check out, never sibling branches. `|| true`: an agent/* branch may not exist yet
      # (draft/ready/no-issue-in-review repo state) — that's not a checkout failure.
      - name: "Fetch agent branches (in-review issues' PR: agent/issue-<id> refs)"
        run: git fetch origin '+refs/heads/agent/*:refs/heads/agent/*' || true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Post pending status (bot-PR dispatch path only)
        if: github.event_name == 'workflow_dispatch' && inputs.sha != ''
        env: { GH_TOKEN: "${{ github.token }}", SHA: "${{ inputs.sha }}" }
        run: gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state=pending -f context=ci -f description="typecheck + ztrack check" >/dev/null
      - name: Install
        run: npm ci
      - name: Typecheck (adopter-defined — a no-op if the app has no "typecheck" script yet)
        id: typecheck
        continue-on-error: true
        run: npm run --if-present typecheck
      - name: ztrack check (the fifth deterministic gate — honest backlog, cited evidence, no fabricated claims)
        id: ztrack
        continue-on-error: true
        run: npx ztrack check
      - name: Post final status (bot-PR dispatch path only — human-PR path relies on the job's own check run)
        if: always() && github.event_name == 'workflow_dispatch' && inputs.sha != ''
        env:
          GH_TOKEN: "${{ github.token }}"
          SHA: "${{ inputs.sha }}"
          TYPECHECK_OUTCOME: "${{ steps.typecheck.outcome }}"
          ZTRACK_OUTCOME: "${{ steps.ztrack.outcome }}"
        run: |
          set +e
          if [ "$TYPECHECK_OUTCOME" = "success" ] && [ "$ZTRACK_OUTCOME" = "success" ]; then
            state=success; desc="typecheck clean + ztrack check passed"
          else
            state=failure; desc="typecheck or ztrack check failed"
          fi
          gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state="$state" -f context=ci -f description="$desc" >/dev/null
          [ "$state" = success ]
      - name: Fail the job if any gate failed (human-PR path — the job's own check run IS the `ci` status)
        if: always()
        env:
          TYPECHECK_OUTCOME: "${{ steps.typecheck.outcome }}"
          ZTRACK_OUTCOME: "${{ steps.ztrack.outcome }}"
        run: |
          [ "$TYPECHECK_OUTCOME" = "success" ] && [ "$ZTRACK_OUTCOME" = "success" ]
