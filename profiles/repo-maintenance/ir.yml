{schema: autonomy.ir.v1,targets: [github],agents: {pm: {skill: open-autonomy-pm,maxConcurrent: 1,config: {capabilities: [issue:comment,issue:label,workflow:dispatch]}},developer: {skill: open-autonomy-developer,maxConcurrent: 1,config: {capabilities: [branch:write,pr:open,pr:update,issue:comment]}},reviewer: {skill: open-autonomy-reviewer,maxConcurrent: 1,config: {capabilities: [pr:comment,pr:review,workflow:dispatch]}},planner: {skill: open-autonomy-planner,maxConcurrent: 1,config: {capabilities: [issue:comment,issue:label,issue:create,issue:update]}},upgrade: {skill: open-autonomy-upgrade,maxConcurrent: 1,config: {capabilities: [pr:open,pr:update]}},strategist: {skill: open-autonomy-strategist,maxConcurrent: 1,config: {capabilities: [pr:open,pr:update]}},strategy_reviewer: {skill: open-autonomy-strategy-reviewer,maxConcurrent: 1,config: {capabilities: [pr:comment,pr:review,workflow:dispatch]}}},workflows: [{name: model-proxy-admin,triggers: [{event: workflow_dispatch,config: {inputs: {action: {description: Admin action to run,required: true,default: status,type: choice,options: [status,run-status,revoke]},run_id: {description: Required for run-status and revoke,required: false,type: string}}}}],raw: "name: Model Proxy Admin\nrun-name: Model Proxy Admin ${{ inputs.action }} ${{ inputs.run_id }}\n\non:\n  workflow_dispatch:\n    inputs:\n      action:\n        description: Admin action to run\n        required: true\n        default: status\n        type: choice\n        options:\n          - status\n          - run-status\n          - revoke\n      run_id:\n        description: Required for run-status and revoke\n        required: false\n        type: string\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\njobs:\n  admin:\n    runs-on: ubuntu-latest\n    timeout-minutes: 5\n    steps:\n      - name: Run model proxy admin action\n        env:\n          ACTION: ${{ inputs.action }}\n          RUN_ID: ${{ inputs.run_id }}\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          set -euo pipefail\n          if [[ -z \"${MODEL_PROXY_URL}\" || -z \"${MODEL_PROXY_ADMIN_TOKEN}\" ]]; then\n            echo \"MODEL_PROXY_URL and MODEL_PROXY_ADMIN_TOKEN are required\"\n            exit 1\n          fi\n\n          case \"$ACTION\" in\n            status)\n              curl -fsS \\\n                -H \"x-admin-token: ${MODEL_PROXY_ADMIN_TOKEN}\" \\\n                \"${MODEL_PROXY_URL}/admin/limits/status\" | jq .\n              ;;\n            run-status)\n              if [[ -z \"$RUN_ID\" ]]; then\n                echo \"run_id is required for run-status\"\n                exit 1\n              fi\n              curl -fsS \\\n                -H \"x-admin-token: ${MODEL_PROXY_ADMIN_TOKEN}\" \\\n                \"${MODEL_PROXY_URL}/admin/runs/${RUN_ID}\" | jq .\n              ;;\n            revoke)\n              if [[ -z \"$RUN_ID\" ]]; then\n                echo \"run_id is required for revoke\"\n                exit 1\n              fi\n              curl -fsS -X POST \\\n                -H \"x-admin-token: ${MODEL_PROXY_ADMIN_TOKEN}\" \\\n                \"${MODEL_PROXY_URL}/admin/runs/${RUN_ID}/revoke\" | jq .\n              ;;\n            *)\n              echo \"unknown action: $ACTION\"\n              exit 1\n              ;;\n          esac\n",config: {}},{name: public-agent-review,triggers: [{event: issue_comment,config: {types: [created]}},{event: pull_request_target,config: {types: [opened,synchronize,reopened,ready_for_review]}},{event: workflow_dispatch,config: {inputs: {pr_number: {description: Pull request number to review,required: true,type: string}}}}],raw: "name: Public Agent Review\nrun-name: Public Agent Review #${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}\n\non:\n  issue_comment:\n    types: [created]\n  pull_request_target:\n    types: [opened, synchronize, reopened, ready_for_review]\n  workflow_dispatch:\n    inputs:\n      pr_number:\n        description: Pull request number to review\n        required: true\n        type: string\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\nconcurrency:\n  group: public-agent-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}\n  cancel-in-progress: false\n\njobs:\n  review:\n    if: >-\n      (github.event_name == 'issue_comment' &&\n        github.event.issue.pull_request &&\n        startsWith(github.event.comment.body, '/agent review')) ||\n      (github.event_name == 'pull_request_target' &&\n        startsWith(github.event.pull_request.head.ref, 'agent/issue-')) ||\n      github.event_name == 'workflow_dispatch'\n    runs-on: ubuntu-latest\n    timeout-minutes: 20\n    permissions:\n      contents: write\n      issues: write\n      pull-requests: write\n      checks: read\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          persist-credentials: false\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Authorize review comment actor\n        if: github.event_name == 'issue_comment'\n        env:\n          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}\n        run: |\n          case \"$COMMENT_AUTHOR_ASSOCIATION\" in\n            OWNER|MEMBER|COLLABORATOR)\n              ;;\n            *)\n              echo \"Unauthorized review actor association: ${COMMENT_AUTHOR_ASSOCIATION:-unknown}\"\n              exit 1\n              ;;\n          esac\n\n      - name: Prepare review target\n        id: target\n        env:\n          GH_TOKEN: ${{ github.token }}\n          EVENT_NAME: ${{ github.event_name }}\n          COMMENT_PR: ${{ github.event.issue.number }}\n          EVENT_PR: ${{ github.event.pull_request.number || inputs.pr_number }}\n        run: |\n          mkdir -p .agent-run\n          pr=\"${EVENT_PR:-$COMMENT_PR}\"\n          gh issue view \"$pr\" \\\n            --json number,title,body,author \\\n            --jq '{number,title,body,user:{login:.author.login}}' \\\n            > .agent-run/issue.json\n          gh issue view \"$pr\" --json labels,comments > .agent-run/merge-blockers.json\n          gh issue view \"$pr\" --json comments --jq '.comments' > .agent-run/pr-comments.json\n          if [[ \"$EVENT_NAME\" == \"issue_comment\" || \"$EVENT_NAME\" == \"workflow_dispatch\" ]]; then\n            gh pr view \"$pr\" \\\n              --json number,headRefName,headRepositoryOwner,headRepository,isCrossRepository,baseRefName \\\n              > .agent-run/pr.json\n            bun scripts/public-agent-target.ts \\\n              --event \"$GITHUB_EVENT_PATH\" \\\n              --pr .agent-run/pr.json \\\n              --out .agent-run/target.json || true\n          else\n            bun scripts/public-agent-target.ts \\\n              --event \"$GITHUB_EVENT_PATH\" \\\n              --out .agent-run/target.json || true\n          fi\n          head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n          jq --arg head_sha \"$head_sha\" '. + {head_sha: $head_sha}' .agent-run/target.json > .agent-run/target-with-head.json\n          mv .agent-run/target-with-head.json .agent-run/target.json\n\n      - name: Stop if target cannot be auto-reviewed\n        if: steps.target.outputs.can_develop != 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          reason=\"$(jq -r '.reason // \"This pull request is not an autonomous agent branch.\"' .agent-run/target.json)\"\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          gh issue comment \"$pr\" --body \"Agent review requires human review: ${reason}\"\n          exit 1\n\n      - name: Read pull request diff\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          gh pr diff \"$pr\" > .agent-run/diff.patch\n\n      - name: Read control files\n        run: |\n          bun scripts/public-agent-control-files.ts --out .agent-run/control-files.json\n\n      - name: Read current CI state\n        id: ci\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          for attempt in $(seq 1 12); do\n            gh pr checks \"$pr\" --json name,state,bucket,completedAt > .agent-run/checks.json || echo '[]' > .agent-run/checks.json\n            if [[ \"$(jq 'length' .agent-run/checks.json)\" == \"0\" ]]; then\n              bun scripts/public-agent-ci.ts --checks .agent-run/checks.json --out .agent-run/ci.json || true\n              exit 0\n            fi\n            if bun scripts/public-agent-ci.ts --checks .agent-run/checks.json --out .agent-run/ci.json; then\n              exit 0\n            fi\n            decision=\"$(jq -r '.decision' .agent-run/ci.json)\"\n            reason=\"$(jq -r '.reason' .agent-run/ci.json)\"\n            if [[ \"$decision\" != \"wait\" && \"$reason\" != *\"missing\"* ]]; then\n              exit 0\n            fi\n            sleep 20\n          done\n          exit 0\n\n      - name: Dispatch CI fix or stop on non-passing CI\n        if: steps.ci.outputs.decision != 'pass'\n        id: ci_followup\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          decision=\"$(jq -r '.decision' .agent-run/ci.json)\"\n          reason=\"$(jq -r '.reason' .agent-run/ci.json)\"\n          if [[ \"$decision\" == \"develop_retry\" ]]; then\n            bun scripts/public-agent-loop-budget.ts \\\n              --kind ci \\\n              --reason \"$reason\" \\\n              --max-attempts \"${{ vars.PUBLIC_AGENT_MAX_CI_RETRIES || '2' }}\" \\\n              --issue-comments .agent-run/pr-comments.json \\\n              --pr-comments .agent-run/pr-comments.json \\\n              --out .agent-run/loop-budget.json\n            loop_decision=\"$(jq -r '.decision' .agent-run/loop-budget.json)\"\n            loop_reason=\"$(jq -r '.reason' .agent-run/loop-budget.json)\"\n            if [[ \"$loop_decision\" == \"retry\" ]]; then\n              {\n                echo \"/agent develop\"\n                echo\n                jq -r '.comment' .agent-run/loop-budget.json\n              } > /tmp/public-agent-ci-retry.md\n              gh issue comment \"$pr\" --body-file /tmp/public-agent-ci-retry.md\n              echo \"decision=retry\" >> \"$GITHUB_OUTPUT\"\n              exit 0\n            fi\n            gh issue comment \"$pr\" --body \"Agent review blocked: ${loop_reason}. ${reason}\"\n            echo \"decision=${loop_decision}\" >> \"$GITHUB_OUTPUT\"\n            exit 0\n          fi\n          if [[ \"$decision\" == \"human_required\" ]]; then\n            message=\"Agent review requires human review: CI gate is ${decision}. ${reason}\"\n          else\n            message=\"Agent review blocked: CI gate is ${decision}. ${reason}\"\n          fi\n          cat > /tmp/public-agent-ci-human.md <<EOF\n          ${message}\n          EOF\n          gh issue comment \"$pr\" --body-file /tmp/public-agent-ci-human.md\n          echo \"decision=${decision}\" >> \"$GITHUB_OUTPUT\"\n          exit 0\n\n      - name: Mint reviewer model token\n        if: steps.ci.outputs.decision == 'pass'\n        id: review_mint\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}\" \\\n            --max-requests \"2\" \\\n            --purpose review\n\n      - name: Review pull request\n        if: steps.ci.outputs.decision == 'pass'\n        id: agent_review\n        continue-on-error: true\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_TOKEN: ${{ steps.review_mint.outputs.token }}\n        run: |\n          bun scripts/public-agent-review.ts \\\n            --diff .agent-run/diff.patch \\\n            --ci .agent-run/ci.json \\\n            --control-files .agent-run/control-files.json \\\n            --provider \"${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'openai' }}\" \\\n            --model \"${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --out .agent-run/review.json\n\n      - name: Complete reviewer run\n        if: always() && steps.review_mint.outputs.run_id != '' && steps.ci.outputs.decision == 'pass'\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          curl -fsS -X POST \\\n            -H \"x-admin-token: ${MODEL_PROXY_ADMIN_TOKEN}\" \\\n            \"${MODEL_PROXY_URL}/admin/runs/${{ steps.review_mint.outputs.run_id }}/revoke\"\n\n      - name: Decide merge\n        if: steps.ci.outputs.decision == 'pass'\n        id: merge_gate\n        continue-on-error: true\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          reviewed_head_sha=\"$(jq -r '.head_sha // empty' .agent-run/target.json)\"\n          current_head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n          bun scripts/public-agent-merge-gate.ts \\\n            --target .agent-run/target.json \\\n            --ci .agent-run/ci.json \\\n            --review .agent-run/review.json \\\n            --blockers .agent-run/merge-blockers.json \\\n            --reviewed-head-sha \"$reviewed_head_sha\" \\\n            --current-head-sha \"$current_head_sha\" \\\n            --out .agent-run/merge-gate.json\n\n      - name: Publish review decision\n        if: always() && steps.ci.outputs.decision == 'pass' && steps.agent_review.conclusion != 'skipped'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          verdict=\"$(jq -r '.verdict // \"failed\"' .agent-run/review.json 2>/dev/null || echo failed)\"\n          risk=\"$(jq -r '.risk // \"unknown\"' .agent-run/review.json 2>/dev/null || echo unknown)\"\n          summary=\"$(jq -r '.summary // \"Reviewer did not produce a valid verdict.\"' .agent-run/review.json 2>/dev/null || echo \"Reviewer did not produce a valid verdict.\")\"\n          gate=\"$(jq -r '.decision // \"human_required\"' .agent-run/merge-gate.json 2>/dev/null || echo human_required)\"\n          reason=\"$(jq -r '.reason // \"Merge gate did not pass.\"' .agent-run/merge-gate.json 2>/dev/null || echo \"Merge gate did not pass.\")\"\n          cat > /tmp/public-agent-review.md <<EOF\n          Agent review: ${verdict}\n          Risk: ${risk}\n          Merge gate: ${gate}\n\n          ${summary}\n\n          ${reason}\n          EOF\n          gh issue comment \"$pr\" --body-file /tmp/public-agent-review.md\n\n      - name: Retry safe review failures\n        if: steps.merge_gate.outputs.decision == 'develop_retry'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          reason=\"$(jq -r '.reason // \"review did not pass\"' .agent-run/merge-gate.json)\"\n          bun scripts/public-agent-loop-budget.ts \\\n            --kind review \\\n            --reason \"$reason\" \\\n            --max-attempts \"${{ vars.PUBLIC_AGENT_MAX_REVIEW_RETRIES || '2' }}\" \\\n            --issue-comments .agent-run/pr-comments.json \\\n            --pr-comments .agent-run/pr-comments.json \\\n            --out .agent-run/loop-budget.json\n          loop_decision=\"$(jq -r '.decision' .agent-run/loop-budget.json)\"\n          loop_reason=\"$(jq -r '.reason' .agent-run/loop-budget.json)\"\n          if [[ \"$loop_decision\" == \"retry\" ]]; then\n            {\n              echo \"/agent develop\"\n              echo\n              jq -r '.comment' .agent-run/loop-budget.json\n            } > /tmp/public-agent-review-retry.md\n            gh issue comment \"$pr\" --body-file /tmp/public-agent-review-retry.md\n            exit 0\n          fi\n          gh issue comment \"$pr\" --body \"Agent review blocked: ${loop_reason}. ${reason}\"\n\n      - name: Auto-merge low-risk passing review\n        if: steps.merge_gate.outputs.decision == 'merge'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          expected_head_sha=\"$(jq -r '.head_sha // empty' .agent-run/target.json)\"\n          current_head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n          if [[ -z \"$expected_head_sha\" || \"$current_head_sha\" != \"$expected_head_sha\" ]]; then\n            gh issue comment \"$pr\" --body \"Agent auto-merge skipped: PR head changed after review. Expected ${expected_head_sha:-unknown}; current ${current_head_sha:-unknown}.\"\n            exit 1\n          fi\n          for attempt in {1..20}; do\n            mergeable=\"$(gh pr view \"$pr\" --json mergeable --jq .mergeable)\"\n            state=\"$(gh pr view \"$pr\" --json mergeStateStatus --jq .mergeStateStatus)\"\n            if [[ \"$mergeable\" == \"MERGEABLE\" && \"$state\" != \"UNKNOWN\" && \"$state\" != \"DIRTY\" && \"$state\" != \"BLOCKED\" ]]; then\n              break\n            fi\n            if [[ \"$attempt\" == \"20\" ]]; then\n              gh issue comment \"$pr\" --body \"Agent auto-merge skipped: GitHub mergeability did not become ready after waiting. mergeable=${mergeable}; state=${state}.\"\n              exit 1\n            fi\n            sleep 3\n          done\n          head_ref=\"$(gh pr view \"$pr\" --json headRefName --jq .headRefName)\"\n          for merge_attempt in {1..5}; do\n            if gh api \\\n              --method PUT \\\n              \"repos/${GITHUB_REPOSITORY}/pulls/${pr}/merge\" \\\n              -f merge_method=squash \\\n              -f sha=\"$expected_head_sha\" \\\n              -f commit_title=\"agent: merge PR #${pr}\" \\\n              -f commit_message=\"Merged by deterministic public-agent merge gate after low-risk reviewer pass and required CI pass.\" \\\n              > .agent-run/merge-result.json 2>.agent-run/merge-error.log; then\n              gh api --method DELETE \"repos/${GITHUB_REPOSITORY}/git/refs/heads/${head_ref}\" || true\n              exit 0\n            fi\n            if grep -Eq \"(Base branch was modified|Head branch was modified)\" .agent-run/merge-error.log && [[ \"$merge_attempt\" != \"5\" ]]; then\n              sleep 5\n              continue\n            fi\n            cat .agent-run/merge-error.log\n            exit 1\n          done\n",config: {}},{name: open-autonomy-governance-report,triggers: [{cron: 43 6 * * 1},{event: workflow_dispatch}],raw: "name: Open Autonomy Governance Report\n\non:\n  schedule:\n    - cron: '43 6 * * 1'\n  workflow_dispatch:\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\njobs:\n  report:\n    runs-on: ubuntu-latest\n    timeout-minutes: 10\n    permissions:\n      contents: read\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Build decision index and report\n        run: |\n          mkdir -p .agent-run/governance\n          bun scripts/public-agent-decision-index.ts \\\n            --out .agent-run/governance/decision-index.json\n          bun scripts/open-autonomy-governance-report.ts \\\n            --index .agent-run/governance/decision-index.json \\\n            --out .agent-run/governance/report.json\n\n      - uses: actions/upload-artifact@v4\n        if: always()\n        with:\n          name: open-autonomy-governance-${{ github.run_id }}\n          path: .agent-run/governance\n          if-no-files-found: warn\n",config: {}},{name: public-agent-pm,triggers: [{cron: "*/30 * * * *"},{event: workflow_dispatch,config: {inputs: {limit: {description: Maximum issues to triage,required: false,default: "10",type: string}}}}],raw: "name: Public Agent PM\n\non:\n  schedule:\n    - cron: '*/30 * * * *'\n  workflow_dispatch:\n    inputs:\n      limit:\n        description: Maximum issues to triage\n        required: false\n        default: '10'\n        type: string\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\nconcurrency:\n  group: public-agent-pm\n  cancel-in-progress: false\n\njobs:\n  triage:\n    runs-on: ubuntu-latest\n    timeout-minutes: 30\n    permissions:\n      contents: read\n      issues: write\n      pull-requests: write\n      actions: write\n      id-token: write\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          persist-credentials: false\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Triage open issues\n        env:\n          GH_TOKEN: ${{ github.token }}\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n          PM_COMMENT_TOKEN: ${{ secrets.PUBLIC_AGENT_TRIGGER_TOKEN || github.token }}\n          PUBLIC_AGENT_PM_LIMIT: ${{ inputs.limit || vars.PUBLIC_AGENT_PM_LIMIT || '10' }}\n          PUBLIC_AGENT_PM_MODEL: ${{ vars.PUBLIC_AGENT_PM_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\n          PUBLIC_AGENT_PM_PROVIDER: ${{ vars.PUBLIC_AGENT_PM_PROVIDER || vars.PUBLIC_AGENT_TRIAGE_PROVIDER || 'openai' }}\n          PUBLIC_AGENT_REPO_PAUSED: ${{ vars.PUBLIC_AGENT_REPO_PAUSED || 'false' }}\n        run: |\n          set -euo pipefail\n          mkdir -p .agent-run/pm\n          gh label create agent-repo-paused --description \"Repo-level autonomous public-agent work is paused\" --color FBCA04 2>/dev/null || true\n          repo_pause_count=\"$(gh issue list --state open --label agent-repo-paused --limit 1 --json number --jq 'length' 2>/dev/null || echo 0)\"\n          if [[ \"$PUBLIC_AGENT_REPO_PAUSED\" == \"true\" || \"$repo_pause_count\" != \"0\" ]]; then\n            echo \"public agent repo pause is enabled; PM sweep skipped\"\n            exit 0\n          fi\n          gh issue list \\\n            --state open \\\n            --search \"is:issue is:open -label:agent-paused -label:agent-repo-paused -label:agent-blocked -label:human-required -label:agent-maintainer-hold -label:needs-info -label:security sort:updated-asc\" \\\n            --limit \"$PUBLIC_AGENT_PM_LIMIT\" \\\n            --json number \\\n            --jq '.[].number' > .agent-run/pm/issues.txt\n\n          gh label create needs-info --description \"Needs more information before autonomous work\" --color D4C5F9 2>/dev/null || true\n          gh label create human-required --description \"Requires maintainer attention before autonomous work\" --color B60205 2>/dev/null || true\n          gh label create duplicate --description \"Potential duplicate issue\" --color CFD3D7 2>/dev/null || true\n          gh label create spam --description \"Likely spam or abuse\" --color 000000 2>/dev/null || true\n          gh label create agent-blocked --description \"Blocks autonomous public-agent development\" --color B60205 2>/dev/null || true\n          gh label create agent-paused --description \"Autonomous public-agent work is paused\" --color FBCA04 2>/dev/null || true\n          gh label create agent-maintainer-hold --description \"Maintainer hold; autonomous development should not start\" --color 5319E7 2>/dev/null || true\n\n          while IFS= read -r number; do\n            if [[ -z \"$number\" ]]; then\n              continue\n            fi\n\n            issue_path=\".agent-run/pm/issue-${number}.json\"\n            issue_raw_path=\".agent-run/pm/issue-raw-${number}.json\"\n            pm_path=\".agent-run/pm/pm-${number}.json\"\n            dispatch_path=\".agent-run/pm/dispatch-${number}.json\"\n            decision_dir=\".agent-run/pm/decisions/issue-${number}\"\n            open_pr_path=\".agent-run/pm/open-pr-${number}.json\"\n            pr_comments_path=\".agent-run/pm/pr-comments-${number}.json\"\n            runs_raw_path=\".agent-run/pm/runs-raw-${number}.json\"\n            runs_path=\".agent-run/pm/runs-${number}.json\"\n            decisions_path=\".agent-run/pm/decisions-${number}.json\"\n            mkdir -p \"$decision_dir\"\n\n            branch=\"agent/issue-${number}\"\n            gh pr list \\\n              --head \"$branch\" \\\n              --state open \\\n              --json number,title,state,url,headRefName,updatedAt \\\n              --jq '.[0] // null' > \"$open_pr_path\"\n            open_pr_number=\"$(jq -r '.number // empty' \"$open_pr_path\")\"\n            if [[ -n \"$open_pr_number\" ]]; then\n              gh pr view \"$open_pr_number\" --json comments --jq '.comments' > \"$pr_comments_path\"\n            else\n              printf '[]\\n' > \"$pr_comments_path\"\n            fi\n\n            gh run list \\\n              --workflow public-agent.yml \\\n              --limit 50 \\\n              --json databaseId,status,conclusion,displayTitle,event,createdAt,updatedAt,url \\\n              > \"$runs_raw_path\"\n            jq --arg issue \"#${number}\" '[.[] | select(.displayTitle | contains($issue))]' \"$runs_raw_path\" > \"$runs_path\"\n            find agent-sessions -path \"*/decisions/*.json\" -type f -print0 2>/dev/null \\\n              | xargs -0 jq -s --argjson issue \"$number\" '[.[] | select(.issue == $issue)] | sort_by(.created_at) | reverse | .[0:20]' \\\n              > \"$decisions_path\" || printf '[]\\n' > \"$decisions_path\"\n\n            gh issue view \"$number\" \\\n              --json number,title,body,author,labels,comments,createdAt,updatedAt \\\n              > \"$issue_raw_path\"\n\n            jq --slurpfile openPr \"$open_pr_path\" --slurpfile prComments \"$pr_comments_path\" --slurpfile runs \"$runs_path\" '{\n                number,\n                title,\n                body,\n                user: {login: .author.login},\n                labels,\n                comments,\n                createdAt,\n                updatedAt,\n                open_agent_pr: (if $openPr[0] == null then null else $openPr[0] + {comments: $prComments[0]} end),\n                agent_runs: $runs[0],\n                previous_decisions: (input)\n              }' \"$issue_raw_path\" \"$decisions_path\" > \"$issue_path\"\n\n            if ! mint_output=\"$(bun scripts/model-proxy-mint.ts \\\n              --issue \"$issue_path\" \\\n              --models \"$PUBLIC_AGENT_PM_MODEL\" \\\n              --max-usd-cents \"${{ vars.PUBLIC_AGENT_PM_MAX_USD_CENTS || '25' }}\" \\\n              --max-requests \"2\" \\\n              --purpose pm 2>&1)\"; then\n              # Lifetime budget exhausted is terminal, not transient: auto-pause the repo (the repo\n              # pause check skips future sweeps) until a sponsorship top-up raises the budget and a\n              # maintainer removes the agent-repo-paused issue/label to resume.\n              if printf '%s' \"$mint_output\" | grep -q 'repo_lifetime_budget_exhausted'; then\n                gh label create agent-repo-paused --color b60205 --description \"Repo-level autonomy pause\" 2>/dev/null || true\n                if [[ \"$(gh issue list --state open --label agent-repo-paused --limit 1 --json number --jq 'length')\" == \"0\" ]]; then\n                  gh issue create --title \"Repo paused: lifetime model budget exhausted\" --label agent-repo-paused \\\n                    --body \"This repository has spent its lifetime model budget and is paused. Top up its budget (sponsorship) via the model proxy, then remove the \\`agent-repo-paused\\` label / close this issue to resume.\" || true\n                fi\n                echo \"lifetime budget exhausted; repo auto-paused\"\n                exit 0\n              fi\n              echo \"::warning::skip issue #${number}: PM token mint failed\"\n              unavailable_reason=\"PM model budget is temporarily unavailable; the PM agent will retry on a later sweep.\"\n              bun scripts/public-agent-decision.ts \\\n                --stage pm_triage \\\n                --issue \"$number\" \\\n                --actor \"${GITHUB_ACTOR}\" \\\n                --decision \"mint_failed\" \\\n                --reason \"PM token mint failed\" \\\n                --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${number}}\" \\\n                --evidence \"issue:${number}\" \\\n                --next-action \"skip\" \\\n                --out-dir \"$decision_dir\"\n              bun scripts/public-agent-dispatcher.ts \\\n                --issue \"$issue_path\" \\\n                --pm-unavailable-reason \"$unavailable_reason\" \\\n                --out \"$dispatch_path\"\n              action=\"$(jq -r '.action' \"$dispatch_path\")\"\n              comment=\"$(jq -r '.comment // empty' \"$dispatch_path\")\"\n              target_number=\"$(jq -r '.target_number // empty' \"$dispatch_path\")\"\n              reason=\"$(jq -r '.reason' \"$dispatch_path\")\"\n              bun scripts/public-agent-decision.ts \\\n                --stage dispatch \\\n                --issue \"$number\" \\\n                --actor \"${GITHUB_ACTOR}\" \\\n                --decision \"$action\" \\\n                --reason \"$reason\" \\\n                --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${number}}\" \\\n                --evidence \"decision:pm_triage,dispatch:${dispatch_path}\" \\\n                --next-action \"$action\" \\\n                --out-dir \"$decision_dir\"\n              if [[ \"$action\" == \"comment\" && -n \"$comment\" ]]; then\n                if ! GH_TOKEN=\"$PM_COMMENT_TOKEN\" gh issue comment \"${target_number:-$number}\" --body \"$comment\"; then\n                  echo \"::warning::skip issue #${number}: failed to write visible PM-unavailable comment\"\n                fi\n              else\n                echo \"skip issue #${number}: ${reason}\"\n              fi\n              continue\n            fi\n            run_id=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^run_id=//p' | tail -1)\"\n            token=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^token=//p' | tail -1)\"\n\n            MODEL_PROXY_TOKEN=\"$token\" bun scripts/public-agent-pm.ts \\\n              --issue \"$issue_path\" \\\n              --provider \"$PUBLIC_AGENT_PM_PROVIDER\" \\\n              --model \"$PUBLIC_AGENT_PM_MODEL\" \\\n              --out \"$pm_path\"\n\n            pm_action=\"$(jq -r '.action' \"$pm_path\")\"\n            pm_risk=\"$(jq -r '.risk' \"$pm_path\")\"\n            pm_reason=\"$(jq -r '.reason' \"$pm_path\")\"\n            bun scripts/public-agent-decision.ts \\\n              --stage pm_triage \\\n              --issue \"$number\" \\\n              --actor \"${GITHUB_ACTOR}\" \\\n              --decision \"$pm_action\" \\\n              --risk \"$pm_risk\" \\\n              --reason \"$pm_reason\" \\\n              --run-id \"$run_id\" \\\n              --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${number}}\" \\\n              --evidence \"issue:${number},pm:${pm_path}\" \\\n              --next-action \"$pm_action\" \\\n              --out-dir \"$decision_dir\"\n\n            if [[ -n \"$run_id\" ]]; then\n              bun scripts/model-proxy-revoke.ts --run-id \"$run_id\" || true\n            fi\n\n            bun scripts/public-agent-dispatcher.ts \\\n              --issue \"$issue_path\" \\\n              --pm \"$pm_path\" \\\n              --out \"$dispatch_path\"\n\n            action=\"$(jq -r '.action' \"$dispatch_path\")\"\n            comment=\"$(jq -r '.comment // empty' \"$dispatch_path\")\"\n            target_number=\"$(jq -r '.target_number // empty' \"$dispatch_path\")\"\n            command=\"$(jq -r '.command // empty' \"$dispatch_path\")\"\n            reason=\"$(jq -r '.reason' \"$dispatch_path\")\"\n            dispatch_args=(\n              --stage dispatch\n              --issue \"$number\"\n              --actor \"${GITHUB_ACTOR}\"\n              --decision \"$action\"\n              --reason \"$reason\"\n              --run-id \"$run_id\"\n              --evidence \"decision:pm_triage,dispatch:${dispatch_path}\"\n              --next-action \"${command:-$action}\"\n              --out-dir \"$decision_dir\"\n            )\n            if [[ \"$(jq -r '.target // empty' \"$dispatch_path\")\" == \"pull_request\" && -n \"$target_number\" ]]; then\n              dispatch_args+=(--pr \"$target_number\" --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${target_number}}\")\n            else\n              dispatch_args+=(--subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${number}}\")\n            fi\n            bun scripts/public-agent-decision.ts \"${dispatch_args[@]}\"\n            case \"$action\" in\n              comment)\n                if [[ -z \"$comment\" ]]; then\n                  echo \"skip issue #${number}: dispatcher selected comment action without comment body\"\n                  continue\n                fi\n                if ! GH_TOKEN=\"$PM_COMMENT_TOKEN\" gh issue comment \"${target_number:-$number}\" --body \"$comment\"; then\n                  echo \"::warning::skip issue #${number}: failed to write visible command comment for target ${target_number:-$number}\"\n                  continue\n                fi\n                case \"$pm_action\" in\n                  develop|review)\n                    gh issue edit \"$number\" --remove-label needs-info || true\n                    ;;\n                  needs_info)\n                    gh issue edit \"$number\" --add-label needs-info || true\n                    ;;\n                  human_required)\n                    gh issue edit \"$number\" --add-label human-required --add-label agent-blocked || true\n                    ;;\n                  duplicate)\n                    gh issue edit \"$number\" --add-label duplicate || true\n                    ;;\n                  spam)\n                    gh issue edit \"$number\" --add-label spam --add-label agent-blocked || true\n                    ;;\n                esac\n                case \"$command\" in\n                  \"/agent develop\")\n                    gh workflow run public-agent.yml \\\n                      --ref \"${GITHUB_REF_NAME}\" \\\n                      -f issue_number=\"$number\" \\\n                      -f command=\"$command\"\n                    ;;\n                  \"/agent review\")\n                    gh workflow run public-agent-review.yml \\\n                      --ref \"${GITHUB_REF_NAME}\" \\\n                      -f pr_number=\"${target_number}\"\n                    ;;\n                esac\n                ;;\n              *)\n                echo \"skip issue #${number}: ${reason}\"\n                ;;\n            esac\n          done < .agent-run/pm/issues.txt\n\n      - uses: actions/upload-artifact@v4\n        if: always()\n        with:\n          name: public-agent-pm-${{ github.run_id }}\n          path: .agent-run/pm\n          if-no-files-found: warn\n",config: {}},{name: open-autonomy-upgrade,triggers: [{event: workflow_dispatch,config: {inputs: {apply: {description: Open an upgrade pull request,required: false,default: "false",type: choice,options: ["false","true"]}}}}],raw: "name: Open Autonomy Upgrade\n\non:\n  workflow_dispatch:\n    inputs:\n      apply:\n        description: Open an upgrade pull request\n        required: false\n        default: 'false'\n        type: choice\n        options:\n          - 'false'\n          - 'true'\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n  OPEN_AUTONOMY_TEMPLATE_REPO: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REPO || 'volter-ai/open-autonomy' }}\n  OPEN_AUTONOMY_TEMPLATE_REF: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REF || 'main' }}\n\njobs:\n  upgrade:\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    permissions:\n      contents: write\n      pull-requests: write\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Resolve upgrade template\n        id: template\n        run: |\n          set -euo pipefail\n          mkdir -p .agent-run\n          if [[ -d templates/self-driving-repo ]]; then\n            echo \"path=templates/self-driving-repo\" >> \"$GITHUB_OUTPUT\"\n            exit 0\n          fi\n          git clone --depth 1 --branch \"$OPEN_AUTONOMY_TEMPLATE_REF\" \\\n            \"https://github.com/${OPEN_AUTONOMY_TEMPLATE_REPO}.git\" \\\n            .agent-run/open-autonomy-template\n          echo \"path=.agent-run/open-autonomy-template/templates/self-driving-repo\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Build upgrade plan\n        run: |\n          mkdir -p .agent-run/upgrade\n          bun scripts/open-autonomy-upgrade.ts \\\n            --template \"${{ steps.template.outputs.path }}\" \\\n            --target . \\\n            --out .agent-run/upgrade/plan.json\n\n      - name: Apply upgrade and open PR\n        if: inputs.apply == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          changes=\"$(jq '.changes | length' .agent-run/upgrade/plan.json)\"\n          if [[ \"$changes\" == \"0\" ]]; then\n            echo \"No upgrade changes to apply.\"\n            exit 0\n          fi\n          branch=\"open-autonomy/upgrade-${GITHUB_RUN_ID}\"\n          git config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\n          git config user.name \"github-actions[bot]\"\n          git checkout -b \"$branch\"\n          bun scripts/open-autonomy-upgrade.ts \\\n            --template \"${{ steps.template.outputs.path }}\" \\\n            --target . \\\n            --apply \\\n            --out .agent-run/upgrade/plan-applied.json\n          git add AGENTS.md VERSION .open-autonomy .github/workflows scripts docs\n          git commit -m \"chore: upgrade open-autonomy template\"\n          git push --set-upstream origin \"$branch\"\n          jq -r '.migration_notes[]' .agent-run/upgrade/plan.json > .agent-run/upgrade/body.md\n          gh pr create \\\n            --title \"chore: upgrade open-autonomy template\" \\\n            --body-file .agent-run/upgrade/body.md \\\n            --base \"${GITHUB_REF_NAME}\" \\\n            --head \"$branch\"\n\n      - uses: actions/upload-artifact@v4\n        if: always()\n        with:\n          name: open-autonomy-upgrade-${{ github.run_id }}\n          path: .agent-run/upgrade\n          if-no-files-found: warn\n",config: {}},{name: public-agent-strategy-review,triggers: [{event: workflow_dispatch,config: {inputs: {pr: {description: Strategist PR number to ratify,required: true,type: string}}}},{event: issue_comment,config: {types: [created]}}],raw: "name: Open Autonomy Strategy Review\n\non:\n  workflow_dispatch:\n    inputs:\n      pr:\n        description: Strategist PR number to ratify\n        required: true\n        type: string\n  issue_comment:\n    types: [created]\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\njobs:\n  strategy-review:\n    # Run on explicit dispatch, a \"/agent strategy-review\" comment (model review), or a maintainer\n    # \"/agent ratify\" comment (human-in-the-loop approval of a proposal the reviewer escalated).\n    if: >-\n      github.event_name == 'workflow_dispatch' ||\n      (github.event.issue.pull_request != null &&\n       (startsWith(github.event.comment.body, '/agent strategy-review') ||\n        startsWith(github.event.comment.body, '/agent ratify')))\n    runs-on: ubuntu-latest\n    timeout-minutes: 20\n    permissions:\n      contents: write\n      pull-requests: write\n      issues: write\n      id-token: write\n      statuses: write\n    steps:\n      - name: Resolve PR number\n        id: pr\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          if [ \"${{ github.event_name }}\" = \"workflow_dispatch\" ]; then\n            echo \"number=${{ inputs.pr }}\" >> \"$GITHUB_OUTPUT\"\n          else\n            echo \"number=${{ github.event.issue.number }}\" >> \"$GITHUB_OUTPUT\"\n          fi\n\n      # Mode: \"ratify\" is a maintainer's human-in-the-loop approval (overrides the model verdict,\n      # but NOT the deterministic governance guard); anything else runs the model review.\n      - name: Determine mode\n        id: mode\n        run: |\n          case \"${{ github.event_name }}|${{ github.event.comment.body }}\" in\n            \"workflow_dispatch|\"*) echo \"mode=review\" >> \"$GITHUB_OUTPUT\" ;;\n            *\"|/agent ratify\"*)\n              case \"${{ github.event.comment.author_association }}\" in\n                OWNER|MEMBER|COLLABORATOR) echo \"mode=ratify\" >> \"$GITHUB_OUTPUT\" ;;\n                *) echo \"::error::only a maintainer (OWNER/MEMBER/COLLABORATOR) may /agent ratify\"; exit 1 ;;\n              esac ;;\n            *) echo \"mode=review\" >> \"$GITHUB_OUTPUT\" ;;\n          esac\n\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Load PR diff and metadata\n        id: load\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          pr=\"${{ steps.pr.outputs.number }}\"\n          mkdir -p .agent-run/strategy-review\n          gh pr view \"$pr\" --json number,headRefName,headRefOid,labels,body \\\n            > .agent-run/strategy-review/pr.json\n          # Strategy review only applies to strategist-authored proposals.\n          if ! jq -e '.labels[]?.name == \"origin:strategist\"' .agent-run/strategy-review/pr.json >/dev/null; then\n            echo \"not_strategist=true\" >> \"$GITHUB_OUTPUT\"\n            echo \"PR #$pr is not a strategist proposal; skipping.\"\n            exit 0\n          fi\n          gh pr diff \"$pr\" --name-only > .agent-run/strategy-review/changed.txt\n          gh pr diff \"$pr\" > .agent-run/strategy-review/roadmap.diff\n          jq -r '.body // \"\"' .agent-run/strategy-review/pr.json > .agent-run/strategy-review/proposal.txt\n          jq -r '.headRefName' .agent-run/strategy-review/pr.json > .agent-run/strategy-review/branch.txt\n          echo \"head_sha=$(jq -r '.headRefOid' .agent-run/strategy-review/pr.json)\" >> \"$GITHUB_OUTPUT\"\n\n      # Deterministic governance guard: a strategist PR may only add roadmap items. Anything\n      # touching the constitution, merit rubric, proof gates, workflows, or skills is hard-blocked.\n      - name: Enforce governance guard\n        if: steps.load.outputs.not_strategist != 'true'\n        id: guard\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          if ! bun scripts/public-agent-strategy-ratify.ts \\\n            --roadmap .open-autonomy/roadmap.yml \\\n            --changed-files .agent-run/strategy-review/changed.txt; then\n            gh pr edit \"${{ steps.pr.outputs.number }}\" --add-label human-required || true\n            gh pr comment \"${{ steps.pr.outputs.number }}\" \\\n              --body \"Strategy review blocked: a strategist proposal may only add roadmap items, not edit governance files. Human review required.\"\n            echo \"blocked=true\" >> \"$GITHUB_OUTPUT\"\n            exit 1\n          fi\n\n      - name: Mint strategy-review token\n        id: mint\n        if: steps.load.outputs.not_strategist != 'true' && steps.mode.outputs.mode == 'review'\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          set -euo pipefail\n          printf '{\"number\":%s,\"title\":\"Strategy review\",\"body\":\"\",\"user\":{\"login\":\"%s\"}}\\n' \\\n            \"${{ steps.pr.outputs.number }}\" \"${GITHUB_ACTOR}\" > .agent-run/strategy-review/issue.json\n          mint_output=\"$(bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/strategy-review/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MODEL || vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MAX_USD_CENTS || '50' }}\" \\\n            --max-requests \"2\" \\\n            --purpose review)\"\n          run_id=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^run_id=//p' | tail -1)\"\n          token=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^token=//p' | tail -1)\"\n          echo \"::add-mask::$token\"\n          echo \"run_id=$run_id\" >> \"$GITHUB_OUTPUT\"\n          echo \"token=$token\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Ratify proposal against merit criteria\n        id: review\n        if: steps.load.outputs.not_strategist != 'true' && steps.mode.outputs.mode == 'review'\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_TOKEN: ${{ steps.mint.outputs.token }}\n        run: |\n          set +e\n          bun scripts/public-agent-strategy-review.ts \\\n            --diff .agent-run/strategy-review/roadmap.diff \\\n            --proposal .agent-run/strategy-review/proposal.txt \\\n            --rubric .open-autonomy/strategy-rubric.yml \\\n            --constitution docs/CONSTITUTION.md \\\n            --provider \"${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_PROVIDER || 'openai' }}\" \\\n            --model \"${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MODEL || vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'gpt-4o-mini' }}\" \\\n            --out .agent-run/strategy-review/verdict.json\n          echo \"exit=$?\" >> \"$GITHUB_OUTPUT\"\n          echo \"verdict=$(jq -r '.verdict' .agent-run/strategy-review/verdict.json)\" >> \"$GITHUB_OUTPUT\"\n          echo \"human_required=$(jq -r '.human_required' .agent-run/strategy-review/verdict.json)\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Revoke strategy-review run\n        if: always() && steps.mint.outputs.run_id != ''\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-revoke.ts --run-id \"${{ steps.mint.outputs.run_id }}\" || true\n\n      - name: Record decision and ratify\n        if: steps.load.outputs.not_strategist != 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          pr=\"${{ steps.pr.outputs.number }}\"\n          if [ \"${{ steps.mode.outputs.mode }}\" = \"ratify\" ]; then\n            # Human-in-the-loop approval: overrides the model verdict (the governance guard above\n            # still ran). The promote->CI->merge mechanics below stay fully automated.\n            verdict=\"pass\"; human_required=\"false\"; actor=\"human-operator\"\n            summary=\"Ratified by maintainer ${{ github.actor }} (human-in-the-loop).\"\n          else\n            verdict=\"${{ steps.review.outputs.verdict }}\"; human_required=\"${{ steps.review.outputs.human_required }}\"; actor=\"open-autonomy-strategy-reviewer\"\n            summary=\"$(jq -r '.summary' .agent-run/strategy-review/verdict.json)\"\n          fi\n          bun scripts/public-agent-decision.ts \\\n            --stage strategy_review \\\n            --issue 0 --pr \"$pr\" \\\n            --actor \"$actor\" \\\n            --decision \"$verdict\" \\\n            --reason \"$summary\" \\\n            --next-action \"$([ \"$verdict\" = \"pass\" ] && [ \"$human_required\" != \"true\" ] && echo merge || echo human_required)\" \\\n            --out-dir .agent-run/strategy-review/decisions || true\n          gh pr comment \"$pr\" --body \"Strategy review (${actor}): **${verdict}** (human_required: ${human_required}). ${summary}\"\n          if [ \"$verdict\" = \"pass\" ] && [ \"$human_required\" != \"true\" ]; then\n            gh pr edit \"$pr\" --remove-label human-required || true\n            branch=\"$(cat .agent-run/strategy-review/branch.txt)\"\n            git config user.name \"open-autonomy-strategy-reviewer\"\n            git config user.email \"open-autonomy-strategy-reviewer@users.noreply.github.com\"\n            git fetch origin \"$branch\"\n            git checkout \"$branch\"\n            bun scripts/public-agent-strategy-ratify.ts --roadmap .open-autonomy/roadmap.yml --promote\n            if ! git diff --quiet -- .open-autonomy/roadmap.yml; then\n              git add .open-autonomy/roadmap.yml\n              git commit -m \"strategy-review: ratify and promote proposed items to planned\"\n              git push origin \"$branch\"\n            fi\n            head_sha=\"$(git rev-parse HEAD)\"\n            # The strategist PR was opened with GITHUB_TOKEN, so ci.yml's pull_request trigger never\n            # fires and the required \"ci\" status never reports. Run the check here and post the status\n            # to the head, exactly as the develop flow does, so branch protection can be satisfied.\n            if bun run check; then ci_state=\"success\"; else ci_state=\"failure\"; fi\n            gh api -X POST \"repos/${GITHUB_REPOSITORY}/statuses/${head_sha}\" \\\n              -f state=\"$ci_state\" -f context=\"ci\" -f description=\"strategy roadmap PR check\" || true\n            if [ \"$ci_state\" = \"success\" ]; then\n              gh pr merge \"$pr\" --squash --delete-branch \\\n                --subject \"strategy: ratify roadmap proposal #${pr}\" || \\\n                gh pr comment \"$pr\" --body \"Strategy review passed and CI is green, but auto-merge could not complete; human merge required.\"\n            else\n              gh pr edit \"$pr\" --add-label human-required || true\n              gh pr comment \"$pr\" --body \"Strategy review passed but the repository check failed on the proposal branch; human review required.\"\n            fi\n          else\n            gh pr edit \"$pr\" --add-label human-required || true\n          fi\n",config: {}},{name: open-autonomy-strategist,triggers: [{cron: 23 7 * * 1},{event: workflow_dispatch,config: {inputs: {apply: {description: Open a strategist roadmap proposal PR,required: false,default: "false",type: choice,options: ["false","true"]}}}}],raw: "name: Open Autonomy Strategist\n\non:\n  schedule:\n    - cron: '23 7 * * 1'\n  workflow_dispatch:\n    inputs:\n      apply:\n        description: Open a strategist roadmap proposal PR\n        required: false\n        default: 'false'\n        type: choice\n        options:\n          - 'false'\n          - 'true'\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\njobs:\n  strategist:\n    runs-on: ubuntu-latest\n    timeout-minutes: 25\n    permissions:\n      contents: write\n      pull-requests: write\n      issues: read\n      id-token: write\n      actions: write\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      # Research is networked but powerless: only the read-only GitHub token, no proxy admin\n      # secret. Fetched content is captured as untrusted data (signals.json), never executed.\n      - name: Gather research signals\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          mkdir -p .agent-run/strategist\n          sources=.open-autonomy/strategist-sources.json\n          signals=.agent-run/strategist/signals.json\n          echo '[]' > \"$signals\"\n          if [ ! -f \"$sources\" ]; then echo \"no strategist-sources.json; empty signals\"; else\n            for direction in customer_demand competitor_gaps analogous_fields; do\n              dir_label=\"$(echo \"$direction\" | tr '_' '-' | sed 's/-gaps/-gap/; s/-demand/-demand/; s/analogous-fields/analogous-field/')\"\n              for repo in $(jq -r \".${direction}.repos[]? // empty\" \"$sources\"); do\n                gh issue list --repo \"$repo\" --state open --limit 20 \\\n                  --json number,title,url --jq \\\n                  \"[.[] | {id: (\\\"${repo}#\\\" + (.number|tostring)), title: .title, direction: \\\"${dir_label}\\\", source: .url}]\" \\\n                  > .agent-run/strategist/batch.json 2>/dev/null || echo '[]' > .agent-run/strategist/batch.json\n                jq -s '.[0] + .[1]' \"$signals\" .agent-run/strategist/batch.json > .agent-run/strategist/merged.json\n                mv .agent-run/strategist/merged.json \"$signals\"\n              done\n            done\n          fi\n          jq '{schema: \"open-autonomy.strategist-signals.v1\", signals: .}' \"$signals\" > .agent-run/strategist/signals.wrapped.json\n          mv .agent-run/strategist/signals.wrapped.json \"$signals\"\n          echo \"gathered $(jq '.signals | length' \"$signals\") signals\"\n\n      - name: Fetch prior strategist proposals\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          gh pr list --state all --label origin:strategist --limit 50 \\\n            --json number,title,body,state --jq '[.[] | .title + \" \" + (.body // \"\")] | join(\"\\n\")' \\\n            > .agent-run/strategist/prior.txt 2>/dev/null || printf '' > .agent-run/strategist/prior.txt\n\n      - name: Mint strategist model token\n        id: mint\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          set -euo pipefail\n          printf '{\"number\":0,\"title\":\"Strategist run\",\"body\":\"\",\"user\":{\"login\":\"%s\"}}\\n' \"${GITHUB_ACTOR}\" \\\n            > .agent-run/strategist/issue.json\n          mint_output=\"$(bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/strategist/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_STRATEGIST_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_STRATEGIST_MAX_USD_CENTS || '100' }}\" \\\n            --max-requests \"2\" \\\n            --purpose pm)\"\n          run_id=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^run_id=//p' | tail -1)\"\n          token=\"$(printf '%s\\n' \"$mint_output\" | sed -n 's/^token=//p' | tail -1)\"\n          echo \"::add-mask::$token\"\n          echo \"run_id=$run_id\" >> \"$GITHUB_OUTPUT\"\n          echo \"token=$token\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Synthesize roadmap proposal\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_TOKEN: ${{ steps.mint.outputs.token }}\n        run: |\n          touch .open-autonomy/strategist-archive.json\n          bun scripts/public-agent-strategist.ts \\\n            --roadmap .open-autonomy/roadmap.yml \\\n            --constitution docs/CONSTITUTION.md \\\n            --signals .agent-run/strategist/signals.json \\\n            --prior-proposals .agent-run/strategist/prior.txt \\\n            --archive .open-autonomy/strategist-archive.json \\\n            --provider \"${{ vars.PUBLIC_AGENT_STRATEGIST_PROVIDER || 'openai' }}\" \\\n            --model \"${{ vars.PUBLIC_AGENT_STRATEGIST_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-items \"${{ vars.PUBLIC_AGENT_STRATEGIST_MAX_ITEMS || '3' }}\" \\\n            --out .agent-run/strategist/proposal.json \\\n            --roadmap-out .open-autonomy/roadmap.yml \\\n            --archive-out .open-autonomy/strategist-archive.json\n\n      - name: Revoke strategist run\n        if: always() && steps.mint.outputs.run_id != ''\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-revoke.ts --run-id \"${{ steps.mint.outputs.run_id }}\" || true\n\n      - name: Open strategist proposal PR\n        if: inputs.apply == 'true' || github.event_name == 'schedule'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          if git diff --quiet -- .open-autonomy/roadmap.yml; then\n            echo \"Strategist proposed no new roadmap items.\"\n            exit 0\n          fi\n          gh label create origin:strategist --description \"Roadmap proposal authored by the Open Autonomy strategist\" --color 5319E7 2>/dev/null || true\n          git config user.name \"open-autonomy-strategist\"\n          git config user.email \"open-autonomy-strategist@users.noreply.github.com\"\n          branch=\"strategist/roadmap-${{ github.run_id }}\"\n          git checkout -B \"$branch\"\n          git add .open-autonomy/roadmap.yml .open-autonomy/strategist-archive.json\n          git commit -m \"strategist: propose roadmap items from research\"\n          git push --force-with-lease origin \"$branch\"\n          summary=\"$(jq -r '.summary' .agent-run/strategist/proposal.json)\"\n          body=\"$(jq -r '\"## Strategist roadmap proposal\\n\\n\" + .summary + \"\\n\\n\" + (.items | map(\"### \" + .title + \"\\n- **Direction:** \" + .direction + \"\\n- **Rationale:** \" + .rationale + \"\\n- **Falsified if:** \" + .falsified_if + \"\\n- **Sources:** \" + (.sources | join(\", \"))) | join(\"\\n\\n\")) + \"\\n\\nProposed for strategy review. The strategist proposes; it does not merge.\"' .agent-run/strategist/proposal.json)\"\n          pr_url=\"$(gh pr create --base main --head \"$branch\" \\\n            --title \"Strategist: roadmap proposal (${summary:0:60})\" \\\n            --body \"$body\" \\\n            --label origin:strategist)\" || { echo \"pr create failed\"; exit 0; }\n          pr_number=\"$(printf '%s\\n' \"$pr_url\" | grep -oE '[0-9]+$' || true)\"\n          # Hand off to the independent strategy reviewer. workflow_dispatch is dispatchable with the\n          # ambient token (unlike PR events, which GITHUB_TOKEN-created PRs do not trigger).\n          if [ -n \"$pr_number\" ]; then\n            gh workflow run public-agent-strategy-review.yml -f pr=\"$pr_number\" || \\\n              echo \"could not dispatch strategy review; trigger /agent strategy-review on PR #${pr_number}\"\n          fi\n\n      - uses: actions/upload-artifact@v4\n        if: always()\n        with:\n          name: open-autonomy-strategist-${{ github.run_id }}\n          path: .agent-run/strategist\n          if-no-files-found: warn\n",config: {}},{name: open-autonomy-planner,triggers: [{cron: 17 6 * * *},{event: workflow_dispatch,config: {inputs: {apply: {description: Create/update roadmap issues,required: false,default: "false",type: choice,options: ["false","true"]}}}}],raw: "name: Open Autonomy Planner\n\non:\n  schedule:\n    - cron: '17 6 * * *'\n  workflow_dispatch:\n    inputs:\n      apply:\n        description: Create/update roadmap issues\n        required: false\n        default: 'false'\n        type: choice\n        options:\n          - 'false'\n          - 'true'\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\njobs:\n  plan:\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    permissions:\n      contents: read\n      issues: write\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Read existing roadmap issues\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          mkdir -p .agent-run/planner\n          gh issue list \\\n            --state open \\\n            --search \"is:issue is:open label:origin:roadmap-planner\" \\\n            --limit 200 \\\n            --json number,title,body,labels,url,state \\\n            > .agent-run/planner/issues.json\n\n      - name: Plan roadmap issues\n        run: |\n          bun scripts/public-agent-planner.ts \\\n            --roadmap .open-autonomy/roadmap.yml \\\n            --issues .agent-run/planner/issues.json \\\n            --out .agent-run/planner/plan.json\n\n      - name: Apply roadmap issue plan\n        if: inputs.apply == 'true' || github.event_name == 'schedule'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          set -euo pipefail\n          gh label create origin:roadmap-planner --description \"Issue created or managed by the Open Autonomy planner\" --color 0E8A16 2>/dev/null || true\n          for label in priority:high priority:medium priority:low; do\n            gh label create \"$label\" --description \"Roadmap priority\" --color FBCA04 2>/dev/null || true\n          done\n          jq -r '.actions[].labels[]' .agent-run/planner/plan.json | sort -u | while IFS= read -r label; do\n            case \"$label\" in\n              roadmap:*) color=\"1D76DB\" ;;\n              proof:*) color=\"5319E7\" ;;\n              origin:*) color=\"0E8A16\" ;;\n              priority:high) color=\"B60205\" ;;\n              priority:medium) color=\"FBCA04\" ;;\n              priority:low) color=\"C2E0C6\" ;;\n              *) color=\"CFD3D7\" ;;\n            esac\n            gh label create \"$label\" --description \"Open Autonomy planner label\" --color \"$color\" 2>/dev/null || true\n          done\n          jq -c '.actions[] | select(.action == \"create\" or .action == \"update\")' .agent-run/planner/plan.json | while IFS= read -r action; do\n            kind=\"$(jq -r '.action' <<< \"$action\")\"\n            number=\"$(jq -r '.issue_number // empty' <<< \"$action\")\"\n            title=\"$(jq -r '.title' <<< \"$action\")\"\n            body=\"$(jq -r '.body' <<< \"$action\")\"\n            labels=\"$(jq -r '.labels | join(\",\")' <<< \"$action\")\"\n            # Apply labels best-effort and one at a time: a single bad label (e.g. one a strategist\n            # generated that exceeds GitHub's 50-char limit) must never block creating the issue.\n            if [[ \"$kind\" == \"create\" ]]; then\n              url=\"$(gh issue create --title \"$title\" --body \"$body\")\"\n              number=\"$(printf '%s\\n' \"$url\" | grep -oE '[0-9]+$' || true)\"\n            else\n              gh issue edit \"$number\" --title \"$title\" --body \"$body\" || true\n            fi\n            if [[ -n \"$number\" ]]; then\n              printf '%s\\n' \"$labels\" | tr ',' '\\n' | while IFS= read -r lbl; do\n                [[ -n \"$lbl\" ]] && gh issue edit \"$number\" --add-label \"$lbl\" || true\n              done\n            fi\n          done\n\n      - uses: actions/upload-artifact@v4\n        if: always()\n        with:\n          name: open-autonomy-planner-${{ github.run_id }}\n          path: .agent-run/planner\n          if-no-files-found: warn\n",config: {}},{name: public-agent,triggers: [{event: issues,config: {types: [labeled]}},{event: issue_comment,config: {types: [created]}},{event: workflow_dispatch,config: {inputs: {issue_number: {description: Issue number to develop,required: true,type: string},command: {description: Agent command to run,required: false,default: /agent develop,type: string}}}}],raw: "name: Public Agent Session\nrun-name: Public Agent Session #${{ github.event.issue.number || inputs.issue_number }}\n\non:\n  issues:\n    types: [labeled]\n  issue_comment:\n    types: [created]\n  workflow_dispatch:\n    inputs:\n      issue_number:\n        description: Issue number to develop\n        required: true\n        type: string\n      command:\n        description: Agent command to run\n        required: false\n        default: /agent develop\n        type: string\n\npermissions:\n  contents: read\n\nenv:\n  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: \"true\"\n\nconcurrency:\n  # Operator-control commands (cancel/pause/resume/status/retry) get a separate group so they are\n  # NOT serialized behind the develop/review run they are meant to control — otherwise `/agent cancel`\n  # would queue until the run it targets has already finished.\n  group: >-\n    public-agent-${{ github.event.issue.number || inputs.issue_number }}${{\n    (startsWith(github.event.comment.body || inputs.command || '', '/agent cancel')\n    || startsWith(github.event.comment.body || inputs.command || '', '/agent pause')\n    || startsWith(github.event.comment.body || inputs.command || '', '/agent resume')\n    || startsWith(github.event.comment.body || inputs.command || '', '/agent status')\n    || startsWith(github.event.comment.body || inputs.command || '', '/agent retry'))\n    && '-control' || '' }}\n  cancel-in-progress: false\n\njobs:\n  setup:\n    if: >-\n      (github.event_name == 'issues' && github.event.label.name == 'agent-session') ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '/agent develop', '/agent develop')) ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '', '/agent pause')) ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '', '/agent resume')) ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '', '/agent cancel')) ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '', '/agent retry')) ||\n      (github.event_name == 'workflow_dispatch' && startsWith(inputs.command || '', '/agent status')) ||\n      (github.event_name == 'issue_comment' && (\n        startsWith(github.event.comment.body, '/agent develop') ||\n        startsWith(github.event.comment.body, '/agent run') ||\n        startsWith(github.event.comment.body, '/agent continue') ||\n        startsWith(github.event.comment.body, '/agent pause') ||\n        startsWith(github.event.comment.body, '/agent resume') ||\n        startsWith(github.event.comment.body, '/agent cancel') ||\n        startsWith(github.event.comment.body, '/agent retry') ||\n        startsWith(github.event.comment.body, '/agent status')\n      ))\n    runs-on: ubuntu-latest\n    timeout-minutes: 10\n    permissions:\n      contents: read\n      issues: write\n      pull-requests: read\n      actions: write\n      id-token: write\n    outputs:\n      approved: ${{ steps.triage.outputs.approved }}\n      run_id: ${{ steps.mint.outputs.run_id }}\n      issue_number: ${{ steps.target.outputs.issue }}\n      target_branch: ${{ steps.target.outputs.branch }}\n      target_kind: ${{ steps.target.outputs.kind }}\n      target_pr: ${{ steps.target.outputs.pull_request }}\n      policy_allowed: ${{ steps.policy.outputs.allowed }}\n      repo_paused: ${{ steps.repo_pause.outputs.paused }}\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          persist-credentials: false\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Write issue payload\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          mkdir -p .agent-run\n          issue_number=\"${{ github.event.issue.number || inputs.issue_number }}\"\n          gh issue view \"$issue_number\" \\\n            --json number,title,body,author,labels,comments \\\n            --jq '{number,title,body,user:{login:.author.login},labels,comments}' \\\n            > .agent-run/issue.json\n\n      - name: Parse agent command\n        id: command\n        run: |\n          bun scripts/public-agent-command.ts \\\n            --event \"$GITHUB_EVENT_PATH\" \\\n            --out .agent-run/command.json\n\n      - name: Authorize trigger actor\n        env:\n          EVENT_NAME: ${{ github.event_name }}\n          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}\n          COMMENT_AUTHOR_LOGIN: ${{ github.event.comment.user.login }}\n        run: |\n          if [[ \"$EVENT_NAME\" != \"issue_comment\" ]]; then\n            exit 0\n          fi\n\n          if [[ \"$COMMENT_AUTHOR_LOGIN\" == \"github-actions[bot]\" ]]; then\n            exit 0\n          fi\n\n          case \"$COMMENT_AUTHOR_ASSOCIATION\" in\n            OWNER|MEMBER|COLLABORATOR)\n              ;;\n            *)\n              echo \"Unauthorized trigger actor association: ${COMMENT_AUTHOR_ASSOCIATION:-unknown}\"\n              exit 1\n              ;;\n          esac\n\n      - name: Read pull request target\n        if: github.event.issue.pull_request\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          gh pr view \"${{ github.event.issue.number }}\" \\\n            --json number,headRefName,headRepositoryOwner,headRepository,isCrossRepository,baseRefName \\\n            > .agent-run/pr.json\n\n      - name: Resolve agent target\n        id: target\n        run: |\n          args=(--event \"$GITHUB_EVENT_PATH\" --out .agent-run/target.json)\n          if [[ -f .agent-run/pr.json ]]; then\n            args+=(--pr .agent-run/pr.json)\n          fi\n          bun scripts/public-agent-target.ts \"${args[@]}\" || true\n\n      - name: Record run id for cancel\n        if: steps.command.outputs.verb == 'develop' && steps.target.outputs.issue != ''\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          # Durable run->issue link so `/agent cancel` can find this run regardless of how GitHub\n          # renders the run displayTitle (issue_comment runs show the workflow name, not the issue).\n          gh issue comment \"${{ steps.target.outputs.issue }}\" \\\n            --body \"<!-- public-agent-run:${GITHUB_RUN_ID} -->\" || true\n\n      - name: Read policy context\n        if: steps.target.outputs.can_develop == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          issue=\"${{ steps.target.outputs.issue }}\"\n          gh issue view \"$issue\" --json comments > .agent-run/issue-comments.json\n          gh pr list --state open --limit 100 --json number,headRefName,updatedAt,state > .agent-run/open-prs.json\n\n      - name: Evaluate develop policy\n        if: steps.target.outputs.can_develop == 'true'\n        id: policy\n        run: |\n          bun scripts/public-agent-policy.ts \\\n            --issue .agent-run/issue.json \\\n            --comments .agent-run/issue-comments.json \\\n            --open-prs .agent-run/open-prs.json \\\n            --target .agent-run/target.json \\\n            --max-develop-attempts \"${{ vars.PUBLIC_AGENT_MAX_DEVELOP_ATTEMPTS || '3' }}\" \\\n            --max-open-agent-prs \"${{ vars.PUBLIC_AGENT_MAX_OPEN_AGENT_PRS || '5' }}\" \\\n            --stale-needs-info-minutes \"${{ vars.PUBLIC_AGENT_STALE_NEEDS_INFO_MINUTES || '10080' }}\" \\\n            --out .agent-run/policy.json || true\n\n      - name: Record target decision\n        if: always() && hashFiles('.agent-run/target.json') != ''\n        run: |\n          mkdir -p .agent-run/setup-decisions\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          kind=\"$(jq -r '.kind' .agent-run/target.json)\"\n          branch=\"$(jq -r '.branch' .agent-run/target.json)\"\n          pr=\"$(jq -r '.pull_request // empty' .agent-run/target.json)\"\n          can_develop=\"$(jq -r '.can_develop' .agent-run/target.json)\"\n          reason=\"$(jq -r '.reason // if .can_develop then \"target can be developed\" else \"target cannot be developed\" end' .agent-run/target.json)\"\n          args=(\n            --stage target\n            --issue \"$issue\"\n            --actor \"${GITHUB_ACTOR}\"\n            --decision \"$([[ \"$can_develop\" == \"true\" ]] && echo can_develop || echo blocked)\"\n            --reason \"$reason\"\n            --evidence \"target:.agent-run/target.json\"\n            --next-action \"$([[ \"$can_develop\" == \"true\" ]] && echo triage || echo escalate)\"\n            --out-dir .agent-run/setup-decisions\n          )\n          if [[ \"$kind\" == \"pull_request\" && -n \"$pr\" ]]; then\n            args+=(--pr \"$pr\" --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${branch}\\\"}\")\n          else\n            args+=(--subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${issue},\\\"branch\\\":\\\"${branch}\\\"}\")\n          fi\n          bun scripts/public-agent-decision.ts \"${args[@]}\"\n\n      - name: Record policy decision\n        if: always() && hashFiles('.agent-run/policy.json') != ''\n        run: |\n          mkdir -p .agent-run/setup-decisions\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          branch=\"$(jq -r '.branch' .agent-run/target.json)\"\n          policy=\"$(jq -r '.decision' .agent-run/policy.json)\"\n          reason=\"$(jq -r '.reason' .agent-run/policy.json)\"\n          next_action=\"$(jq -r '.next_action' .agent-run/policy.json)\"\n          attempt_index=\"$(jq -r '.develop_attempts + 1' .agent-run/policy.json)\"\n          attempt_max=\"$(jq -r '.max_develop_attempts' .agent-run/policy.json)\"\n          if [[ \"$policy\" != \"allow\" ]]; then\n            attempt_index=\"$attempt_max\"\n          fi\n          bun scripts/public-agent-decision.ts \\\n            --stage dispatch \\\n            --issue \"$issue\" \\\n            --actor \"public-agent-policy\" \\\n            --decision \"$policy\" \\\n            --reason \"$reason\" \\\n            --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${issue},\\\"branch\\\":\\\"${branch}\\\"}\" \\\n            --attempt-json \"{\\\"kind\\\":\\\"develop\\\",\\\"index\\\":${attempt_index},\\\"max\\\":${attempt_max}}\" \\\n            --evidence \"target:.agent-run/target.json,policy:.agent-run/policy.json\" \\\n            --next-action \"$next_action\" \\\n            --out-dir .agent-run/setup-decisions\n\n      - name: Handle operator control\n        if: steps.command.outputs.verb != 'develop'\n        env:\n          GH_TOKEN: ${{ github.token }}\n          COMMAND_VERB: ${{ steps.command.outputs.verb }}\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n          PUBLIC_AGENT_REPO_PAUSED: ${{ vars.PUBLIC_AGENT_REPO_PAUSED || 'false' }}\n        run: |\n          set -euo pipefail\n          issue=\"${{ steps.target.outputs.issue }}\"\n          raw=\"$(jq -r '.raw' .agent-run/command.json)\"\n          scope=\"issue\"\n          if [[ \"$raw\" =~ (^|[[:space:]])(repo|repository|global)([[:space:]]|$) ]]; then\n            scope=\"repo\"\n          fi\n\n          gh label create agent-paused --description \"Autonomous public-agent work is paused\" --color FBCA04 2>/dev/null || true\n          gh label create agent-repo-paused --description \"Repo-level autonomous public-agent work is paused\" --color FBCA04 2>/dev/null || true\n          gh label create agent-blocked --description \"Blocks autonomous public-agent development\" --color B60205 2>/dev/null || true\n          gh label create human-required --description \"Requires maintainer attention before autonomous work\" --color B60205 2>/dev/null || true\n\n          active_runs() {\n            # GitHub renders issue_comment develop runs with the workflow name as displayTitle (the\n            # run-name \"#<issue>\" is not applied), so match instead on the run-id markers that each\n            # develop run records on its issue. Emit the still-active run ids, one per line.\n            gh issue view \"$issue\" --json comments --jq '.comments[].body' 2>/dev/null \\\n              | grep -oE 'public-agent-run:[0-9]+' | sed 's/.*://' | sort -u \\\n              | while IFS= read -r rid; do\n                  [[ -z \"$rid\" ]] && continue\n                  st=\"$(gh run view \"$rid\" --json status --jq .status 2>/dev/null || echo)\"\n                  case \"$st\" in\n                    in_progress|queued|waiting|requested) echo \"$rid\" ;;\n                  esac\n                done\n          }\n\n          proxy_status() {\n            if [[ -z \"${MODEL_PROXY_URL:-}\" || -z \"${MODEL_PROXY_ADMIN_TOKEN:-}\" ]]; then\n              printf '{\"runs\":{}}\\n'\n              return\n            fi\n            curl -fsS -H \"x-admin-token: ${MODEL_PROXY_ADMIN_TOKEN}\" \"${MODEL_PROXY_URL}/admin/limits/status\" || printf '{\"runs\":{}}\\n'\n          }\n\n          case \"$COMMAND_VERB\" in\n            pause)\n              if [[ \"$scope\" == \"repo\" ]]; then\n                gh variable set PUBLIC_AGENT_REPO_PAUSED --body true || true\n                gh issue edit \"$issue\" --add-label agent-repo-paused\n                gh issue comment \"$issue\" --body \"Agent repo pause enabled. PM and develop starts will wait until \\`/agent resume repo\\`.\"\n              else\n                gh issue edit \"$issue\" --add-label agent-paused\n                gh issue comment \"$issue\" --body \"Agent pause enabled for this issue. PM and develop starts will wait until \\`/agent resume\\`.\"\n              fi\n              ;;\n            resume)\n              if [[ \"$scope\" == \"repo\" ]]; then\n                gh variable set PUBLIC_AGENT_REPO_PAUSED --body false || true\n                while IFS= read -r paused_issue; do\n                  if [[ -n \"$paused_issue\" ]]; then\n                    gh issue edit \"$paused_issue\" --remove-label agent-repo-paused || true\n                  fi\n                done < <(gh issue list --state open --label agent-repo-paused --limit 100 --json number --jq '.[].number')\n                gh issue comment \"$issue\" --body \"Agent repo pause cleared.\"\n              else\n                gh issue edit \"$issue\" --remove-label agent-paused || true\n                gh issue comment \"$issue\" --body \"Agent pause cleared for this issue.\"\n              fi\n              ;;\n            cancel)\n              cancelled=0\n              while IFS= read -r run_id; do\n                if [[ -z \"$run_id\" || \"$run_id\" == \"${GITHUB_RUN_ID}\" ]]; then\n                  continue\n                fi\n                gh run cancel \"$run_id\" || true\n                cancelled=$((cancelled + 1))\n              done < <(active_runs)\n\n              revoked=0\n              status_json=\"$(proxy_status)\"\n              while IFS= read -r proxy_run_id; do\n                if [[ -z \"$proxy_run_id\" ]]; then\n                  continue\n                fi\n                bun scripts/model-proxy-revoke.ts --run-id \"$proxy_run_id\" >/dev/null 2>&1 || true\n                revoked=$((revoked + 1))\n              done < <(jq -r --argjson issue \"$issue\" '.runs // {} | to_entries[] | select(.value.issue == $issue and .value.active == true) | .key' <<<\"$status_json\")\n              gh issue comment \"$issue\" --body \"Agent cancel requested. Cancelled ${cancelled} workflow run(s) and revoked ${revoked} active proxy run(s).\"\n              ;;\n            retry)\n              retry_run=\"$(gh run list \\\n                --workflow public-agent.yml \\\n                --limit 50 \\\n                --json databaseId,status,conclusion,displayTitle,url \\\n                --jq \".[] | select((.displayTitle | contains(\\\"#${issue}\\\")) and .status == \\\"completed\\\" and (.conclusion == \\\"failure\\\" or .conclusion == \\\"cancelled\\\" or .conclusion == \\\"timed_out\\\" or .conclusion == \\\"action_required\\\")) | .databaseId\" \\\n                | head -1)\"\n              if [[ -z \"$retry_run\" ]]; then\n                gh issue comment \"$issue\" --body \"Agent retry did not find a failed infrastructure run for this issue. No develop pass was started.\"\n              else\n                gh run rerun \"$retry_run\" --failed\n                gh issue comment \"$issue\" --body \"Agent retry reran failed jobs for workflow run ${retry_run}. No new develop command was dispatched.\"\n              fi\n              ;;\n            status)\n              branch=\"agent/issue-${issue}\"\n              open_pr=\"$(gh pr list --head \"$branch\" --state open --json number --jq '.[0].number // empty')\"\n              active_count=\"$(active_runs | jq -s 'length')\"\n              labels=\"$(jq -r '[.labels[]?.name] | join(\", \")' .agent-run/issue.json)\"\n              blocking=\"$(jq -r '[.labels[]?.name | ascii_downcase | select(. == \"agent-paused\" or . == \"agent-blocked\" or . == \"human-required\" or . == \"security\")] | if length == 0 then \"none\" else join(\", \") end' .agent-run/issue.json)\"\n              repo_pause_count=\"$(gh issue list --state open --label agent-repo-paused --limit 1 --json number --jq 'length' 2>/dev/null || echo 0)\"\n              repo_paused=\"$([[ \"$PUBLIC_AGENT_REPO_PAUSED\" == \"true\" || \"$repo_pause_count\" != \"0\" ]] && echo yes || echo no)\"\n              status_json=\"$(proxy_status)\"\n              proxy_runs=\"$(jq -r --argjson issue \"$issue\" '[.runs // {} | to_entries[] | select(.value.issue == $issue and .value.active == true) | .key] | if length == 0 then \"none\" else join(\", \") end' <<<\"$status_json\")\"\n              {\n                echo \"Agent status for issue #${issue}:\"\n                echo \"- repo paused: ${repo_paused}\"\n                echo \"- labels: ${labels:-none}\"\n                echo \"- blocking labels: ${blocking}\"\n                echo \"- open agent PR: $([[ -n \"$open_pr\" ]] && echo \"#${open_pr}\" || echo none)\"\n                echo \"- active workflow runs: ${active_count}\"\n                echo \"- active proxy runs: ${proxy_runs}\"\n              } > .agent-run/status-comment.md\n              gh issue comment \"$issue\" --body-file .agent-run/status-comment.md\n              ;;\n            *)\n              echo \"Unsupported operator control: ${COMMAND_VERB}\"\n              exit 1\n              ;;\n          esac\n\n      - name: Read repo pause state\n        id: repo_pause\n        env:\n          GH_TOKEN: ${{ github.token }}\n          PUBLIC_AGENT_REPO_PAUSED: ${{ vars.PUBLIC_AGENT_REPO_PAUSED || 'false' }}\n        run: |\n          repo_pause_count=\"$(gh issue list --state open --label agent-repo-paused --limit 1 --json number --jq 'length' 2>/dev/null || echo 0)\"\n          paused=false\n          if [[ \"$PUBLIC_AGENT_REPO_PAUSED\" == \"true\" || \"$repo_pause_count\" != \"0\" ]]; then\n            paused=true\n          fi\n          echo \"paused=${paused}\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Stop if target cannot be developed\n        if: steps.command.outputs.verb == 'develop' && steps.target.outputs.can_develop != 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          reason=\"$(jq -r '.reason // \"This target is not eligible for autonomous development.\"' .agent-run/target.json)\"\n          gh issue comment \"${{ steps.target.outputs.issue }}\" --body \"Agent develop requires human review: ${reason}\"\n          exit 1\n\n      - name: Stop if repo is paused\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          gh issue comment \"${{ steps.target.outputs.issue }}\" --body \"Agent develop is waiting: repo-level agent pause is enabled. Use \\`/agent resume repo\\` to clear it.\"\n\n      - name: Stop if develop policy blocks\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed != 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          reason=\"$(jq -r '.reason // \"Develop policy blocked this run.\"' .agent-run/policy.json)\"\n          decision=\"$(jq -r '.decision // \"policy_blocked\"' .agent-run/policy.json)\"\n          next_action=\"$(jq -r '.next_action // \"human_required\"' .agent-run/policy.json)\"\n          if [[ \"$next_action\" == \"wait\" ]]; then\n            gh issue comment \"${{ steps.target.outputs.issue }}\" --body \"Agent develop is waiting: ${decision}. ${reason}\"\n          else\n            gh issue comment \"${{ steps.target.outputs.issue }}\" --body \"Agent develop requires human review: ${decision}. ${reason}\"\n          fi\n\n      - name: Mint triage model token\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed == 'true'\n        id: triage_mint\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_TRIAGE_MAX_USD_CENTS || '25' }}\" \\\n            --max-requests \"2\" \\\n            --purpose triage\n\n      - name: Triage issue\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed == 'true'\n        id: triage\n        continue-on-error: true\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_TOKEN: ${{ steps.triage_mint.outputs.token }}\n        run: |\n          bun scripts/public-agent-triage.ts \\\n            --issue .agent-run/issue.json \\\n            --provider \"${{ vars.PUBLIC_AGENT_TRIAGE_PROVIDER || 'openai' }}\" \\\n            --model \"${{ vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --out .agent-run/triage.json\n\n      - name: Complete triage run\n        if: always() && steps.triage_mint.outputs.run_id != ''\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-revoke.ts --run-id \"${{ steps.triage_mint.outputs.run_id }}\" || true\n\n      - name: Record triage decision\n        if: always() && steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed == 'true' && hashFiles('.agent-run/target.json') != ''\n        run: |\n          mkdir -p .agent-run/setup-decisions\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          branch=\"$(jq -r '.branch' .agent-run/target.json)\"\n          if [[ -f .agent-run/triage.json ]]; then\n            decision=\"$(jq -r '.decision' .agent-run/triage.json)\"\n            reason=\"$(jq -r '.reason' .agent-run/triage.json)\"\n          else\n            decision=\"triage_failed\"\n            reason=\"The triage step failed before writing a decision.\"\n          fi\n          bun scripts/public-agent-decision.ts \\\n            --stage triage \\\n            --issue \"$issue\" \\\n            --actor \"${GITHUB_ACTOR}\" \\\n            --decision \"$decision\" \\\n            --reason \"$reason\" \\\n            --run-id \"${{ steps.triage_mint.outputs.run_id }}\" \\\n            --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${issue},\\\"branch\\\":\\\"${branch}\\\"}\" \\\n            --evidence \"target:.agent-run/target.json,triage:.agent-run/triage.json\" \\\n            --next-action \"$([[ \"$decision\" == \"approve_run\" ]] && echo mint_agent || echo escalate)\" \\\n            --out-dir .agent-run/setup-decisions\n\n      - name: Stop if triage did not approve\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed == 'true' && steps.triage.outputs.approved != 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          if [[ -f .agent-run/triage.json ]]; then\n            decision=\"$(jq -r '.decision' .agent-run/triage.json)\"\n            reason=\"$(jq -r '.reason' .agent-run/triage.json)\"\n          else\n            decision=\"triage_failed\"\n            reason=\"The triage step failed before writing a decision.\"\n          fi\n          gh issue comment \"${{ steps.target.outputs.issue }}\" --body \"Agent triage: ${decision}. ${reason}\"\n          exit 1\n\n      - name: Mint bounded model token\n        if: steps.command.outputs.verb == 'develop' && steps.repo_pause.outputs.paused != 'true' && steps.policy.outputs.allowed == 'true' && steps.triage.outputs.approved == 'true'\n        id: mint\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_MODELS || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_MAX_USD_CENTS || '500' }}\" \\\n            --max-requests \"${{ vars.PUBLIC_AGENT_MAX_REQUESTS || '200' }}\"\n\n      - uses: actions/upload-artifact@v4\n        if: always() && hashFiles('.agent-run/setup-decisions/*.json') != ''\n        with:\n          name: public-agent-setup-decisions-${{ github.run_id }}\n          path: .agent-run/setup-decisions\n          if-no-files-found: error\n\n  agent-runner:\n    needs: setup\n    if: needs.setup.outputs.approved == 'true'\n    runs-on: ubuntu-latest\n    timeout-minutes: 90\n    permissions:\n      contents: read\n      issues: read\n      pull-requests: read\n      id-token: write\n    outputs:\n      run_id: ${{ needs.setup.outputs.run_id }}\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          persist-credentials: false\n\n      - uses: actions/download-artifact@v4\n        with:\n          name: public-agent-setup-decisions-${{ github.run_id }}\n          path: .agent-run/setup-decisions\n\n      - name: Configure git\n        run: git config core.filemode false\n\n      - name: Check out target branch if it exists\n        run: |\n          branch=\"${{ needs.setup.outputs.target_branch }}\"\n          git fetch origin \"$branch\" || exit 0\n          git checkout -B \"$branch\" \"origin/$branch\"\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Install evidence tools\n        run: sudo apt-get update && sudo apt-get install -y webp\n\n      - name: Write issue payload\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          mkdir -p .agent-run\n          if [[ \"${{ github.event_name }}\" == \"workflow_dispatch\" ]]; then\n            gh issue view \"${{ needs.setup.outputs.issue_number }}\" \\\n              --json number,title,body,author,labels,comments \\\n              --jq '{number,title,body,user:{login:.author.login},labels,comments}' \\\n              > .agent-run/issue.json\n          else\n            jq '.issue' \"$GITHUB_EVENT_PATH\" > .agent-run/issue.json\n          fi\n\n      - name: Write target context\n        env:\n          TARGET_KIND: ${{ needs.setup.outputs.target_kind }}\n          TARGET_BRANCH: ${{ needs.setup.outputs.target_branch }}\n          TARGET_PR: ${{ needs.setup.outputs.target_pr }}\n        run: |\n          jq -n \\\n            --arg kind \"$TARGET_KIND\" \\\n            --arg branch \"$TARGET_BRANCH\" \\\n            --argjson issue \"${{ needs.setup.outputs.issue_number }}\" \\\n            --arg pr \"$TARGET_PR\" \\\n            '{\n              kind: $kind,\n              issue: $issue,\n              pull_request: (if $pr == \"\" then null else ($pr | tonumber) end),\n              branch: $branch,\n              can_develop: true\n            }' > .agent-run/target.json\n\n      - name: Build developer context\n        env:\n          GH_TOKEN: ${{ github.token }}\n          TARGET_BRANCH: ${{ needs.setup.outputs.target_branch }}\n          TARGET_PR: ${{ needs.setup.outputs.target_pr }}\n        run: |\n          issue=\"${{ needs.setup.outputs.issue_number }}\"\n          gh issue view \"$issue\" --json comments > .agent-run/issue-comments.json\n          find agent-sessions -path \"*/decisions/*.json\" -type f -print0 2>/dev/null \\\n            | xargs -0 jq -s --argjson issue \"$issue\" '[.[] | select(.issue == $issue)] | sort_by(.created_at) | reverse | .[0:30]' \\\n            > .agent-run/previous-decisions.json || printf '[]\\n' > .agent-run/previous-decisions.json\n          pr=\"$TARGET_PR\"\n          if [[ -z \"$pr\" ]]; then\n            pr=\"$(gh api \"repos/${GITHUB_REPOSITORY}/pulls\" \\\n              -f state=open \\\n              -f head=\"${GITHUB_REPOSITORY_OWNER}:${TARGET_BRANCH}\" \\\n              --jq '.[0].number // empty' || true)\"\n          fi\n          if [[ -n \"$pr\" ]]; then\n            if gh pr view \"$pr\" --json number,title,url,headRefName,updatedAt,files > .agent-run/current-pr.json; then\n              gh pr diff \"$pr\" > .agent-run/current-pr.diff || printf '' > .agent-run/current-pr.diff\n            else\n              printf 'null\\n' > .agent-run/current-pr.json\n              printf '' > .agent-run/current-pr.diff\n            fi\n          else\n            printf 'null\\n' > .agent-run/current-pr.json\n            printf '' > .agent-run/current-pr.diff\n          fi\n          bun scripts/public-agent-context.ts \\\n            --target .agent-run/target.json \\\n            --issue .agent-run/issue.json \\\n            --comments .agent-run/issue-comments.json \\\n            --decisions .agent-run/previous-decisions.json \\\n            --pr .agent-run/current-pr.json \\\n            --pr-diff .agent-run/current-pr.diff \\\n            --out .agent-run/context.json\n\n      - name: Enable Codex sandbox namespaces\n        if: runner.os == 'Linux'\n        run: |\n          current_userns=\"$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)\"\n          if [ -n \"$current_userns\" ] && [ \"$current_userns\" != \"1\" ]; then\n            sudo sysctl -w kernel.unprivileged_userns_clone=1\n          fi\n\n          current_apparmor=\"$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)\"\n          if [ -n \"$current_apparmor\" ] && [ \"$current_apparmor\" != \"0\" ]; then\n            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0\n          fi\n\n      - name: Install Codex CLI\n        env:\n          PUBLIC_AGENT_CODEX_VERSION: ${{ vars.PUBLIC_AGENT_CODEX_VERSION }}\n        run: |\n          version=\"${PUBLIC_AGENT_CODEX_VERSION:-latest}\"\n          npm install -g \"@openai/codex@${version}\"\n          codex --version\n\n      - name: Exchange GitHub OIDC for bounded model token\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}\n        run: |\n          bun scripts/model-proxy-exchange.ts \\\n            --run-id \"${{ needs.setup.outputs.run_id }}\" \\\n            --audience \"${MODEL_PROXY_OIDC_AUDIENCE}\"\n\n      - name: Run agent\n        continue-on-error: true\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          PUBLIC_AGENT_COMMAND: ${{ vars.PUBLIC_AGENT_COMMAND }}\n          OSS_AGENT_CONTEXT_PATH: ${{ github.workspace }}/.agent-run/context.json\n          PUBLIC_AGENT_PRE_DECISIONS_DIR: ${{ github.workspace }}/.agent-run/setup-decisions\n          PUBLIC_AGENT_MODEL: ${{ vars.PUBLIC_AGENT_MODEL || vars.PUBLIC_AGENT_MODELS || 'gpt-4o-mini' }}\n        run: |\n          bun scripts/github-agent-session.ts \\\n            --issue .agent-run/issue.json \\\n            --run-id \"${{ needs.setup.outputs.run_id }}\" \\\n            --out .agent-run/out \\\n            --repo \"${{ github.repository }}\" \\\n            --actor \"${{ github.actor }}\" \\\n            -- \\\n            bash -lc \"${PUBLIC_AGENT_COMMAND:-bun scripts/codex-agent-run.ts}; rc=\\$?; bun scripts/agent-visual-verify.ts || true; exit \\$rc\"\n\n      - uses: actions/upload-artifact@v4\n        with:\n          name: agent-bundle-${{ needs.setup.outputs.run_id }}\n          path: .agent-run/out/bundle\n          if-no-files-found: error\n\n  complete-agent-run:\n    needs: [setup, agent-runner]\n    if: always() && needs.setup.outputs.run_id != ''\n    runs-on: ubuntu-latest\n    timeout-minutes: 5\n    permissions:\n      contents: read\n      id-token: write\n    steps:\n      - uses: actions/checkout@v4\n      - uses: oven-sh/setup-bun@v2\n      - run: bun install --frozen-lockfile || bun install\n      - name: Complete agent run\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n          MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}\n        run: |\n          bun scripts/model-proxy-revoke.ts --run-id \"${{ needs.setup.outputs.run_id }}\" || true\n\n  publisher:\n    needs: [setup, agent-runner]\n    if: always() && needs.agent-runner.result == 'success'\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    permissions:\n      contents: write\n      pull-requests: write\n      issues: write\n      actions: read\n    outputs:\n      pr_number: ${{ steps.publish_pr.outputs.pr_number }}\n      branch: ${{ needs.setup.outputs.target_branch }}\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: oven-sh/setup-bun@v2\n\n      - uses: actions/download-artifact@v4\n        with:\n          name: agent-bundle-${{ needs.agent-runner.outputs.run_id }}\n          path: .agent-run/bundle\n\n      - name: Validate and apply bundle\n        id: validate_bundle\n        run: |\n          set +e\n          branch=\"${{ needs.setup.outputs.target_branch }}\"\n          git fetch origin \"$branch\" && git checkout -B \"$branch\" \"origin/$branch\" || git checkout -B \"$branch\"\n          bun scripts/github-agent-publish.ts \\\n            --bundle .agent-run/bundle \\\n            --repo . \\\n            --out .agent-run/publish-summary.json \\\n            --promote-dir \"agent-sessions/${{ needs.agent-runner.outputs.run_id }}\" \\\n            --expected-run-id \"${{ needs.agent-runner.outputs.run_id }}\" \\\n            --expected-repo \"${{ github.repository }}\" \\\n            --expected-issue \"${{ needs.setup.outputs.issue_number }}\" \\\n            --expected-actor \"${{ github.actor }}\" \\\n            --allowed-paths \"${{ vars.PUBLIC_AGENT_ALLOWED_PATHS || '**' }}\" \\\n            --apply 2>.agent-run/publish-error.log\n          publish_status=\"$?\"\n          set -e\n          mkdir -p \"agent-sessions/${{ needs.agent-runner.outputs.run_id }}/decisions\"\n          if [[ \"$publish_status\" != \"0\" ]]; then\n            reason=\"$(head -c 1000 .agent-run/publish-error.log | tr '\\n' ' ' | sed 's/[[:space:]]\\\\+/ /g')\"\n            if [[ -z \"$reason\" ]]; then\n              reason=\"publisher rejected the agent bundle\"\n            fi\n            printf '{\"ok\":false,\"run_id\":\"%s\",\"repo\":\"%s\",\"issue\":%s,\"status\":\"publisher-rejected\",\"reason\":%s}\\n' \\\n              \"${{ needs.agent-runner.outputs.run_id }}\" \\\n              \"${{ github.repository }}\" \\\n              \"${{ needs.setup.outputs.issue_number }}\" \\\n              \"$(jq -Rn --arg reason \"$reason\" '$reason')\" \\\n              > .agent-run/publish-summary.json\n            bun scripts/public-agent-decision.ts \\\n              --stage publish \\\n              --issue \"${{ needs.setup.outputs.issue_number }}\" \\\n              --run-id \"${{ needs.agent-runner.outputs.run_id }}\" \\\n              --actor \"public-agent-publisher\" \\\n              --decision \"rejected\" \\\n              --reason \"$reason\" \\\n              --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${{ needs.setup.outputs.issue_number }},\\\"branch\\\":\\\"${branch}\\\"}\" \\\n              --failure-signature \"publisher-rejected\" \\\n              --evidence \"publish:.agent-run/publish-summary.json,bundle:.agent-run/bundle/manifest.json\" \\\n              --next-action \"human_required\" \\\n              --out-dir \"agent-sessions/${{ needs.agent-runner.outputs.run_id }}/decisions\"\n            echo \"ok=false\" >> \"$GITHUB_OUTPUT\"\n            echo \"reason=$reason\" >> \"$GITHUB_OUTPUT\"\n            exit 0\n          fi\n          bun scripts/public-agent-decision.ts \\\n            --stage publish \\\n            --issue \"${{ needs.setup.outputs.issue_number }}\" \\\n            --run-id \"${{ needs.agent-runner.outputs.run_id }}\" \\\n            --actor \"public-agent-publisher\" \\\n            --decision \"applied\" \\\n            --reason \"publisher validated and applied the agent bundle\" \\\n            --subject-json \"{\\\"type\\\":\\\"issue\\\",\\\"number\\\":${{ needs.setup.outputs.issue_number }},\\\"branch\\\":\\\"${branch}\\\"}\" \\\n            --evidence \"publish:.agent-run/publish-summary.json,bundle:.agent-run/bundle/manifest.json\" \\\n            --next-action \"create_or_update_pr\" \\\n            --out-dir \"agent-sessions/${{ needs.agent-runner.outputs.run_id }}/decisions\"\n          echo \"ok=true\" >> \"$GITHUB_OUTPUT\"\n\n      - name: Comment on publisher rejection\n        if: steps.validate_bundle.outputs.ok == 'false'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          reason=\"$(jq -r '.reason // \"publisher rejected the agent bundle\"' .agent-run/publish-summary.json)\"\n          cat > /tmp/public-agent-publish-rejected.md <<EOF\n          Agent run blocked: publisher rejected the generated bundle.\n\n          ${reason}\n          EOF\n          gh issue comment \"${{ needs.setup.outputs.issue_number }}\" --body-file /tmp/public-agent-publish-rejected.md\n\n      - uses: actions/upload-artifact@v4\n        if: always() && hashFiles('agent-sessions/${{ needs.agent-runner.outputs.run_id }}/decisions/*.json') != ''\n        with:\n          name: agent-publisher-decisions-${{ needs.agent-runner.outputs.run_id }}\n          path: |\n            agent-sessions/${{ needs.agent-runner.outputs.run_id }}/decisions\n            .agent-run/publish-summary.json\n            .agent-run/publish-error.log\n          if-no-files-found: warn\n\n      - name: Stop after publisher rejection\n        if: steps.validate_bundle.outputs.ok == 'false'\n        run: exit 1\n\n      - name: Create or update pull request\n        id: publish_pr\n        if: steps.validate_bundle.outputs.ok == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          branch=\"${{ needs.setup.outputs.target_branch }}\"\n          git config user.name \"volter-agent\"\n          git config user.email \"volter-agent@users.noreply.github.com\"\n          git config core.filemode false\n          cp .agent-run/bundle/pr-body.md /tmp/public-agent-pr-body.md\n          rm -rf .agent-run\n          git add .\n          if git diff --cached --quiet; then\n            gh issue comment \"${{ needs.setup.outputs.issue_number }}\" --body-file /tmp/public-agent-pr-body.md\n            echo \"pr_number=\" >> \"$GITHUB_OUTPUT\"\n            exit 0\n          fi\n          git commit -m \"agent: run ${{ needs.agent-runner.outputs.run_id }}\"\n          git push --force-with-lease origin \"$branch\"\n          existing_pr=\"$(gh pr list --head \"$branch\" --json number --jq '.[0].number // empty')\"\n          if [[ -n \"$existing_pr\" ]]; then\n            gh issue comment \"$existing_pr\" --body-file /tmp/public-agent-pr-body.md\n            echo \"pr_number=$existing_pr\" >> \"$GITHUB_OUTPUT\"\n          else\n            pr_url=\"$(gh pr create \\\n              --base \"${{ github.event.repository.default_branch }}\" \\\n              --head \"$branch\" \\\n              --title \"Agent run ${{ needs.agent-runner.outputs.run_id }}\" \\\n              --body-file /tmp/public-agent-pr-body.md)\"\n            echo \"pr_number=${pr_url##*/}\" >> \"$GITHUB_OUTPUT\"\n          fi\n\n  post-publish-ci:\n    needs: [setup, publisher]\n    if: needs.publisher.result == 'success' && needs.publisher.outputs.pr_number != ''\n    runs-on: ubuntu-latest\n    timeout-minutes: 30\n    permissions:\n      contents: read\n      pull-requests: read\n      statuses: write\n    outputs:\n      decision: ${{ steps.ci.outputs.decision }}\n      reason: ${{ steps.ci.outputs.reason }}\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          ref: ${{ needs.publisher.outputs.branch }}\n          persist-credentials: false\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - name: Run read-only CI gate\n        id: local_ci\n        continue-on-error: true\n        run: bun run check\n\n      - name: Evaluate CI result\n        id: ci\n        run: |\n          mkdir -p .agent-run\n          conclusion=\"SUCCESS\"\n          if [[ \"${{ steps.local_ci.outcome }}\" != \"success\" ]]; then\n            conclusion=\"FAILURE\"\n          fi\n          jq -n \\\n            --arg name \"ci\" \\\n            --arg conclusion \"$conclusion\" \\\n            --arg completedAt \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" \\\n            '[{name: $name, state: \"COMPLETED\", conclusion: $conclusion, completedAt: $completedAt}]' \\\n            > .agent-run/checks.json\n          bun scripts/public-agent-ci.ts \\\n            --checks .agent-run/checks.json \\\n            --out .agent-run/ci.json || true\n\n      - name: Publish PR CI status\n        if: always()\n        env:\n          GH_TOKEN: ${{ github.token }}\n          PR_NUMBER: ${{ needs.publisher.outputs.pr_number }}\n          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n        run: |\n          head_sha=\"$(gh pr view \"$PR_NUMBER\" --json headRefOid --jq .headRefOid)\"\n          decision=\"$(jq -r '.decision // \"blocked\"' .agent-run/ci.json)\"\n          reason=\"$(jq -r '.reason // \"CI did not produce a decision.\"' .agent-run/ci.json)\"\n          state=\"failure\"\n          if [[ \"$decision\" == \"pass\" ]]; then\n            state=\"success\"\n          elif [[ \"$decision\" == \"wait\" ]]; then\n            state=\"pending\"\n          fi\n          gh api \\\n            --method POST \\\n            \"repos/${GITHUB_REPOSITORY}/statuses/${head_sha}\" \\\n            -f state=\"$state\" \\\n            -f context=\"ci\" \\\n            -f target_url=\"$RUN_URL\" \\\n            -f description=\"public-agent CI: ${decision} - ${reason}\"\n\n      - uses: actions/upload-artifact@v4\n        with:\n          name: agent-ci-${{ needs.setup.outputs.run_id }}\n          path: .agent-run/ci.json\n          if-no-files-found: error\n\n  post-publish-review:\n    needs: [setup, publisher, post-publish-ci]\n    if: needs.publisher.result == 'success' && needs.publisher.outputs.pr_number != '' && needs.post-publish-ci.result == 'success'\n    runs-on: ubuntu-latest\n    timeout-minutes: 20\n    permissions:\n      contents: write\n      issues: write\n      pull-requests: write\n      actions: write\n      statuses: write\n      id-token: write\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          persist-credentials: false\n\n      - uses: oven-sh/setup-bun@v2\n\n      - name: Install dependencies\n        run: bun install --frozen-lockfile || bun install\n\n      - uses: actions/download-artifact@v4\n        with:\n          name: agent-ci-${{ needs.setup.outputs.run_id }}\n          path: .agent-run\n\n      - name: Prepare review context\n        env:\n          GH_TOKEN: ${{ github.token }}\n          PR_NUMBER: ${{ needs.publisher.outputs.pr_number }}\n          TARGET_BRANCH: ${{ needs.publisher.outputs.branch }}\n        run: |\n          mkdir -p .agent-run\n          pr=\"$PR_NUMBER\"\n          issue=\"${{ needs.setup.outputs.issue_number }}\"\n          gh issue view \"$pr\" \\\n            --json number,title,body,author \\\n            --jq '{number,title,body,user:{login:.author.login}}' \\\n            > .agent-run/issue.json\n          gh issue view \"$issue\" --json comments > .agent-run/issue-comments.json\n          gh issue view \"$pr\" --json comments > .agent-run/pr-comments.json\n          gh issue view \"$pr\" --json labels,comments > .agent-run/pr-blockers.json\n          gh issue view \"$issue\" --json labels > .agent-run/issue-labels.json\n          jq -s '{labels: ((.[0].labels // []) + (.[1].labels // []) | unique_by(.name)), comments: (.[0].comments // [])}' \\\n            .agent-run/pr-blockers.json .agent-run/issue-labels.json > .agent-run/merge-blockers.json\n          head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n          jq -n \\\n            --arg branch \"$TARGET_BRANCH\" \\\n            --arg head_sha \"$head_sha\" \\\n            --argjson issue \"$issue\" \\\n            --argjson pr \"$pr\" \\\n            '{kind:\"pull_request\", issue:$issue, pull_request:$pr, branch:$branch, head_sha:$head_sha, can_develop:true}' \\\n            > .agent-run/target.json\n          gh pr diff \"$pr\" > .agent-run/diff.patch\n\n      - name: Handle CI gate result\n        id: ci_followup\n        env:\n          GH_TOKEN: ${{ github.token }}\n          CI_DECISION: ${{ needs.post-publish-ci.outputs.decision }}\n          MAX_AUTO_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_AUTO_RETRIES || '2' }}\n          RUN_ID: ${{ needs.setup.outputs.run_id }}\n          TARGET_BRANCH: ${{ needs.publisher.outputs.branch }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          if [[ \"$CI_DECISION\" == \"pass\" ]]; then\n            echo \"continue_review=true\" >> \"$GITHUB_OUTPUT\"\n            exit 0\n          fi\n          echo \"continue_review=false\" >> \"$GITHUB_OUTPUT\"\n          decision=\"$(jq -r '.decision' .agent-run/ci.json)\"\n          reason=\"$(jq -r '.reason' .agent-run/ci.json)\"\n          if [[ \"$decision\" == \"develop_retry\" ]]; then\n            bun scripts/public-agent-loop-budget.ts \\\n              --kind ci \\\n              --reason \"$reason\" \\\n              --max-attempts \"$MAX_AUTO_RETRIES\" \\\n              --issue-comments .agent-run/issue-comments.json \\\n              --pr-comments .agent-run/pr-comments.json \\\n              --out .agent-run/loop-budget.json\n            loop_decision=\"$(jq -r '.decision' .agent-run/loop-budget.json)\"\n            loop_reason=\"$(jq -r '.reason' .agent-run/loop-budget.json)\"\n            loop_signature=\"$(jq -r '.failure_signature' .agent-run/loop-budget.json)\"\n            attempt_index=\"$(jq -r '(.next_attempt // .attempts // .max_attempts)' .agent-run/loop-budget.json)\"\n            attempt_max=\"$(jq -r '.max_attempts' .agent-run/loop-budget.json)\"\n            git config user.name \"volter-agent\"\n            git config user.email \"volter-agent@users.noreply.github.com\"\n            git remote set-url origin \"https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git\"\n            git fetch origin \"$TARGET_BRANCH\"\n            git checkout -B \"$TARGET_BRANCH\" \"origin/$TARGET_BRANCH\"\n            mkdir -p \"agent-sessions/${RUN_ID}/decisions\"\n            bun scripts/public-agent-decision.ts \\\n              --stage retry \\\n              --issue \"$issue\" \\\n              --pr \"$pr\" \\\n              --run-id \"$RUN_ID\" \\\n              --actor \"public-agent-loop-budget\" \\\n              --decision \"$loop_decision\" \\\n              --reason \"$loop_reason\" \\\n              --failure-signature \"$loop_signature\" \\\n              --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${TARGET_BRANCH}\\\"}\" \\\n              --attempt-json \"{\\\"kind\\\":\\\"retry\\\",\\\"index\\\":${attempt_index},\\\"max\\\":${attempt_max}}\" \\\n              --evidence \"ci:.agent-run/ci.json,loop_budget:.agent-run/loop-budget.json\" \\\n              --next-action \"$(if [[ \"$loop_decision\" == \"retry\" ]]; then echo \"develop\"; else echo \"human_required\"; fi)\" \\\n              --out-dir \"agent-sessions/${RUN_ID}/decisions\"\n            git add \"agent-sessions/${RUN_ID}/decisions\"\n            if ! git diff --cached --quiet; then\n              git commit -m \"agent: record retry decision for ${RUN_ID}\"\n              git push origin \"$TARGET_BRANCH\"\n            fi\n            if [[ \"$loop_decision\" == \"retry\" ]]; then\n              jq -r '.comment' .agent-run/loop-budget.json > /tmp/public-agent-ci-retry.md\n              gh issue comment \"$issue\" --body-file /tmp/public-agent-ci-retry.md\n              gh issue comment \"$pr\" --body-file /tmp/public-agent-ci-retry.md\n              gh workflow run public-agent.yml \\\n                --ref \"${GITHUB_REF_NAME}\" \\\n                -f issue_number=\"$issue\" \\\n                -f command=\"/agent develop\"\n              exit 0\n            fi\n            gh issue comment \"$pr\" --body \"Agent review blocked: ${loop_reason}. ${reason}\"\n            exit 0\n          fi\n          if [[ \"$decision\" == \"human_required\" ]]; then\n            gh issue comment \"$pr\" --body \"Agent review requires human review: CI gate is ${decision}. ${reason}\"\n          else\n            gh issue comment \"$pr\" --body \"Agent review blocked: CI gate is ${decision}. ${reason}\"\n          fi\n\n      - name: Mint reviewer model token\n        if: steps.ci_followup.outputs.continue_review == 'true'\n        id: review_mint\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-mint.ts \\\n            --issue .agent-run/issue.json \\\n            --models \"${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --max-usd-cents \"${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}\" \\\n            --max-requests \"2\" \\\n            --purpose review\n\n      - name: Review pull request\n        if: steps.ci_followup.outputs.continue_review == 'true'\n        id: agent_review\n        continue-on-error: true\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_TOKEN: ${{ steps.review_mint.outputs.token }}\n        run: |\n          bun scripts/public-agent-review.ts \\\n            --diff .agent-run/diff.patch \\\n            --ci .agent-run/ci.json \\\n            --provider \"${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'openai' }}\" \\\n            --model \"${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}\" \\\n            --out .agent-run/review.json\n\n      - name: Complete reviewer run\n        if: always() && steps.review_mint.outputs.run_id != ''\n        env:\n          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}\n          MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}\n        run: |\n          bun scripts/model-proxy-revoke.ts --run-id \"${{ steps.review_mint.outputs.run_id }}\" || true\n\n      - name: Decide merge\n        if: steps.ci_followup.outputs.continue_review == 'true'\n        id: merge_gate\n        continue-on-error: true\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          reviewed_head_sha=\"$(jq -r '.head_sha // empty' .agent-run/target.json)\"\n          current_head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n          bun scripts/public-agent-merge-gate.ts \\\n            --target .agent-run/target.json \\\n            --ci .agent-run/ci.json \\\n            --review .agent-run/review.json \\\n            --blockers .agent-run/merge-blockers.json \\\n            --reviewed-head-sha \"$reviewed_head_sha\" \\\n            --current-head-sha \"$current_head_sha\" \\\n            --out .agent-run/merge-gate.json\n\n      - name: Publish review decision\n        if: always() && steps.ci_followup.outputs.continue_review == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          verdict=\"$(jq -r '.verdict // \"failed\"' .agent-run/review.json 2>/dev/null || echo failed)\"\n          risk=\"$(jq -r '.risk // \"unknown\"' .agent-run/review.json 2>/dev/null || echo unknown)\"\n          summary=\"$(jq -r '.summary // \"Reviewer did not produce a valid verdict.\"' .agent-run/review.json 2>/dev/null || echo \"Reviewer did not produce a valid verdict.\")\"\n          gate=\"$(jq -r '.decision // \"human_required\"' .agent-run/merge-gate.json 2>/dev/null || echo human_required)\"\n          reason=\"$(jq -r '.reason // \"Merge gate did not pass.\"' .agent-run/merge-gate.json 2>/dev/null || echo \"Merge gate did not pass.\")\"\n          cat > /tmp/public-agent-review.md <<EOF\n          Agent review: ${verdict}\n          Risk: ${risk}\n          Merge gate: ${gate}\n\n          ${summary}\n\n          ${reason}\n          EOF\n          gh issue comment \"$pr\" --body-file /tmp/public-agent-review.md\n\n      - name: Persist review and merge decisions\n        if: always() && steps.ci_followup.outputs.continue_review == 'true'\n        env:\n          GH_TOKEN: ${{ github.token }}\n          RUN_ID: ${{ needs.setup.outputs.run_id }}\n          TARGET_BRANCH: ${{ needs.publisher.outputs.branch }}\n          GATE_DECISION: ${{ steps.merge_gate.outputs.decision }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          branch=\"$TARGET_BRANCH\"\n          verdict=\"$(jq -r '.verdict // \"fail\"' .agent-run/review.json 2>/dev/null || echo fail)\"\n          risk=\"$(jq -r '.risk // \"high\"' .agent-run/review.json 2>/dev/null || echo high)\"\n          gate=\"$(jq -r '.decision // \"human_required\"' .agent-run/merge-gate.json 2>/dev/null || echo human_required)\"\n          reason=\"$(jq -r '.reason // \"Merge gate did not pass.\"' .agent-run/merge-gate.json 2>/dev/null || echo \"Merge gate did not pass.\")\"\n          summary=\"$(jq -r '.summary // \"Reviewer did not produce a valid verdict.\"' .agent-run/review.json 2>/dev/null || echo \"Reviewer did not produce a valid verdict.\")\"\n          head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n\n          git config user.name \"volter-agent\"\n          git config user.email \"volter-agent@users.noreply.github.com\"\n          git remote set-url origin \"https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git\"\n          git fetch origin \"$branch\"\n          git checkout -B \"$branch\" \"origin/$branch\"\n          mkdir -p \"agent-sessions/${RUN_ID}/decisions\"\n          ci_decision=\"$(jq -r '.decision // \"blocked\"' .agent-run/ci.json)\"\n          ci_reason=\"$(jq -r '.reason // \"CI did not produce a decision.\"' .agent-run/ci.json)\"\n\n          bun scripts/public-agent-decision.ts \\\n            --stage ci \\\n            --issue \"$issue\" \\\n            --pr \"$pr\" \\\n            --run-id \"$RUN_ID\" \\\n            --actor \"public-agent-ci\" \\\n            --decision \"$ci_decision\" \\\n            --reason \"$ci_reason\" \\\n            --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${branch}\\\",\\\"head_sha\\\":\\\"${head_sha}\\\"}\" \\\n            --evidence \"ci:.agent-run/ci.json,checks:.agent-run/checks.json\" \\\n            --next-action \"$(if [[ \"$ci_decision\" == \"pass\" ]]; then echo \"review\"; elif [[ \"$ci_decision\" == \"develop_retry\" ]]; then echo \"develop\"; else echo \"escalate\"; fi)\" \\\n            --out-dir \"agent-sessions/${RUN_ID}/decisions\"\n\n          bun scripts/public-agent-decision.ts \\\n            --stage review \\\n            --issue \"$issue\" \\\n            --pr \"$pr\" \\\n            --run-id \"$RUN_ID\" \\\n            --actor \"agent-reviewer\" \\\n            --decision \"$verdict\" \\\n            --risk \"$risk\" \\\n            --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${branch}\\\",\\\"head_sha\\\":\\\"${head_sha}\\\"}\" \\\n            --evidence \"ci:$(jq -r '.decision // \"unknown\"' .agent-run/ci.json),review:${verdict},risk:${risk}\" \\\n            --next-action \"$gate\" \\\n            --out-dir \"agent-sessions/${RUN_ID}/decisions\"\n\n          bun scripts/public-agent-decision.ts \\\n            --stage merge_gate \\\n            --issue \"$issue\" \\\n            --pr \"$pr\" \\\n            --run-id \"$RUN_ID\" \\\n            --actor \"public-agent-merge-gate\" \\\n            --decision \"$gate\" \\\n            --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${branch}\\\",\\\"head_sha\\\":\\\"${head_sha}\\\"}\" \\\n            --reason \"$reason\" \\\n            --evidence \"ci:$(jq -r '.decision // \"unknown\"' .agent-run/ci.json),review:${verdict},merge_gate:${gate}\" \\\n            --next-action \"$(if [[ \"$gate\" == \"merge\" ]]; then echo \"merge\"; elif [[ \"$gate\" == \"human_required\" ]]; then echo \"human_required\"; else echo \"blocked\"; fi)\" \\\n            --out-dir \"agent-sessions/${RUN_ID}/decisions\"\n\n          git add \"agent-sessions/${RUN_ID}/decisions\"\n          if ! git diff --cached --quiet; then\n            git commit -m \"agent: record review decisions for ${RUN_ID}\"\n            git push origin \"$branch\"\n          fi\n          merge_head_sha=\"$(git rev-parse HEAD)\"\n          for attempt in {1..20}; do\n            current_head_sha=\"$(gh pr view \"$pr\" --json headRefOid --jq .headRefOid)\"\n            if [[ \"$current_head_sha\" == \"$merge_head_sha\" ]]; then\n              break\n            fi\n            if [[ \"$attempt\" == \"20\" ]]; then\n              echo \"PR #${pr} head did not reflect pushed evidence commit. expected=${merge_head_sha} current=${current_head_sha}\"\n              exit 1\n            fi\n            sleep 3\n          done\n          if [[ \"$gate\" == \"merge\" && \"$ci_decision\" == \"pass\" ]]; then\n            gh api \\\n              --method POST \\\n              \"repos/${GITHUB_REPOSITORY}/statuses/${merge_head_sha}\" \\\n              -f state=\"success\" \\\n              -f context=\"ci\" \\\n              -f target_url=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" \\\n              -f description=\"public-agent CI: pass - evidence commit recorded after required CI pass\"\n            for attempt in {1..10}; do\n              status_state=\"$(gh api \"repos/${GITHUB_REPOSITORY}/commits/${merge_head_sha}/status\" --jq .state)\"\n              if [[ \"$status_state\" == \"success\" ]]; then\n                break\n              fi\n              if [[ \"$attempt\" == \"10\" ]]; then\n                echo \"Evidence commit status did not become successful. sha=${merge_head_sha} state=${status_state}\"\n                exit 1\n              fi\n              sleep 2\n            done\n          fi\n          printf '%s\\n' \"$merge_head_sha\" > .agent-run/merge-head-sha\n\n      - name: Retry safe review failures\n        if: steps.merge_gate.outputs.decision == 'develop_retry'\n        env:\n          GH_TOKEN: ${{ github.token }}\n          MAX_AUTO_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_AUTO_RETRIES || '2' }}\n          RUN_ID: ${{ needs.setup.outputs.run_id }}\n          TARGET_BRANCH: ${{ needs.publisher.outputs.branch }}\n        run: |\n          pr=\"$(jq -r '.pull_request' .agent-run/target.json)\"\n          issue=\"$(jq -r '.issue' .agent-run/target.json)\"\n          reason=\"$(jq -r '.reason // \"review did not pass\"' .agent-run/merge-gate.json)\"\n          bun scripts/public-agent-loop-budget.ts \\\n            --kind review \\\n            --reason \"$reason\" \\\n            --max-attempts \"$MAX_AUTO_RETRIES\" \\\n            --issue-comments .agent-run/issue-comments.json \\\n            --pr-comments .agent-run/pr-comments.json \\\n            --out .agent-run/loop-budget.json\n          loop_decision=\"$(jq -r '.decision' .agent-run/loop-budget.json)\"\n          loop_reason=\"$(jq -r '.reason' .agent-run/loop-budget.json)\"\n          loop_signature=\"$(jq -r '.failure_signature' .agent-run/loop-budget.json)\"\n          attempt_index=\"$(jq -r '(.next_attempt // .attempts // .max_attempts)' .agent-run/loop-budget.json)\"\n          attempt_max=\"$(jq -r '.max_attempts' .agent-run/loop-budget.json)\"\n          git config user.name \"volter-agent\"\n          git config user.email \"volter-agent@users.noreply.github.com\"\n          git remote set-url origin \"https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git\"\n          git fetch origin \"$TARGET_BRANCH\"\n          git checkout -B \"$TARGET_BRANCH\" \"origin/$TARGET_BRANCH\"\n          mkdir -p \"agent-sessions/${RUN_ID}/decisions\"\n          bun scripts/public-agent-decision.ts \\\n            --stage retry \\\n            --issue \"$issue\" \\\n            --pr \"$pr\" \\\n            --run-id \"$RUN_ID\" \\\n            --actor \"public-agent-loop-budget\" \\\n            --decision \"$loop_decision\" \\\n            --reason \"$loop_reason\" \\\n            --failure-signature \"$loop_signature\" \\\n            --subject-json \"{\\\"type\\\":\\\"pr\\\",\\\"number\\\":${pr},\\\"branch\\\":\\\"${TARGET_BRANCH}\\\"}\" \\\n            --attempt-json \"{\\\"kind\\\":\\\"retry\\\",\\\"index\\\":${attempt_index},\\\"max\\\":${attempt_max}}\" \\\n            --evidence \"merge_gate:.agent-run/merge-gate.json,loop_budget:.agent-run/loop-budget.json\" \\\n            --next-action \"$(if [[ \"$loop_decision\" == \"retry\" ]]; then echo \"develop\"; else echo \"human_required\"; fi)\" \\\n            --out-dir \"agent-sessions/${RUN_ID}/decisions\"\n          git add \"agent-sessions/${RUN_ID}/decisions\"\n          if ! git diff --cached --quiet; then\n            git commit -m \"agent: record retry decision for ${RUN_ID}\"\n            git push origin \"$TARGET_BRANCH\"\n          fi\n          if [[ \"$loop_decision\" == \"retry\" ]]; then\n            jq -r '.comment' .agent-run/loop-budget.json > /tmp/public-agent-review-retry.md\n            gh issue comment \"$issue\" --body-file /tmp/public-agent-review-retry.md\n            gh issue comment \"$pr\" --body-file /tmp/public-agent-review-retry.md\n            gh workflow run public-agent.yml \\\n              --ref \"${GITHUB_REF_NAME}\" \\\n              -f issue_number=\"$issue\" \\\n              -f command=\"/agent develop\"\n            exit 0\n          fi\n          gh issue comment \"$pr\" --