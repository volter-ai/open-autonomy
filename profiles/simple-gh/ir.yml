# simple-gh — a local, human-supervised GitHub loop with three disjoint scheduled roles.
#
# Manager executes the approved roadmap. Planner grows the product roadmap from vision versus
# repository reality. Kaizen studies run history for process failures. Task state belongs to the
# configured task service; branches, checks, reviews, and merges belong to the GitHub code host; the
# local substrate only schedules and runs actors.
schema: autonomy.ir.v1

targets: [local]
codeHost: github

agents:
  manager:
    behavior: manager
    execution: { workspace: isolated }
    capabilities: [code:propose, tasks:author, tasks:converse, agent:launch@maintainer]
    triggers:
      - cron: "*/30 * * * *"

  planner:
    behavior: planner
    execution: { workspace: isolated }
    capabilities: [tasks:author, tasks:converse, code:propose]
    triggers:
      - cron: "23 6 * * *"

  kaizen:
    behavior: kaizen
    execution: { workspace: isolated }
    capabilities: [tasks:author, tasks:converse, code:propose]
    triggers:
      - cron: "41 7 * * 4"

  maintainer:
    kind: human
    behavior: maintainer
    capabilities: [tasks:converse, code:review]
    triggers:
      - dispatch: true

policy:
  maxConcurrent: 1
  box:
    tracker:
      tool: npx ztrack
      # BL-29: this names the ztrack preset, not the unrelated simple-gh-sdlc OA profile.
      ztrackPreset: simple-gh-sdlc

    # Portable lifecycle names mapped onto the bundled ztrack preset. Agents consume these through the
    # task service; the scheduler never reads them.
    taskStates:
      open: draft
      ready: ready
      working: in-progress
      review: in-review
      inputRequired: human-required
      blocked: blocked
      done: done
      rejected: rejected

    models:
      research: strongest
      implement: capable

    risk:
      human_required_paths:
        - .github/workflows/**
        - .claude/skills/**
        - .codex/skills/**
        - .open-autonomy/**
        - scheduler/run.mjs
        - scheduler/schedule.json
        - scripts/prompts/**
        - scripts/run-agent.mjs
        - scripts/runner-defaults.mjs
        - scripts/runner.ts
        - scripts/autonomy-runner.mjs
        - scripts/agent.ts
        - scripts/agent-propose.ts
        - scripts/agent-visual-verify.ts
        - scripts/transcript.ts
        - profiles/**/skills/**
        - .volter/tracker/validation/**

resources:
  - .claude/settings.json
  - .codex/hooks.json
  - standards/workflow.md
  - standards/issue-and-evidence.md
  - standards/risk-and-review.md
