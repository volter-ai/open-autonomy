name: Open Autonomy Upgrade

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Open an upgrade pull request
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OPEN_AUTONOMY_TEMPLATE_REPO: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REPO || 'volter-ai/open-autonomy' }}
  OPEN_AUTONOMY_TEMPLATE_REF: ${{ vars.OPEN_AUTONOMY_TEMPLATE_REF || 'main' }}

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Resolve upgrade template
        id: template
        run: |
          set -euo pipefail
          out="$PWD/.agent-run/open-autonomy-template"
          mkdir -p "$(dirname "$out")"
          # The canonical installation is COMPILED from the open-autonomy profile — there is no
          # hand-maintained template. Compile in the local checkout if this is open-autonomy itself,
          # otherwise clone it and compile there.
          if [[ -f profiles/repo-maintenance/ir.yml ]]; then
            src="$PWD"
          else
            git clone --depth 1 --branch "$OPEN_AUTONOMY_TEMPLATE_REF" \
              "https://github.com/${OPEN_AUTONOMY_TEMPLATE_REPO}.git" \
              "$PWD/.agent-run/open-autonomy-src"
            src="$PWD/.agent-run/open-autonomy-src"
          fi
          ( cd "$src" \
            && (bun install --frozen-lockfile || bun install) \
            && bun bin/autonomy-compile.ts profiles/repo-maintenance github "$out" )
          echo "path=.agent-run/open-autonomy-template" >> "$GITHUB_OUTPUT"

      - name: Build upgrade plan
        run: |
          mkdir -p .agent-run/upgrade
          bun scripts/open-autonomy-upgrade.ts \
            --template "${{ steps.template.outputs.path }}" \
            --target . \
            --out .agent-run/upgrade/plan.json

      - name: Apply upgrade and open PR
        if: inputs.apply == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          changes="$(jq '.changes | length' .agent-run/upgrade/plan.json)"
          if [[ "$changes" == "0" ]]; then
            echo "No upgrade changes to apply."
            exit 0
          fi
          branch="open-autonomy/upgrade-${GITHUB_RUN_ID}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$branch"
          bun scripts/open-autonomy-upgrade.ts \
            --template "${{ steps.template.outputs.path }}" \
            --target . \
            --apply \
            --out .agent-run/upgrade/plan-applied.json
          git add AGENTS.md VERSION .open-autonomy .github/workflows scripts docs
          git commit -m "chore: upgrade open-autonomy template"
          git push --set-upstream origin "$branch"
          jq -r '.migration_notes[]' .agent-run/upgrade/plan.json > .agent-run/upgrade/body.md
          gh pr create \
            --title "chore: upgrade open-autonomy template" \
            --body-file .agent-run/upgrade/body.md \
            --base "${GITHUB_REF_NAME}" \
            --head "$branch"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-autonomy-upgrade-${{ github.run_id }}
          path: .agent-run/upgrade
          if-no-files-found: warn
