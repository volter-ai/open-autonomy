# simple-sdlc — a four-agent software-delivery loop (PM, draft, develop, review), expressed in the
# autonomy IR. Ported from the ztrack `simple-sdlc` profile: a scheduled PM that enforces WIP and routes
# work, a drafter that shapes raw requests into verifiable Ready issues, a developer that implements one
# Ready issue with evidence, and a reviewer that gates an In-Review change against ztrack's checks.
#
# Every agent is a prose skill (model-interpreted): the substrate runs each via the privilege-separated
# wrapper. The PM is the ONLY autonomous trigger (cron); the three workers are `dispatch` agents — the PM
# reads the ztrack board on its tick and LAUNCHES the matching worker through the Runner (`agent:launch`),
# forwarding the work item as `--ref` (the worker reads it as $ZTRACK_ISSUE via its `subject.ref` param).
# This is fully substrate-agnostic: cron + agent:launch are the two portable primitives — there is no
# `task:` trigger and no substrate task-state watching (docs/SPEC.md#the-runner). One unit: an agent = behavior +
# capabilities + triggers(+params). See docs/SPEC.md#the-ir.
schema: autonomy.ir.v1
# LOCAL only: simple-sdlc is PR-free (review = the reviewer's verdict over commit-evidence, no pull
# request). The github substrate realizes `code:propose` as an auto-merging PR gated by an independent
# `agent-review` status — a boundary this profile doesn't provide — so a PR-free process can't land on
# github. The GitHub PR-based SDLC is `simple-gh-sdlc`'s job (its preset + a github reviewer edge).
targets: [local]

agents:
  # The only dispatcher. Sweeps the board on a tick, enforces WIP (≤1 in-progress, ≤1 in-review), and
  # LAUNCHES the next eligible worker (draft/develop/review) through the Runner, routing worker outcomes.
  pm:
    behavior: pm
    capabilities: [tasks:converse, agent:launch, agent:list]
    triggers:
      - cron: "*/15 * * * *"

  # Turns an untriaged request into a verifiable Ready issue (source-grounded summary, 1-3 ACs, evidence
  # scaffold). Launched by the PM with the work item as --ref.
  draft:
    behavior: draft
    capabilities: [tasks:author, tasks:converse]
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # Implements exactly one Ready issue and produces real evidence for each AC; stops on a human-required
  # path/topic. Launched by the PM with the work item as --ref.
  develop:
    behavior: develop
    capabilities: [code:propose, tasks:converse]
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # Verifies one In-Review change: ztrack must be green, every passed AC backed by cited evidence, no
  # unapproved human-required path/topic — then moves it to Done or back for rework. Launched by the PM.
  review:
    behavior: review
    capabilities: [tasks:converse]
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

policy:
  maxConcurrent: 2   # the WIP ceiling: at most one in-progress + one in-review at a time
  box:
    wip:
      maxInProgress: 1
      maxInReview: 1
    risk:
      human_required_paths:
        - .github/workflows/**
        - .agents/skills/**
        - .claude/skills/**
        - profiles/**/skills/**
        - profiles/**/scheduler/**
        - .volter/tracker/validation/**
      human_required_topics: [auth, secrets, billing, deployment, destructive data migration, dependency trust]

# The shared standards every skill reads (carried verbatim into the installation).
resources:
  - standards/workflow.md
  - standards/issue-and-evidence.md
  - standards/risk-and-review.md
