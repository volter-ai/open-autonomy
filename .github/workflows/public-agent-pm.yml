name: pm
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
permissions: { contents: write, id-token: write, pull-requests: write, checks: read, issues: write, actions: write }
concurrency:
  group: "public-agent-pm"
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  pm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      OPENAI_BASE_URL: ${{ vars.MODEL_PROXY_URL }}/openai/v1
      ANTHROPIC_BASE_URL: ${{ vars.MODEL_PROXY_URL }}/anthropic
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      PM_COMMENT_TOKEN: ${{ secrets.PUBLIC_AGENT_TRIGGER_TOKEN || github.token }}
      PUBLIC_AGENT_PM_LIMIT: ${{ vars.PUBLIC_AGENT_PM_LIMIT || '10' }}
      PUBLIC_AGENT_PM_MODEL: ${{ vars.PUBLIC_AGENT_PM_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}
      PUBLIC_AGENT_PM_PROVIDER: ${{ vars.PUBLIC_AGENT_PM_PROVIDER || vars.PUBLIC_AGENT_TRIAGE_PROVIDER || 'openai' }}
      PUBLIC_AGENT_REPO_PAUSED: ${{ vars.PUBLIC_AGENT_REPO_PAUSED || 'false' }}
      PUBLIC_AGENT_PM_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_PM_MAX_USD_CENTS || '25' }}
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/agent-pm.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pm-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
