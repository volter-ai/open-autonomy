name: open-autonomy-governance-report
on:
  schedule:
    - cron: "43 6 * * 1"
  workflow_dispatch: {}
permissions: { contents: read }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  open-autonomy-governance-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Build decision index
        run: |
          mkdir -p .agent-run/governance
          bun scripts/public-agent-decision-index.ts --out .agent-run/governance/decision-index.json
      - name: Build governance report
        run: bun scripts/open-autonomy-governance-report.ts --index .agent-run/governance/decision-index.json --out .agent-run/governance/report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-autonomy-governance-report-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
