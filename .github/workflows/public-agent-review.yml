name: reviewer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue/PR number to act on", required: false, type: string }
  issue_comment:
    types: [created]
  pull_request_target:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
permissions: {}
concurrency:
  group: "public-agent-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}"
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  control:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, actions: write }
    env:
      GH_TOKEN: ${{ github.token }}
      CONTROL_WORKFLOW: reviewer.yml
    steps:
      - uses: actions/checkout@v4
      - run: node .github/agent-control.mjs
  setup:
    if: github.event_name != 'issue_comment' || !startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: read, id-token: write }
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Build issue payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${TARGET_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh issue view "$ref" --json number,title,body,author,labels,comments --jq '{number,title,body,user:{login:.author.login},labels,comments}' > .agent-run/issue.json
      - name: Mint bounded model token
        run: bun scripts/model-proxy-mint.ts --run-id "ir-reviewer-${{ github.run_id }}" --models "${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}" --max-usd-cents "${{ vars.PUBLIC_AGENT_MAX_USD_CENTS || '200' }}" --max-requests "${{ vars.PUBLIC_AGENT_MAX_REQUESTS || '60' }}" --issue .agent-run/issue.json
  reviewer:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { contents: read, issues: read, pull-requests: read, id-token: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      PUBLIC_AGENT_MODEL: ${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_CITED_VERSION: ${{ vars.PUBLIC_AGENT_CLAUDE_CODE_VERSION }}
      GH_TOKEN: ${{ github.token }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
      PUBLIC_AGENT_MAX_CI_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_CI_RETRIES || '2' }}
      PUBLIC_AGENT_MAX_REVIEW_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_REVIEW_RETRIES || '2' }}
      PUBLIC_AGENT_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'anthropic' }}
      PUBLIC_AGENT_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: install Claude Code CLI
        run: npm install -g "@anthropic-ai/claude-code@${PUBLIC_AGENT_CITED_VERSION:-latest}" && claude --version
      - name: Prepare agent input (privileged read)
        run: bun scripts/prepare-review.ts
      - name: Exchange OIDC for the bounded token
        run: bun scripts/model-proxy-exchange.ts --run-id "ir-reviewer-${{ github.run_id }}" --audience "$MODEL_PROXY_OIDC_AUDIENCE"
      - name: Run agent (Claude Code + skill) and bundle the result
        run: |
          bun scripts/github-agent-session.ts --issue .agent-run/issue.json --run-id "ir-reviewer-${{ github.run_id }}" --out .agent-run/out --repo "${{ github.repository }}" --actor "${{ github.actor }}" -- bash -lc "bun scripts/claude-agent-run.ts --skill .codex/skills/reviewer/SKILL.md --result-schema .open-autonomy/results/reviewer.schema.json; rc=\$?; bun scripts/agent-visual-verify.ts || true; exit \$rc"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-bundle-${{ github.run_id }}
          path: .agent-run/out/bundle
          if-no-files-found: error
  publisher:
    needs: [setup, reviewer]
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write, actions: write, issues: write, pull-requests: write, checks: read, statuses: read }
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
      PUBLIC_AGENT_MAX_CI_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_CI_RETRIES || '2' }}
      PUBLIC_AGENT_MAX_REVIEW_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_REVIEW_RETRIES || '2' }}
      PUBLIC_AGENT_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'anthropic' }}
      PUBLIC_AGENT_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - uses: actions/download-artifact@v4
        with:
          name: agent-bundle-${{ github.run_id }}
          path: .agent-run/bundle
      - name: Interpret the agent result (privileged action on the typed result)
        run: bun scripts/interpret-review.ts --bundle .agent-run/bundle --expected-run-id "ir-reviewer-${{ github.run_id }}" --expected-repo "${{ github.repository }}"
  revoke:
    needs: [setup, reviewer, publisher]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/model-proxy-revoke.ts --run-id "ir-reviewer-${{ github.run_id }}" || true
