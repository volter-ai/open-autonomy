# simple-gh-sdlc — the GitHub PR-based counterpart of simple-sdlc. Same ztrack-tracked dispatch loop
# (a cron PM that reads the board and launches workers via agent:launch), but the merge boundary is
# GitHub's: the developer's change lands as an auto-merging PR gated by an independent `agent-review`
# status (the code:review / code:propose permission split), not the local reviewer's verdict. Uses the
# ztrack `simple-gh-sdlc` preset (PR at in-review, merged PR for done). One unit: an agent = behavior +
# capabilities + triggers(+params) (+ review edge). See docs/SPEC.md#the-ir, docs/SPEC.md#the-runner.
schema: autonomy.ir.v1
# Runs on EITHER runner over a GitHub code host (runner ⟂ code host): `gh-actions` (agents run as Actions
# jobs) or `local` (agents run on your machine via termfleet, still opening auto-merging PRs on GitHub).
# Declaring both keeps `check:profiles` compiling simple-gh-sdlc to local too, catching substrate drift.
targets: [gh-actions, local]
codeHost: github

agents:
  # The only dispatcher. Sweeps the ztrack board on a tick, enforces WIP, and LAUNCHES the next eligible
  # worker (draft/develop) through the Runner. Review happens on the PR, not by a launched worker.
  pm:
    behavior: pm
    capabilities: [tasks:converse, agent:launch, agent:list]
    triggers:
      - cron: "*/15 * * * *"

  # Turns an untriaged request into a verifiable Ready issue (sources + 1-3 ACs + evidence scaffold).
  draft:
    behavior: draft
    capabilities: [tasks:author, tasks:converse]
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # Implements one Ready issue with evidence and pushes its branch; the substrate opens an auto-merging
  # PR. Its proposals are reviewed by `reviewer` — the substrate triggers that review when the PR opens
  # (the merge boundary; no PM/model routing). Holds code:propose, never code:review.
  develop:
    behavior: develop
    capabilities: [code:propose, tasks:converse]
    review: reviewer
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # The independent GitHub reviewer: verifies the developer's PR (ztrack green + every passed AC backed by
  # cited evidence + no unapproved human-required path) and posts the `agent-review` status (code:review =
  # statuses:write). Holds NO contents:write, so it cannot merge; native auto-merge lands the PR once
  # `ci` + `agent-review` are both green (docs/SPEC.md#capabilities — the merge boundary).
  reviewer:
    behavior: reviewer
    capabilities: [code:review, tasks:converse]
    triggers:
      - event: issue_comment
        config: { types: [created] }
        params:
          TARGET_REF: subject.ref
          SUBJECT_TEXT: subject.text
          ACTOR_ROLE: subject.actorRole
      - event: pull_request_target
        config: { types: [opened, synchronize, reopened, ready_for_review] }
    timeout: 20

policy:
  maxConcurrent: 2   # the WIP ceiling: at most one in-progress + one in-review at a time
  box:
    # (the WIP ceiling — one develop in flight, one in review — is the PM doctrine in standards/workflow.md;
    # policy.maxConcurrent is the enforced runner cap. No component reads a wip.* key.)
    # gh-actions runner config. The base profile SHIPS a security scan (security.yml) but, before this,
    # never made it a required merge gate: a bot PR fires no pull_request (GITHUB_TOKEN anti-recursion), so
    # security.yml never ran on the agent-PR path and a security finding could never block a merge. Mirrors
    # soc2-baseline's propose_dispatch_checks: the proposer effect dispatches security-gate.yml (the
    # dispatched, blocking realization of security.yml) with the PR head sha so its `security` status posts
    # and native auto-merge waits for it. model/proxy/bot fall back to defaults.
    gh-actions:
      propose_dispatch_checks: [security-gate.yml]
    tracker:
      # bin/autonomy-compile.ts's local-runner "next steps" print resolves the ztrack preset name from
      # THIS key first, falling back to the profile directory's basename only if it's absent (a bundled
      # profile's basename happens to equal its preset name today — the unrelated simple-gh profile's does
      # NOT, which is why IT needs this key spelled out explicitly; see its own BL-29 comment). FORKING
      # this profile? Keep this key — renaming the directory without it silently selects a nonexistent
      # preset (BL-29); the CLI warns loudly if the basename fallback doesn't match a bundled name, but an
      # explicit declaration survives the rename outright.
      ztrackPreset: simple-gh-sdlc
    autonomy:
      max_develop_attempts: 2   # the PM caps rework at this; without it a stuck issue re-launches develop forever
    risk:
      # The OA harness itself is human-required: an agent must never auto-merge a change to the runner, the
      # loop driver, the skills, or the manifest — that would let the loop rewrite/brick its own installation
      # through the same (single-token, self-blessing) gate that lands ordinary changes. Kept in sync with
      # standards/risk-and-review.md (the file the develop/reviewer skills actually enforce). Scoped to OA's
      # OWN files by name — NOT broad globs like `scripts/**`, which would block an adopter's own scripts.
      # In an ADOPTER repo, all of scripts/ is OA's INJECTED harness (not the adopter's product), so EVERY
      # OA-shipped file under scripts/ must be here — incl. the ones merge.yml/security.yml/security-gate.yml
      # execute (reconcile-merged-issues.ts, rearm-auto-merge.ts, check-supply-chain.ts) and scripts/prompts/** (the
      # launch→skill mapping) — or an in-scope issue could auto-merge a rewrite of that privileged machinery.
      # Listed by name (NOT scripts/**) so an adopter's own scripts/ isn't blocked. Mirrors
      # standards/risk-and-review.md, which the skills read.
      #
      # BL-29 dev/02 — FORK INSTRUCTION (kept manual, not automated; decision recorded in BACKLOG.md):
      # if you add a script to this profile's `resources:` list above that a carried workflow (merge.yml /
      # security.yml / security-gate.yml) EXECUTES, add its path here too, or an in-scope agent PR could auto-merge a rewrite
      # of that privileged machinery through the very gate it's supposed to enforce. A generic "every
      # scripts/ resource must be listed here" check was considered and REJECTED: this repo's own
      # self-driving profile legitimately ships scripts/ resources that are NOT gated here (e.g.
      # open-autonomy-preflight.ts, open-autonomy-upgrade-cli.ts, open-autonomy-config.ts — maintainer-run
      # tooling, never executed by an automated merge/security workflow against agent-authored code), so a
      # blanket guard would false-positive there. The correct scope (only paths a workflow with
      # merge-relevant permissions actually invokes) isn't reliably derivable by a generic script — it's a
      # per-script security judgment call, which is why this stays a documented, human-authored list.
      # MUST be kept complete by hand when OA adds a script.
      human_required_paths:
        # .github/workflows/** already covers .github/workflows/security-gate.yml (the new dispatched
        # required-check gate) — same as security.yml, which is likewise not listed by name; both are OA
        # harness the loop must never auto-merge a rewrite of.
        - .github/workflows/**
        - .codex/skills/**
        - .claude/skills/**
        - .open-autonomy/**
        - scheduler/run.mjs
        - scheduler/schedule.json
        - scripts/prompts/**
        - scripts/agent.ts
        - scripts/agent-propose.ts
        - scripts/agent-visual-verify.ts
        - scripts/autonomy-runner.mjs
        - scripts/check-supply-chain.ts
        - scripts/claude-agent-run.ts
        - scripts/human-approval-gate.ts
        - scripts/model-proxy-exchange.ts
        - scripts/model-proxy-mint.ts
        - scripts/model-proxy-revoke.ts
        - scripts/rearm-auto-merge.ts
        - scripts/reconcile-merged-issues.ts
        - scripts/run-agent.mjs
        - scripts/runner-defaults.mjs
        - scripts/runner.ts
        - scripts/transcript.ts
        - profiles/**/skills/**
        - .volter/tracker/validation/**
      human_required_topics: [auth, secrets, billing, deployment, destructive data migration, dependency trust]

# The shared standards every skill reads (carried verbatim into the installation).
resources:
  - .open-autonomy/architecture-invariants.yml
  - .claude/settings.json
  - .github/workflows/merge.yml
  - .github/workflows/security.yml
  - .github/workflows/security-gate.yml   # dispatched, blocking realization of security.yml on bot PRs — posts `security`
  - .github/dependabot.yml
  # the gate scripts those carried workflows call — shared standards, byte-identical across carrying
  # profiles (docs/CODE_HOST_RESOURCES.md)
  - scripts/rearm-auto-merge.ts
  - scripts/reconcile-merged-issues.ts
  - scripts/check-supply-chain.ts
  - standards/workflow.md
  - standards/issue-and-evidence.md
  - standards/risk-and-review.md
