# Hand-authored setup facts for the simple-gh local, human-supervised profile. Roster, targets,
# codeHost, required checks, enforce_admins, and labels are derived from ir.yml + provision.json.
landing_mode: manual-after-review

check_realizations:
  - check: ci
    via: authored-workflow

# Planner originates product proposals through the task service. The task service allocates identifiers;
# an attributable Maintainer promotes approved `open` work to `ready`. A committed task backing requires
# an ordinary reviewed PR—never a direct push and no tracker-file self-review carve-out.
board_seed_recipe:
  originator_skill: planner
  promotion_fence: state
  import_verb: "ztrack import --register"
  landing_path: reviewed-pr

# No documents.roles block is declared because this overlay profile adopts an existing repository. The
# Planner resolves that repository's durable positioning and asks a Maintainer when none exists.
maturity_signals:
  m3_tool: doctor
  m4_predicate: ztrack
  m6_signal: per-issue

extra_rungs: []
terminal_stage: M5
