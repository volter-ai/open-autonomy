name: Open Autonomy Preflight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.open-autonomy/**'
      - '.github/workflows/**'
      - 'scripts/open-autonomy-preflight.ts'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Read labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run/preflight
          gh label list --limit 200 --json name > .agent-run/preflight/labels.json

      - name: Run preflight
        env:
          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
          PUBLIC_AGENT_TRIAGE_MODEL: ${{ vars.PUBLIC_AGENT_TRIAGE_MODEL }}
        run: |
          bun scripts/open-autonomy-preflight.ts \
            --labels .agent-run/preflight/labels.json \
            --out .agent-run/preflight/report.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: open-autonomy-preflight-${{ github.run_id }}
          path: .agent-run/preflight
          if-no-files-found: warn
