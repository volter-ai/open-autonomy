name: security-gate
# `security` as a BLOCKING required check on bot PRs (mirrors soc2-baseline's supply-chain.yml — the
# dispatched, blocking realization of a monitoring scan). The proposer effect dispatches this with the PR
# head sha (a bot PR fires no pull_request, so it must be kicked to post its required status — see
# scripts/agent-propose.ts EXTRA_CHECK_WORKFLOWS). The status-writing jobs execute only trusted default-
# branch workflow code and never check out the candidate. A separate read-only job scans the candidate with
# trusted default-branch analyzer code and no package install/lifecycle execution. GitHub's immutable job
# result crosses that boundary; the final job re-checks the exact PR/head binding before it posts `security`.
# Native auto-merge waits for it.
#
# The monitoring `security.yml` still runs on push/PR/weekly and its job is ALSO named `security` — this is
# intentional, not a collision: the two never populate the same commit. A bot-authored PR fires no
# `pull_request` (GITHUB_TOKEN anti-recursion), so only THIS dispatched gate posts `security` for it; a
# human-authored PR fires `pull_request` and only security.yml's job posts `security` for it — nothing ever
# dispatches this gate for a human PR. One logical check, two trigger paths depending on PR authorship —
# exactly the same pattern this repo's own root `ci.yml` uses for the `ci` context (pull_request for a human
# PR, workflow_dispatch for a bot PR, both posting `ci`).
on:
  # repository_dispatch always loads this workflow from the default branch. workflow_dispatch is
  # intentionally forbidden here because its caller-selectable --ref can select candidate workflow code.
  repository_dispatch:
    types: [open-autonomy-security-gate]
permissions:
  contents: read
jobs:
  publish-pending:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Bind exact PR head and post pending
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state=pending -f context=security \
            -f description="trusted workflow + supply-chain scan running" >/dev/null

  scan:
    needs: publish-pending
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the candidate without retaining a repository credential
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.client_payload.sha }}
          path: candidate
          persist-credentials: false
      - name: Check out trusted analyzer code from the default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Analyze candidate without executing candidate code
        run: |
          failed=0
          (cd candidate && pipx run zizmor==1.26.1 --offline --min-severity high \
            --config ../trusted/.github/zizmor.yml .github/workflows/) || failed=1
          (cd candidate && bun ../trusted/scripts/check-supply-chain.ts) || failed=1
          exit "$failed"

  publish-result:
    needs: [publish-pending, scan]
    if: ${{ always() && needs.publish-pending.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Re-bind exact PR head and publish the immutable scan result
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
          SCAN_RESULT: ${{ needs.scan.result }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          state=failure
          desc="trusted workflow or supply-chain scan failed"
          if [ "$SCAN_RESULT" = success ]; then
            state=success
            desc="trusted workflow + supply-chain scan passed"
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" -f context=security -f description="$desc" >/dev/null
          test "$state" = success
