schema: open-autonomy.roadmap.v2
direction: Build an OSS self-driving repository template that can maintain itself
  and install the same autonomy loop into other repositories.
items:
  - id: durable-decision-memory
    phase: 1
    priority: high
    proposed: true
    title: Durable Decision Memory
    proof_gate: decision-memory-audit
    acceptance:
      - Each credentialed agent run emits a structured decision record to the proxy run-ledger.
      - A durable index reconstructs issue, PR, attempt, and merge state from those records.
  - id: unified-loop-budget
    phase: 2
    priority: high
    planned: true
    title: PM Failure Handling From History
    proof_gate: retry-ci-failure
    acceptance:
      - On a CI or review failure, the PM decides from history: re-develop-with-context, or escalate.
      - Repeated/unclear failures stop and escalate to a human (max_develop_attempts), never auto-loop.
  - id: pm-proactive-backlog
    phase: 3
    priority: high
    planned: true
    title: PM Operations And Backlog Policy
    proof_gate: pm-open-pr-review
    acceptance:
      - PM comments visible status for waits, ignores, and blocked states.
      - PM routes existing agent PRs to review instead of starting duplicate work.
  - id: developer-context-quality
    phase: 4
    priority: medium
    planned: true
    title: Developer Context And Patch Quality
    proof_gate: developer-context-review-fix
    acceptance:
      - Developer context includes issue comments, current PR, decisions, and control files.
      - Reviewer-requested retries receive the actual review findings.
  - id: review-merge-parity
    phase: 5
    priority: high
    planned: true
    title: Review And The Merge Boundary
    proof_gate: head-changed-before-merge
    acceptance:
      - Every agent PR is blessed by an independent reviewer (code:review); the proposer cannot self-approve.
      - Required checks are per-SHA — a head changed after review must re-earn ci + agent-review before it can auto-merge.
  - id: operator-observability
    phase: 6
    priority: medium
    planned: true
    title: Observability And Operator Controls
    proof_gate: operator-pause-resume
    acceptance:
      - Pause, resume, retry, cancel, and status commands are visible and reversible.
      - Run artifacts contain compact evidence for each gate.
  - id: production-rollout
    phase: 7
    priority: medium
    planned: true
    title: Production Rollout
    proof_gate: five-issue-dogfood
    acceptance:
      - The canonical repo can run a low-risk issue through PM, develop, review, and merge.
      - CI remains green after autonomous changes.
  - id: direction-control-files
    phase: 8
    priority: high
    planned: true
    title: Direction, Constitution, And Planning Loop
    proof_gate: planner-creates-proof-gate-issues
    acceptance:
      - Planner reads this file and opens or updates missing proof-gate issues.
      - Developer and reviewer prompts include control-file context.
  - id: self-hosted-fleet
    phase: 9
    priority: medium
    planned: true
    title: Self-Hosted Repository Fleet
    proof_gate: scaffold-install-check
    acceptance:
      - A new repo can be scaffolded from the template and run checks.
      - Setup docs explain secrets, variables, and first issue flow.
  - id: durable-state-index
    phase: 10
    priority: medium
    proposed: true
    title: Durable State And Audit Trail
    proof_gate: status-reconstruction
    acceptance:
      - Decision index summarizes latest state by issue and PR (from the run-ledger).
      - Status commands can use reconstructed state.
  - id: repair-loops
    phase: 11
    priority: medium
    planned: true
    title: PM-Directed Repair (not auto-repair)
    proof_gate: quality-review-repair
    acceptance:
      - The PM feeds the reviewer's findings to the next developer attempt when it judges them addressable.
      - Repeated/unclear findings escalate to a human rather than re-attempting indefinitely.
  - id: maintainer-governance
    phase: 12
    priority: medium
    planned: true
    title: Maintainer Governance
    proof_gate: governance-maintainer-hold
    acceptance:
      - Maintainer holds stop merge even when CI and review pass.
      - Repo mode can be paused or constrained without code changes.
  - id: public-oss-readiness
    phase: 13
    priority: medium
    planned: true
    title: Public OSS Readiness
    proof_gate: release-dogfood
    acceptance:
      - Cookbook examples are pushable repos with local docs and root roadmap links.
      - Release evidence is reproducible from committed artifacts.
