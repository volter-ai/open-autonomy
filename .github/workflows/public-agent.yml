name: developer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue/PR number to act on", required: false, type: string }
  issue_comment:
    types: [created]
  issues:
    types:
      - "labeled"
permissions: {}
concurrency:
  group: >-
    developer-${{ github.event.issue.number || inputs.issue_number }}${{
    (startsWith(github.event.comment.body || '', '/agent cancel') || startsWith(github.event.comment.body || '', '/agent pause') || startsWith(github.event.comment.body || '', '/agent resume') || startsWith(github.event.comment.body || '', '/agent status') || startsWith(github.event.comment.body || '', '/agent retry')) && '-control' || '' }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  control:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, actions: write }
    env:
      GH_TOKEN: ${{ github.token }}
      CONTROL_WORKFLOW: developer.yml
    steps:
      - uses: actions/checkout@v4
      - run: node .github/agent-control.mjs
  setup:
    if: github.event_name != 'issue_comment' || !startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: read, id-token: write }
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      ISSUE_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Build issue payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${ISSUE_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh issue view "$ref" --json number,title,body,author,labels,comments --jq '{number,title,body,user:{login:.author.login},labels,comments}' > .agent-run/issue.json
      - name: Mint bounded model token
        run: bun scripts/model-proxy-mint.ts --run-id "ir-developer-${{ github.run_id }}" --models "${{ vars.PUBLIC_AGENT_MODEL || 'gpt-4o-mini' }}" --max-usd-cents "${{ vars.PUBLIC_AGENT_MAX_USD_CENTS || '200' }}" --max-requests "${{ vars.PUBLIC_AGENT_MAX_REQUESTS || '60' }}" --issue .agent-run/issue.json
  developer:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions: { contents: read, issues: read, pull-requests: read, id-token: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      PUBLIC_AGENT_MODEL: ${{ vars.PUBLIC_AGENT_MODEL || 'gpt-4o-mini' }}
      PUBLIC_AGENT_CITED_VERSION: ${{ vars.PUBLIC_AGENT_CODEX_VERSION }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: relax apparmor for the codex sandbox
        run: |
          cur=$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)
          if [ -n "$cur" ] && [ "$cur" != "0" ]; then sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0; fi
      - name: install codex CLI
        run: npm install -g "@openai/codex@${PUBLIC_AGENT_CITED_VERSION:-latest}" && codex --version
      - name: Build issue payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${ISSUE_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh issue view "$ref" --json number,title,body,author,labels,comments --jq '{number,title,body,user:{login:.author.login},labels,comments}' > .agent-run/issue.json
      - name: Exchange OIDC for the bounded token
        run: bun scripts/model-proxy-exchange.ts --run-id "ir-developer-${{ github.run_id }}" --audience "$MODEL_PROXY_OIDC_AUDIENCE"
      - name: Run agent (codex + skill) and bundle the result
        run: |
          bun scripts/github-agent-session.ts --issue .agent-run/issue.json --run-id "ir-developer-${{ github.run_id }}" --out .agent-run/out --repo "${{ github.repository }}" --actor "${{ github.actor }}" -- bash -lc "bun scripts/codex-agent-run.ts --skill .codex/skills/open-autonomy-developer/SKILL.md; rc=\$?; bun scripts/agent-visual-verify.ts || true; exit \$rc"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-bundle-${{ github.run_id }}
          path: .agent-run/out/bundle
          if-no-files-found: error
  publisher:
    needs: [setup, developer]
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write, actions: write, pull-requests: write, issues: write }
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - uses: actions/download-artifact@v4
        with:
          name: agent-bundle-${{ github.run_id }}
          path: .agent-run/bundle
      - name: Validate and apply the agent bundle
        run: bun scripts/github-agent-publish.ts --bundle .agent-run/bundle --apply --expected-run-id "ir-developer-${{ github.run_id }}" --expected-repo "${{ github.repository }}"
      - name: Open the agent's pull request
        run: |
          set -euo pipefail
          branch="agent/issue-${ISSUE_REF}"
          git config user.name volter-agent
          git config user.email volter-agent@users.noreply.github.com
          git config core.filemode false
          git checkout -b "$branch"
          git add -A
          if git diff --cached --quiet; then echo "agent produced no changes"; exit 0; fi
          git commit -m "agent: ir-developer-${{ github.run_id }}"
          git push --force origin "$branch"
          body="$(find .agent-run/bundle -name pr.md | head -1)"
          if [ -n "$body" ]; then gh pr create --base "${{ github.event.repository.default_branch }}" --head "$branch" --title "Agent run ir-developer-${{ github.run_id }}" --body-file "$body"; else gh pr create --base "${{ github.event.repository.default_branch }}" --head "$branch" --title "Agent run ir-developer-${{ github.run_id }}" --body "Automated agent run ir-developer-${{ github.run_id }}"; fi
          head_sha="$(git rev-parse HEAD)"
          pr_number="$(gh pr view "$branch" --json number --jq .number 2>/dev/null || echo "")"
          gh workflow run ci.yml --ref "$branch" -f sha="$head_sha" -f pr="$pr_number" || echo "ci dispatch failed (non-fatal)"
  revoke:
    needs: [setup, developer, publisher]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions: { id-token: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/model-proxy-revoke.ts --run-id "ir-developer-${{ github.run_id }}" || true
