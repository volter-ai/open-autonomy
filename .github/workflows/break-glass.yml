name: break-glass
# A maintainer's DELIBERATE, AUDITED path past the required `agent-review` check for a direct fix PR that has
# no linked issue (framework issue #234). A maintainer comments `/agent break-glass <head-sha> <reason>`; the
# gate posts `agent-review=success` on the PR's CURRENT head SHA with an audit note — ONLY when the commenter
# has REAL repo write+ permission (verified via the permissions API, never author_association), the SHA is the
# current head (per-SHA: a new push re-opens the gate), and the reason is non-empty. Deterministic (a security
# boundary), not a model decision. It NEVER touches PR code and NEVER weakens `human-approval`, which continues
# to gate sensitive PRs independently — break-glass clears ONLY agent-review.
on:
  issue_comment:
    types: [created]

# Least privilege: post the commit status, read the PR + repo. No contents:write — it cannot merge. Only
# pull-requests:read — it reads the head SHA; it posts no comments/labels. Same privilege posture as the
# other gates: run trusted default-branch code, never check out PR head.
permissions:
  contents: read
  statuses: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # Serialize per-PR so overlapping break-glass comments cannot race the status post.
  group: break-glass-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  break-glass:
    # PR comments only, and only those beginning the break-glass command. Maintainership is NOT decided here
    # (author_association is untrustworthy under the workflow token); the gate script verifies real repo
    # permission via the API. The trailing space matches the parser's exact command shape.
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/agent break-glass ')
    runs-on: ubuntu-latest
    steps:
      # Check out the trusted DEFAULT BRANCH for the gate script — NEVER the PR head. The gate reads the PR's
      # head SHA and the triggering comment via the API/event only; no untrusted PR code is ever executed
      # (same privilege posture as human-approval.yml / the reviewer's finalize step).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Evaluate break-glass gate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: bun scripts/break-glass-gate.ts
