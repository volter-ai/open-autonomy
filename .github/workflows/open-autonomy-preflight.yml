name: open-autonomy-preflight
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - ".open-autonomy/**"
      - ".github/workflows/**"
      - "scripts/open-autonomy-preflight.ts"
      - "scripts/public-agent-*.ts"
permissions: { contents: read, issues: read }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  open-autonomy-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      PUBLIC_AGENT_TRIAGE_MODEL: ${{ vars.PUBLIC_AGENT_TRIAGE_MODEL }}
      MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Read labels
        run: |
          mkdir -p .agent-run/preflight
          gh label list --limit 200 --json name > .agent-run/preflight/labels.json
      - name: Run preflight
        run: bun scripts/open-autonomy-preflight.ts --labels .agent-run/preflight/labels.json --out .agent-run/preflight/report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-autonomy-preflight-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
