name: reviewer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue to act on (used by /agent retry)", required: false, type: string }
  issue_comment:
    types:
      - "created"
  pull_request_target:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
permissions: { contents: write, id-token: write, pull-requests: write, checks: read, issues: write, actions: write }
concurrency:
  group: "public-agent-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}"
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_ADMIN_TOKEN: ${{ secrets.MODEL_PROXY_ADMIN_TOKEN }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
      PUBLIC_AGENT_MAX_CI_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_CI_RETRIES || '2' }}
      PUBLIC_AGENT_MAX_REVIEW_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_REVIEW_RETRIES || '2' }}
      PUBLIC_AGENT_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'gpt-4o-mini' }}
      PUBLIC_AGENT_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'openai' }}
      PUBLIC_AGENT_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/agent-reviewer.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reviewer-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
