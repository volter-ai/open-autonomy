name: strategy_reviewer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue/PR number to act on", required: false, type: string }
  issue_comment:
    types:
      - "created"
permissions: { contents: write, id-token: write, pull-requests: write, checks: read, issues: write, actions: write, statuses: write }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  strategy_reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
      PUBLIC_AGENT_STRATEGY_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MODEL || vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_STRATEGY_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_PROVIDER || 'anthropic' }}
      PUBLIC_AGENT_STRATEGY_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MAX_USD_CENTS || '50' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Provision model endpoint
        env:
          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
          MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
          MODEL_ALLOWLIST: ${{ vars.PUBLIC_AGENT_MODELS || 'deepseek/deepseek-v4-flash' }}
          PUBLIC_AGENT_RUN_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_RUN_MAX_USD_CENTS || '500' }}
          PUBLIC_AGENT_RUN_MAX_REQUESTS: ${{ vars.PUBLIC_AGENT_RUN_MAX_REQUESTS || '60' }}
        run: bun scripts/provision-model-endpoint.ts
      - name: install Claude Code CLI
        run: npm install -g "@anthropic-ai/claude-code@${{ vars.PUBLIC_AGENT_CLAUDE_CODE_VERSION || 'latest' }}" && claude --version
      - run: bun scripts/agent-strategy-reviewer.ts
      - name: Revoke the run token
        if: always() && env.AGENT_RUN_ID != ''
        env:
          MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
          MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
        run: bun scripts/model-proxy-revoke.ts --run-id "${{ env.AGENT_RUN_ID }}" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: strategy_reviewer-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
