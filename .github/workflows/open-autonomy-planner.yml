name: open-autonomy-planner
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: Apply changes (default dry-run)
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
permissions: { contents: read, issues: write }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  open-autonomy-planner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Read existing roadmap issues
        run: |
          mkdir -p .agent-run/planner
          gh issue list --state open --search "is:issue is:open label:origin:roadmap-planner" --limit 200 --json number,title,body,labels,url,state > .agent-run/planner/issues.json
      - name: Plan roadmap issues
        run: bun scripts/public-agent-planner.ts --roadmap .open-autonomy/roadmap.yml --issues .agent-run/planner/issues.json --out .agent-run/planner/plan.json
      - name: Apply roadmap issue plan
        if: inputs.apply == 'true' || github.event_name == 'schedule'
        run: |
          set -euo pipefail
          PLAN=.agent-run/planner/plan.json
          jq -r '.actions[].labels[]?' "$PLAN" | sort -u | while IFS= read -r label; do
            [ -n "$label" ] && gh label create "$label" --color CFD3D7 2>/dev/null || true
          done
          jq -c '.actions[] | select(.action == "create" or .action == "update")' "$PLAN" | while IFS= read -r action; do
            kind="$(jq -r '.action' <<< "$action")"
            number="$(jq -r '.issue_number // empty' <<< "$action")"
            title="$(jq -r '.title' <<< "$action")"
            body="$(jq -r '.body' <<< "$action")"
            labels="$(jq -r '.labels | join(",")' <<< "$action")"
            if [ "$kind" = "create" ]; then
              url="$(gh issue create --title "$title" --body "$body")"
              number="$(printf '%s\n' "$url" | grep -oE '[0-9]+$' || true)"
            else
              gh issue edit "$number" --title "$title" --body "$body" || true
            fi
            if [ -n "$number" ]; then
              printf '%s\n' "$labels" | tr ',' '\n' | while IFS= read -r lbl; do
                [ -n "$lbl" ] && gh issue edit "$number" --add-label "$lbl" || true
              done
            fi
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-autonomy-planner-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
