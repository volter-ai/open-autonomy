schema: open-autonomy.roadmap.v2
direction: Pursue the north star and merit criteria in docs/CONSTITUTION.md. The strategist
  proposes strategy toward that north star and humans ratify it; this file records the
  resulting roadmap items and their proof gates.
items:
  - id: durable-decision-memory
    phase: 1
    priority: high
    proposed: true
    title: Durable Decision Memory
    proof_gate: decision-memory-audit
    acceptance:
      # Re-wire for the credentialed-skill model: the old staged-pipeline decision records were dropped in
      # the agent-model cutover. The proxy run-ledger (already durable, per-run) is the natural store.
      - Each credentialed agent run emits a structured decision record to the proxy run-ledger.
      - A durable index reconstructs issue, PR, attempt, and merge state from those records.
  - id: unified-loop-budget
    phase: 2
    priority: high
    planned: true
    title: PM Failure Handling From History
    proof_gate: retry-ci-failure
    acceptance:
      # Failure handling is a PM JUDGMENT from full issue/PR history — NOT an automatic retry loop (the
      # agent must not self-heal; the old loop-budget was overreach). The PM reads a failed PR's history and
      # either re-dispatches the developer WITH the failure context (if clearly addressable and under
      # max_develop_attempts) or escalates human-required. It never loops.
      - On a CI or review failure, the PM decides from history: re-develop-with-context, or escalate.
      - Repeated/unclear failures stop and escalate to a human (max_develop_attempts), never auto-loop.
  - id: pm-proactive-backlog
    phase: 3
    priority: high
    planned: true
    title: PM Operations And Backlog Policy
    proof_gate: pm-open-pr-review
    acceptance:
      - PM comments visible status for waits, ignores, and blocked states.
      - PM routes existing agent PRs to review instead of starting duplicate work.
  - id: developer-context-quality
    phase: 4
    priority: medium
    planned: true
    title: Developer Context And Patch Quality
    proof_gate: developer-context-review-fix
    acceptance:
      - Developer context includes issue comments, current PR, decisions, and control files.
      - Reviewer-requested retries receive the actual review findings.
  - id: review-merge-parity
    phase: 5
    priority: high
    planned: true
    title: Review And The Merge Boundary
    proof_gate: head-changed-before-merge
    acceptance:
      # The merge boundary is GitHub-native: branch protection requires ci + agent-review and native
      # auto-merge lands the PR. There is no separate merge-gate component, and no retry budget (failure
      # handling is the PM's judgment, per the unified-loop-budget item).
      - Every agent PR is blessed by an independent reviewer (code:review); the proposer cannot self-approve.
      - Required checks are per-SHA — a head changed after review must re-earn ci + agent-review before it can auto-merge.
  - id: operator-observability
    phase: 6
    priority: medium
    planned: true
    title: Observability And Operator Controls
    proof_gate: operator-pause-resume
    acceptance:
      - Pause, resume, retry, cancel, and status commands are visible and reversible.
      - Run artifacts contain compact evidence for each gate.
  - id: production-rollout
    phase: 7
    priority: medium
    planned: true
    title: Production Rollout
    proof_gate: five-issue-dogfood
    acceptance:
      - The canonical repo can run a low-risk issue through PM, develop, review, and merge.
      - CI remains green after autonomous changes.
  - id: direction-control-files
    phase: 8
    priority: high
    planned: true
    title: Direction, Constitution, And Planning Loop
    proof_gate: planner-creates-proof-gate-issues
    acceptance:
      - Planner reads this file and opens or updates missing proof-gate issues.
      - Developer and reviewer prompts include control-file context.
  - id: self-hosted-fleet
    phase: 9
    priority: medium
    planned: true
    title: Self-Hosted Repository Fleet
    proof_gate: scaffold-install-check
    acceptance:
      - A new repo can be scaffolded from the template and run checks.
      - Setup docs explain secrets, variables, and first issue flow.
  - id: durable-state-index
    phase: 10
    priority: medium
    proposed: true
    title: Durable State And Audit Trail
    proof_gate: status-reconstruction
    acceptance:
      # Depends on durable-decision-memory (the run-ledger records). Dropped in the agent-model cutover.
      - Decision index summarizes latest state by issue and PR (from the run-ledger).
      - Status commands can use reconstructed state.
  - id: repair-loops
    phase: 11
    priority: medium
    planned: true
    title: PM-Directed Repair (not auto-repair)
    proof_gate: quality-review-repair
    acceptance:
      # NOT an autonomous repair loop. The PM, seeing the reviewer's findings in the issue/PR history,
      # decides whether to re-dispatch the developer with those findings as context, or escalate — judgment,
      # not machinery. The developer only ever acts on an explicit PM dispatch.
      - The PM feeds the reviewer's findings to the next developer attempt when it judges them addressable.
      - Repeated/unclear findings escalate to a human rather than re-attempting indefinitely.
  - id: maintainer-governance
    phase: 12
    priority: medium
    planned: true
    title: Maintainer Governance
    proof_gate: governance-maintainer-hold
    acceptance:
      - Maintainer holds stop merge even when CI and review pass.
      - Repo mode can be paused or constrained without code changes.
  - id: public-oss-readiness
    phase: 13
    priority: medium
    planned: true
    title: Public OSS Readiness
    proof_gate: release-dogfood
    acceptance:
      - Cookbook examples are pushable repos with local docs and root roadmap links.
      - Release evidence is reproducible from committed artifacts.
  - id: strategist-roadmap-research
    phase: 14
    priority: high
    proposed: true
    title: Strategist Roadmap Research Loop
    proof_gate: strategist-proposes-roadmap-pr
    acceptance:
      - Scan customer demand, competitor gaps, and analogous fields for candidate work, optimizing for recall.
      - Propose roadmap items as a human-ratified pull request, never merging its own proposal.
      - Treat the north star, merit criteria, and proof gates as read-only; recommend amendments in prose only.
  - id: actor-model-human-handoffs
    phase: 15
    priority: high
    planned: true
    title: Actor Model And Explicit Human Handoffs
    proof_gate: human-approve-merges-live
    acceptance:
      - The IR models actors (kind agent or human) and task-triggered handoffs through the work store.
      - A required review is satisfiable by the AI reviewer OR a native human Approve on the current head SHA.
      - Proven by a live testbed run where a native human Approve merges a bot-authored PR; run IDs recorded in the ledger.
  - id: bench-autonomy-ratio
    phase: 16
    priority: medium
    proposed: true
    title: Bench Autonomy Ratio From Live Runs
    proof_gate: autonomy-ratio-from-live-run
    acceptance:
      - Compute autonomy ratio, human handoffs, and cycle time from a real run's decision records, not invented inputs.
      - The human simulator is labeled a test double and is never used as proof of a live capability.
      - Proven against decision records emitted by a live testbed run; run IDs recorded in the ledger.
  - id: develop-oa-through-oa
    phase: 17
    priority: high
    proposed: true
    title: Develop OA Through OA (close the manual loophole)
    proof_gate: oa-feature-shipped-by-pipeline
    acceptance:
      - A canonical-repo feature is authored by the develop agent on an issue, reviewed, and merged by the gate (not hand-written in a chat).
      - Manual driving of canonical is scoped to the bootstrap substrate only, and even bootstrap work cites live-run evidence.
      - Significant changes trace to a roadmap item and a satisfied proof gate; proven by the pipeline shipping at least one OA feature end to end.
  - id: multi-provider-model-routing
    phase: 18
    priority: medium
    proposed: true
    title: Multi-Provider Model Routing For Loop Roles
    proof_gate: alternate-model-routed
    acceptance:
      # OA's own recent failures (issue #67: 403 errors on PM calls, PM budget
      # unavailability comments) show single-provider brittleness. OpenHands'
      # multi-backend ACP architecture proves the demand. The constitution demands
      # robustness — a single API outage should not silence the loop.
      - Each loop role (PM, developer, reviewer, planner) can be configured with a different provider and model.
      - Routing considers provider availability with graceful fallback on provider failure.
      - The compute-unit or model-proxy handles provider-agnostic credential management across an execution group.
      - Proven by a live testbed run where at least two different providers serve different roles; run IDs in the ledger.
  - id: quality-benchmark-gate
    phase: 19
    priority: medium
    proposed: true
    title: Output Quality Benchmark Gate (proof beyond process)
    proof_gate: benchmark-integration-smoke
    acceptance:
      # The constitution's "proof" merit criterion requires capabilities to be
      # demonstrated, not asserted. OA's bench-autonomy-ratio tracks process
      # metrics (autonomy ratio, cycle time) but never measures output quality.
      # DGM validates every code change against SWE-bench — OA should do the
      # same to show the loop actually produces better code.
      - Agent output patches are evaluated against a standard coding benchmark (e.g., SWE-bench verified subset or Polyglot).
      - Quality trend is recorded per-issue per-run and surfaced in operator observability.
      - Quality regression (benchmark score drop vs prior run) blocks merge at the review gate.
      - The benchmark fixture is deterministic or uses a fixed-cost testbed; no model spend for the gate itself.
      - Proven by at least one benchmark-evaluated run with result recorded in the ledger.
  - id: substrate-complexity-reduction
    phase: 20
    priority: medium
    proposed: true
    title: Substrate Complexity Reduction For Adopter Portability
    proof_gate: onboarding-path-measured
    acceptance:
      # The portability merit criterion requires a new repo can adopt the loop.
      # SWE-agent's community shift to mini-SWE-agent (100-line Python) and
      # DGM's unreachable-CLI-bug (#31) both signal that self-improving systems
      # naturally accrete complexity beyond what new adopters can absorb. OA's
      # compilation model (skills, profiles, github installation, runtime sync,
      # dogfood checks) is powerful but the surface area is high.
      - A new-adopter onboarding path is documented and tested, covering 80%+ of the "install and run a low-risk issue" flow.
      - The number of steps/files a new adopter must touch to go from clone to first autonomous PR is measured and published.
      - Irreducible complexity is distinguished from accidental complexity in the scoring; the goal is reducing the latter.
      - Measured by a testbed run that scaffolds a fresh repo and completes one end-to-end cycle.
  - id: agent-level-evidence-gates
    priority: medium
    proposed: true
    title: Agent-Level Evidence Gates For Reviewer Verifiability
    intent: >
      OA's proof_gate model stops at the roadmap-item level. The reviewer has no
      structured evidence per agent action (tool call, decision, rationale) that
      independently verifies the action was justified. OpenHands is exploring
      exactly this gap (issue #14857: reviewer-facing evidence gates). Extending
      proof to individual agent actions makes the reviewer's job tractable and
      serves the constitution's "proof" merit criterion at action granularity.
    proof_gate: action-evidence-replay
    acceptance:
      - Each high-impact agent action (shell command, file write, PR merge, credential access)
        emits a structured trace artifact showing action type, triggering task context, checked
        evidence or input fields, decision (ALLOW/BLOCK/ESCALATE), and replayable decision record.
      - The reviewer can inspect the evidence artifact independently (not relying on agent-run logs)
        and verify that the action was justified before the fact, not just after.
      - A testbed fixture replays a recorded trajectory and asserts that every high-impact action
        has a companion evidence artifact with the required fields.
      - Proven by a live testbed run where the reviewer uses evidence artifacts to accept or reject
        an agent action; run IDs recorded in the ledger.
  - id: trajectory-export-standard
    priority: low
    proposed: true
    title: Standardized Agent Trajectory Export For Bench And Replay
    intent: >
      OA emits decision records per agent run, but they are workflow-specific JSON
      with no standardized schema for replay, bench scoring, or cross-run analysis.
      SWE-agent is adding explicit trajectory hooks for remote environments (issue
      #1310). A standard trajectory format — time-ordered sequence of state, action,
      observation triples — would unlock bench-autonomy-ratio (process metrics from
      real runs), quality-benchmark-gate (output quality scoring against benchmarks),
      and strategist pattern mining from historical runs.
    proof_gate: trajectory-roundtrip
    acceptance:
      - Every agent run emits a standardized trajectory artifact as a time-ordered sequence
        of (state, action, observation) triples with consistent schema across all roles
        (developer, reviewer, PM, planner).
      - The trajectory can be replayed deterministically through a testbed fixture to reproduce
        the agent's behavior (within model output variance).
      - Cross-run trajectory analysis (e.g., "find all runs where the developer issued a git push")
        is possible by querying the standardized format without per-run schema knowledge.
      - Proven by a testbed run that exports a trajectory and replays it through the fixture;
        run IDs in the ledger.
  - id: hosted-adopter-path
    priority: high
    # Ratified by the maintainer 2026-07-06 (proposed removed): make hosted adoption genuinely
    # self-serve, not dogfood-only. The planner decomposes from BACKLOG.md BL-13/BL-18/BL-24.
    title: Hosted GitHub Adoption Is Real For Non-Maintainers
    intent: >
      The 2026-07-06 adopter-docs audit found the hosted (gh-actions) path effectively
      maintainer-only: compiled installs default to the maintainer's closed model proxy
      (BL-13), the proposer's CI dispatch contract is undocumented and simple-gh-sdlc
      ships without its ci.yml so every agent PR wedges (BL-18), and there is no hosted
      step-by-step install path — labels, repo settings, and branch protection are never
      seeded or listed (BL-24). The strategic question this intent forces: either make
      hosted adoption genuinely self-serve (own-proxy deploy guide, no volter defaults,
      numbered install path, seeded vocabulary) or honestly scope the docs to
      "hosted is dogfood-only for now". BACKLOG.md BL-13/BL-18/BL-24 hold the full
      per-finding spec (files, lines, fix shapes) for the planner to decompose.
    # Gate id `external-hosted-install` — declared as a real gate key + PROOF_LEDGER row at proof
    # time. check:proof requires every ratified item carrying a gate key to already cite done
    # evidence (and its regex reads comments too, so even naming the key here would arm it); the
    # actor-model-human-handoffs ratification followed the same order: gate recorded when proven.
    acceptance:
      - A repo outside the maintainer's org completes the documented hosted install path end to end (compile → settings → labels → branch protection → proxy → preflight ready) — or adopter-facing docs explicitly scope hosted to dogfood-only.
      - No compiled install carries a maintainer endpoint as a silent default.
      - An agent PR on that install reaches a posted ci/agent-review/human-approval verdict (no wedge); run IDs recorded in the ledger.
  - id: self-improving-prompt-evolution
    priority: low
    proposed: true
    title: Self-Improving Prompt Evolution For Loop Roles
    intent: >
      The constitution's method calls for absorbing the best ideas from the field.
      DGM's core innovation is automatically evolving agent prompts through mutation
      and selection — treating prompts as evolvable artifacts, not hand-maintained
      constants. Google AlphaEvolve extends this to evolutionary search over agent
      capabilities. OA currently hand-crafts every prompt per role. Adding an automated
      prompt evolution capability — seeded from DGM's evolutionary loop — would let
      prompt quality improve autonomously against bench scores, directly serving the
      "find the best system" constitutional goal and feeding into quality-benchmark-gate.
    proof_gate: prompt-evolution-smoke
    acceptance:
      - A prompt evolution loop exists that takes a current role prompt, generates mutations
        (variations of instruction, context format, or tool-use guidance), runs each variant
        through the bench or a testbed fixture, and selects the best-performing variant.
      - The loop can run autonomously within a bounded budget (configurable max_runs, max_cost)
        and does not modify the production prompt without a human ratify step.
      - Evolution candidates are recorded in the strategist archive or a companion ledger for
        traceability.
      - Proven by a testbed run that evolves one role prompt through at least 3 generations and
        demonstrates score improvement against a deterministic fixture; run IDs in the ledger.
  - id: agent-episodic-memory
    priority: medium
    proposed: true
    title: Agent Episodic Memory For Cross-Issue Context Retrieval
    intent: >
      OA's durable-decision-memory captures decision records per run but does not
      make past solutions retrievable as context for future agent work. SWE-agent
      #1440 proposes "episodic memory" via Dakera — recalling successful patch
      patterns from past issues to guide similar future issues. An episodic memory
      capability — where the developer agent can recall similar past fixes, review
      decisions, or PM routing patterns before starting work — would reduce
      re-derivation of solutions already proven in the same codebase. This serves
      the constitution's "absorb the best ideas from the field" method and the
      low-human-toil merit criterion (fewer rework cycles caused by missing context).
    proof_gate: cross-issue-retrieval-smoke
    acceptance:
      - Before starting an issue, the agent queries a memory store for similar past
        issues and their successful patches or decisions, and the retrieved context
        is injected into the agent's initial run context.
      - After a successful patch or merge, a structured memory record (issue summary,
        diff signature, decision rationale) is stored and indexed for future retrieval.
      - Retrieval precision and recall are measured against a testbed fixture with
        known similar-issue pairs; precision >= 0.7 and recall >= 0.5 on the fixture.
      - Proven by a live testbed run where an agent resolves a known-recurring issue
        type in fewer attempts WITH episodic memory than without; run IDs in the ledger.
  - id: installation-supply-chain-audit
    priority: medium
    proposed: true
    title: Installation Supply Chain Audit For Self-Hosted Repos
    intent: >
      OA's self-hosted-fleet (phase 9) and public-oss-readiness (phase 13) expand
      the installation surface to new repos, each inheriting OA's dependency graph
      and runtime (scripts, model-proxy integration, GitHub workflows). SWE-agent
      #1429 ("dependency hardening: pin minimum safe dependency versions") signals
      that autonomous-engineering systems are recognizing supply chain risk. OA has
      no roadmap item for auditing or hardening the dependency chain that installations
      depend on. A supply chain audit — automated dependency scanning, minimum-version
      pinning, and provenance verification for the runtime that ships into installs —
      would serve the robustness merit criterion and give new adopters confidence
      that the loop does not introduce unmanaged dependency risk.
    proof_gate: supply-chain-audit-smoke
    acceptance:
      - The OA runtime's dependency graph is documented and scanned by an automated
        vulnerability scanner (e.g., `npm audit`, `bun run audit`, or a GitHub
        Dependabot-equivalent) on every release.
      - All runtime dependencies have pinned minimum safe versions; automated alerts
        fire on newly disclosed vulnerabilities affecting the runtime.
      - A supply-chain provenance document is published with each release, listing
        all runtime dependencies, their licenses, and known vulnerability status.
      - Proven by a testbed run that scaffolds a fresh OA installation, runs the
        supply-chain scanner, and reports zero actionable vulnerabilities in the
        runtime; run IDs in the ledger.
  - id: strategist-operational-feed
    priority: low
    proposed: true
    title: Strategist Operational Data Feed From Bench And Run History
    intent: >
      The strategist currently scans only external sources (competitor repos,
      analogous fields) for strategic intelligence. Meanwhile, OA's own bench
      harness (bench-autonomy-ratio, quality-benchmark-gate) and run-ledger
      generate operational data — cycle times, failure rates, per-role accuracy,
      regression trends — that the strategist never reads. Adding a programmatic
      feed that lets the strategist query bench results, run statistics, and
      failure patterns would close the gap between operational data and strategic
      direction. This directly serves the proof merit criterion ("capabilities
      are demonstrated, not asserted") by grounding strategy in OA's own empirical
      evidence, and feeds the strategist-roadmap-research loop with internal data
      alongside external signals.
    proof_gate: strategist-queries-bench
    acceptance:
      - The strategist can invoke bench summaries and run-history queries as part
        of its research phase, reading structured data (cycle time, failure rates,
        per-role pass/fail counts, quality-benchmark scores) from the ledger.
      - Strategist proposals cite both external sources AND internal operational
        metrics when relevant; proposals lacking internal data note the gap.
      - A testbed fixture verifies that the strategist research loop can access
        bench data without model spend (the data query is a deterministic fetch).
      - Proven by a strategist-run that produces at least one proposal citing
        internal operational metrics alongside external sources; run IDs in the ledger.
