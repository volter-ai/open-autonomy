name: developer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue/PR number to act on", required: false, type: string }
  issue_comment:
    types: [created]
permissions: {}
concurrency:
  group: >-
    developer-${{ github.event.issue.number || inputs.issue_number }}${{
    (startsWith(github.event.comment.body || '', '/agent cancel') || startsWith(github.event.comment.body || '', '/agent pause') || startsWith(github.event.comment.body || '', '/agent resume') || startsWith(github.event.comment.body || '', '/agent status') || startsWith(github.event.comment.body || '', '/agent retry')) && '-control' || '' }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  control:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ') && !startsWith(github.event.comment.body, '/agent developer') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, actions: write }
    env:
      GH_TOKEN: ${{ github.token }}
      CONTROL_WORKFLOW: developer.yml
    steps:
      - uses: actions/checkout@v4
      - run: node .github/agent-control.mjs
  setup:
    if: vars.PUBLIC_AGENT_REPO_PAUSED != 'true' && ((github.event_name != 'issue_comment' && github.event_name != 'pull_request_target' && github.event_name != 'issues') || (github.event_name == 'issues' && github.event.action == 'labeled') || (github.event_name == 'pull_request_target' && (github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))) || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent developer') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)))
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: read, pull-requests: read, id-token: write }
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      ISSUE_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
    steps:
      - name: Lock down egress (block token exfiltration from untrusted-derived work)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            ${{ vars.PUBLIC_AGENT_PROXY_HOST || 'volter-agent-model-proxy.aaron-0ed.workers.dev' }}:443
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Provide subject
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${ISSUE_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh api "repos/${{ github.repository }}/issues/$ref" --jq '{number,title,body,user:{login:.user.login},labels:[.labels[].name]}' > .agent-run/issue.json
      - name: Mint bounded model token
        run: bun scripts/model-proxy-mint.ts --run-id "ir-developer-${{ github.run_id }}" --models "${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}" --max-usd-cents "${{ vars.PUBLIC_AGENT_MAX_USD_CENTS || '200' }}" --max-requests "${{ vars.PUBLIC_AGENT_MAX_REQUESTS || '60' }}" --issue .agent-run/issue.json
  developer:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions: { contents: write, issues: write, pull-requests: write, id-token: write, actions: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      PUBLIC_AGENT_MODEL: ${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_CITED_VERSION: ${{ vars.PUBLIC_AGENT_CLAUDE_CODE_VERSION }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
    steps:
      - name: Lock down egress (block token exfiltration from untrusted-derived work)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            ${{ vars.PUBLIC_AGENT_PROXY_HOST || 'volter-agent-model-proxy.aaron-0ed.workers.dev' }}:443
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: install Claude Code CLI
        run: npm install -g "@anthropic-ai/claude-code@${PUBLIC_AGENT_CITED_VERSION:-latest}" && claude --version
      - name: Provide subject
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${ISSUE_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh api "repos/${{ github.repository }}/issues/$ref" --jq '{number,title,body,user:{login:.user.login},labels:[.labels[].name]}' > .agent-run/issue.json
      - name: Exchange OIDC for the bounded token
        run: bun scripts/model-proxy-exchange.ts --run-id "ir-developer-${{ github.run_id }}" --audience "$MODEL_PROXY_OIDC_AUDIENCE"
      - name: Run agent (Claude Code + skill)
        env:
          OSS_AGENT_TASK_DIR: .agent-run
          OSS_AGENT_ISSUE_PATH: .agent-run/issue.json
        run: |
          bun scripts/claude-agent-run.ts --skill .codex/skills/developer/SKILL.md; rc=$?; bun scripts/agent-visual-verify.ts || true; echo "::group::agent transcript (ir-developer-${{ github.run_id }})"; cat .agent-run/artifacts/transcript.md 2>/dev/null || true; echo "::endgroup::"; exit $rc
      - name: Effect — propose the change as an auto-merging PR (if the tree changed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then echo "no working-tree changes; nothing to propose"; exit 0; fi
          branch="agent/issue-${ISSUE_REF}"
          git config user.name volter-agent
          git config user.email volter-agent@users.noreply.github.com
          git config core.filemode false
          git checkout -b "$branch"
          ref_slug="$(printf '%s' "${ISSUE_REF}" | tr -cd '0-9A-Za-z._-' | cut -c1-40)"; [ -z "$ref_slug" ] && ref_slug=item
          run_dir=".open-autonomy/history/developer/${ref_slug}-run-${{ github.run_id }}"
          mkdir -p "$run_dir"
          cp -f .agent-run/artifacts/transcript.md "$run_dir/transcript.md" 2>/dev/null || true
          cp -f .agent-run/artifacts/screenshot-* "$run_dir/" 2>/dev/null || true
          git add -A
          ref="${ISSUE_REF}"
          if printf '%s' "$ref" | grep -qE '^[0-9]+$'; then git commit -m "agent: ir-developer-${{ github.run_id }}" -m "Closes #$ref"; else git commit -m "agent: ir-developer-${{ github.run_id }}"; fi
          git push --force origin "$branch"
          base="${{ github.event.repository.default_branch }}"
          body="$(cat .agent-run/artifacts/pr.md 2>/dev/null || echo "Automated agent change (ir-developer-${{ github.run_id }}).")"
          if printf '%s' "$ref" | grep -qE '^[0-9]+$'; then body="$(printf 'Closes #%s\n\n%s' "$ref" "$body")"; fi
          gh pr create --base "$base" --head "$branch" --title "Agent: ir-developer-${{ github.run_id }}" --body "$body" || gh pr view "$branch" >/dev/null
          armed=; for i in 1 2 3 4 5 6; do gh pr merge "$branch" --squash --auto && { armed=1; break; } || sleep 4; done
          [ -n "$armed" ] || echo "auto-merge enable failed after retries (non-fatal)"
          head_sha="$(git rev-parse HEAD)"
          pr_number="$(gh pr view "$branch" --json number --jq .number 2>/dev/null || echo "")"
          ci_ok=; for i in 1 2 3 4 5 6; do gh workflow run ci.yml --ref "$branch" -f sha="$head_sha" -f pr="$pr_number" && { ci_ok=1; break; } || sleep 4; done
          [ -n "$ci_ok" ] || echo "ci dispatch failed after retries (non-fatal)"
          rv_ok=; for i in 1 2 3 4 5 6; do gh workflow run reviewer.yml -f issue_number="$pr_number" && { rv_ok=1; break; } || sleep 4; done
          [ -n "$rv_ok" ] || echo "review dispatch failed after retries (non-fatal)"
      - name: Save the agent run result (durable transcript artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-developer
          path: .agent-run/
          retention-days: 30
          if-no-files-found: ignore
      - run: bun scripts/model-proxy-revoke.ts --run-id "ir-developer-${{ github.run_id }}" || true
        if: always()
