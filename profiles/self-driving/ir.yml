# Open Autonomy, expressed in its own IR — the profile that compiles to OA's live installation.
# One unit: an agent = behavior + capabilities + triggers(+params) + config. See docs/AUTONOMY-IR.md.
# The behavior decides execution: a prose skill folder → the privilege-separated codex wrapper
# (untrusted → mediated); a `scripts/*.ts` orchestrator → a deterministic job (trusted → direct).
# `config` is opaque misc the github substrate interprets (workflowFile pins the output filename so the
# model-proxy OIDC allowlist + cross-agent dispatch + branch protection keep working; model adds the
# proxy credentials; persistCredentials/permissions/env/timeout/concurrency shape the job).
schema: autonomy.ir.v1
targets: [github]

# Model defaults: every agent runs deepseek/deepseek-v4-flash. The deterministic agents' `*_PROVIDER`
# selects the WIRE, not the upstream — `anthropic` = the Anthropic Messages endpoint, which the bounded
# proxy routes to OpenRouter (and on to DeepSeek) by the "vendor/slug" model id. The developer agent runs
# the same model through Claude Code (see the github substrate's developer job). No gpt-4o-mini anywhere.
agents:
  # The only model-interpreted agent: codex writes code in a credential-less sandbox; a trusted
  # publisher validates the bundle and opens the PR. Triggered by the agent-session label or a comment.
  developer:
    behavior: open-autonomy-developer
    capabilities: [code:propose, tasks:converse]
    triggers:
      - event: issues
        config: { types: [labeled] }
        params: { ISSUE_REF: subject.ref }
    config:
      workflowFile: public-agent.yml
      timeout: 90

  # Deterministic PM: sweeps open issues, asks the model for a triage decision, routes the next action.
  pm:
    behavior: scripts/agent-pm.ts
    capabilities: [tasks:converse, tasks:author, agent:launch]
    triggers:
      - cron: "*/30 * * * *"
    config:
      workflowFile: public-agent-pm.yml
      model: true
      persistCredentials: false
      timeout: 30
      concurrency: public-agent-pm
      env:
        PM_COMMENT_TOKEN: ${{ secrets.PUBLIC_AGENT_TRIGGER_TOKEN || github.token }}
        PUBLIC_AGENT_PM_LIMIT: ${{ vars.PUBLIC_AGENT_PM_LIMIT || '10' }}
        PUBLIC_AGENT_PM_MODEL: ${{ vars.PUBLIC_AGENT_PM_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'deepseek/deepseek-v4-flash' }}
        PUBLIC_AGENT_PM_PROVIDER: ${{ vars.PUBLIC_AGENT_PM_PROVIDER || vars.PUBLIC_AGENT_TRIAGE_PROVIDER || 'anthropic' }}
        PUBLIC_AGENT_REPO_PAUSED: ${{ vars.PUBLIC_AGENT_REPO_PAUSED || 'false' }}
        PUBLIC_AGENT_PM_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_PM_MAX_USD_CENTS || '25' }}

  # Reviewer: a real skill agent that JUDGES the PR (reads the diff + control files + CI, emits a typed
  # verdict), then a thin privileged interpreter runs the deterministic merge gate on that verdict and
  # merges a low-risk, CI-green, head-stable agent PR. prepare (read) gathers the skill's inputs;
  # interpreter (write) acts on its result. The PR number arrives as the declared TARGET_REF param.
  reviewer:
    behavior: reviewer
    capabilities: [tasks:converse, code:propose]
    triggers:
      - event: issue_comment
        config: { types: [created] }
        params:
          TARGET_REF: subject.ref
          SUBJECT_TEXT: subject.text
          ACTOR_ROLE: subject.actorRole
      - event: pull_request_target
        config: { types: [opened, synchronize, reopened, ready_for_review] }
    # The skill ends its run by emitting this verdict; the interpreter acts on it (the merge gate).
    result:
      schema:
        type: object
        properties:
          verdict: { type: string, enum: [pass, fail] }
          risk: { type: string, enum: [low, medium, high] }
          human_required: { type: boolean }
          summary: { type: string }
          findings: { type: array, items: { type: string } }
        required: [verdict, risk, human_required, summary, findings]
    config:
      workflowFile: public-agent-review.yml
      prepare: scripts/prepare-review.ts
      interpreter: scripts/interpret-review.ts
      persistCredentials: false
      timeout: 20
      # checks+statuses:read so the interpreter's CI gate can SEE the `ci` commit status. Bot-opened PRs
      # don't fire pull_request CI (anti-recursion), so CI is dispatched via workflow_dispatch and reports a
      # commit STATUS (not a PR check-run) — invisible without statuses:read, which falsely blocks the gate.
      permissions: { checks: read, statuses: read }
      concurrency: public-agent-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
      env:
        PUBLIC_AGENT_MAX_CI_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_CI_RETRIES || '2' }}
        PUBLIC_AGENT_MAX_REVIEW_RETRIES: ${{ vars.PUBLIC_AGENT_MAX_REVIEW_RETRIES || '2' }}
        PUBLIC_AGENT_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_TRIAGE_MODEL || 'deepseek/deepseek-v4-flash' }}
        PUBLIC_AGENT_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_REVIEW_PROVIDER || 'anthropic' }}
        PUBLIC_AGENT_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_REVIEW_MAX_USD_CENTS || '50' }}

  # Deterministic planner: reconciles roadmap.yml against the planner-owned roadmap issues.
  planner:
    behavior: scripts/agent-planner.ts
    capabilities: [tasks:converse, tasks:author]
    triggers:
      - cron: "17 6 * * *"
    config:
      workflowFile: open-autonomy-planner.yml
      timeout: 15

  # NOTE: upgrading an installation is NOT an autonomous agent — it can touch .github/workflows (a
  # human_required path the CI token cannot push). It ships as a maintainer-run local command,
  # scripts/open-autonomy-upgrade-cli.ts (vendored into every installation). See docs.

  # Deterministic strategist: gathers research signals, synthesizes a roadmap proposal PR, hands off to
  # strategy review. Proposes; never merges.
  strategist:
    behavior: scripts/agent-strategist.ts
    capabilities: [code:propose, agent:launch]
    triggers:
      - cron: "23 7 * * 1"
    config:
      workflowFile: open-autonomy-strategist.yml
      model: true
      timeout: 25
      env:
        PUBLIC_AGENT_STRATEGIST_MODEL: ${{ vars.PUBLIC_AGENT_STRATEGIST_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'deepseek/deepseek-v4-flash' }}
        PUBLIC_AGENT_STRATEGIST_PROVIDER: ${{ vars.PUBLIC_AGENT_STRATEGIST_PROVIDER || 'anthropic' }}
        PUBLIC_AGENT_STRATEGIST_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_STRATEGIST_MAX_USD_CENTS || '100' }}
        PUBLIC_AGENT_STRATEGIST_MAX_ITEMS: ${{ vars.PUBLIC_AGENT_STRATEGIST_MAX_ITEMS || '3' }}

  # Strategy reviewer: a skill agent that JUDGES a strategist roadmap proposal against the merit rubric +
  # constitution (emits a typed verdict), then a thin interpreter runs the deterministic governance guard
  # and, on a clean pass, promotes + checks + merges. A maintainer "/agent ratify" overrides the verdict
  # (human-in-the-loop) but not the guard. Needs statuses:write to report "ci" on a GITHUB_TOKEN-authored
  # proposal branch.
  strategy_reviewer:
    behavior: strategy-reviewer
    capabilities: [tasks:converse, code:propose]
    triggers:
      - event: issue_comment
        config: { types: [created] }
        params:
          TARGET_REF: subject.ref
          SUBJECT_TEXT: subject.text
          ACTOR_ROLE: subject.actorRole
    result:
      schema:
        type: object
        properties:
          verdict: { type: string, enum: [pass, fail] }
          human_required: { type: boolean }
          summary: { type: string }
          findings: { type: array, items: { type: string } }
        required: [verdict, human_required, summary, findings]
    config:
      workflowFile: public-agent-strategy-review.yml
      prepare: scripts/prepare-strategy-review.ts
      interpreter: scripts/interpret-strategy-review.ts
      timeout: 20
      permissions: { statuses: write }
      env:
        PUBLIC_AGENT_STRATEGY_REVIEW_MODEL: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MODEL || vars.PUBLIC_AGENT_REVIEW_MODEL || vars.PUBLIC_AGENT_PM_MODEL || 'deepseek/deepseek-v4-flash' }}
        PUBLIC_AGENT_STRATEGY_REVIEW_PROVIDER: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_PROVIDER || 'anthropic' }}
        PUBLIC_AGENT_STRATEGY_REVIEW_MAX_USD_CENTS: ${{ vars.PUBLIC_AGENT_STRATEGY_REVIEW_MAX_USD_CENTS || '50' }}

policy:
  maxConcurrent: 5
  box:
    autonomy:
      max_open_agent_prs: 5
      max_develop_attempts: 2
      max_ci_retries: 2
      max_review_retries: 2
      stale_needs_info_minutes: 10080
      require_visible_pm_status: true
      require_decision_records: true
      require_acceptance_evidence: true
    risk:
      human_required_paths:
        - .github/workflows/**
        - .open-autonomy/autonomy.yml
        - docs/CONSTITUTION.md
        - .codex/skills/**
        - .claude/skills/**
        - services/**/wrangler.toml
      human_required_topics: [auth, secrets, billing, deployment, destructive data migration, dependency trust]
    merge:
      require_ci: true
      require_low_risk_review: true
      require_current_head_sha: true
      maintainer_block_labels: [do-not-merge, human-required, agent-blocked]
    planner:
      enabled: true
      issue_origin_label_prefix: "origin:"
      phase_label_prefix: "roadmap:"
      priority_labels: { high: priority:high, medium: priority:medium, low: priority:low }

# Repo-owned + substrate-infra files carried verbatim (NOT agents): repo CI, the model-proxy admin
# control plane, the governance report and preflight jobs, issue templates, control docs, rubrics.
resources:
  - .github/ISSUE_TEMPLATE/bug_report.yml
  - .github/ISSUE_TEMPLATE/public_agent_session.yml
  - .github/workflows/ci.yml
  - .github/workflows/open-autonomy-governance-report.yml
  - .github/workflows/open-autonomy-preflight.yml
  - .gitignore
  - .open-autonomy/review-rubric.yml
  - .open-autonomy/roadmap.yml
  - .open-autonomy/strategist-sources.json
  - .open-autonomy/strategy-rubric.yml
  - .open-autonomy/version.json
  - AGENTS.md
  - CHANGELOG.md
  - README.md
  - VERSION
  - bun.lock
  - docs/ARCHITECTURE.md
  - docs/CONSTITUTION.md
  - docs/PROJECT.md
  - docs/ROADMAP.md
  - docs/standards/code.md
  - docs/standards/docs.md
  - docs/standards/security.md
  - docs/standards/tests.md
  - package.json
  # self-driving's OWN agents + their deterministic libraries. These are PROFILE content, not substrate
  # runtime — they live in profiles/self-driving/scripts/ and ship only with this profile (the github
  # mirror carries only the generic runtime). The `behavior: scripts/agent-*.ts` entries above resolve to
  # the first five; the rest are their import closure. A different profile (e.g. simple-sdlc) ships none.
  - scripts/agent-pm.ts
  - scripts/prepare-review.ts
  - scripts/interpret-review.ts
  - scripts/agent-planner.ts
  - scripts/agent-strategist.ts
  - scripts/prepare-strategy-review.ts
  - scripts/interpret-strategy-review.ts
  - scripts/public-agent-pm.ts
  - scripts/public-agent-dispatcher.ts
  - scripts/public-agent-review.ts
  - scripts/public-agent-merge-gate.ts
  - scripts/public-agent-ci.ts
  - scripts/public-agent-target.ts
  - scripts/public-agent-planner.ts
  - scripts/public-agent-strategist.ts
  - scripts/public-agent-strategy-ratify.ts
  - scripts/public-agent-strategy-review.ts
  - scripts/public-agent-context.ts
  - scripts/public-agent-control.ts
  - scripts/public-agent-control-files.ts
  - scripts/public-agent-command.ts
  - scripts/public-agent-policy.ts
  - scripts/public-agent-loop-budget.ts
  - scripts/public-agent-decision-index.ts
  - scripts/open-autonomy-config.ts
  - scripts/open-autonomy-preflight.ts
  - scripts/open-autonomy-governance-report.ts
  - scripts/open-autonomy-upgrade-cli.ts
