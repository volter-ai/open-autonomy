# Emitted by substrate-github. Baselines the guarded patterns in the agent workflows the engine
# emits (pull_request_target gated by an author_association allowlist; github.run_id/token expansions —
# all GitHub-controlled, not attacker input). A NEW high finding of any other class still fails the gate.
rules:
  dangerous-triggers:
    ignore:
      - draft.yml
      - develop.yml
      - pm.yml
      - reviewer.yml
      - planner.yml
      - strategist.yml
      - strategy_reviewer.yml
      - audit.yml
  template-injection:
    ignore:
      - draft.yml
      - develop.yml
      - pm.yml
      - reviewer.yml
      - planner.yml
      - strategist.yml
      - strategy_reviewer.yml
      - audit.yml
