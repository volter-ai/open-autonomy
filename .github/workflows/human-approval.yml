name: human-approval
# The ADDITIONAL human-review gate. Posts a `human-approval` commit status: auto-success for routine agent PRs,
# success only on exact-head maintainer authorization for PRs in human-required scope. AI review
# (agent-review) is always required separately; this adds the human sign-off for sensitive changes. Deterministic
# (a security boundary), not a model decision. Re-evaluated on PR changes, reviews, and approval comments.
on:
  # zizmor: ignore[dangerous-triggers] — pull_request_target is required for the write token; the gate
  # reads PR metadata via the API and checks out BASE (trusted main), never PR head. Documented + reviewed.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed, edited]
  # A maintainer may authorize an exact head even when GitHub refuses a native self-review because the
  # agent proposed through that maintainer's identity. Created/edited/deleted all re-evaluate the durable
  # comment set, so changing or removing the command revokes it.
  issue_comment:
    types: [created, edited, deleted]
  # Bot-opened PRs don't fire pull_request_target (GITHUB_TOKEN anti-recursion), so the proposer effect
  # dispatches this explicitly — same as it dispatches ci + agent-review — to post the initial status.
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to evaluate"
        required: true
        type: string

# Least privilege: post the status, comment the engage note, read the repo. No contents:write — it cannot merge.
permissions:
  contents: read
  statuses: write
  pull-requests: write
  # The gate reads the LABELS of a PR's linked issues (the agent-develop-only scope). Without issues:read
  # that lookup fails — live-proven on the testbed (BL-5 dev/03): every develop-only PR auto-passed. Both
  # layers are fixed: this grant, and the fail-closed lookup in human-approval-gate.ts.
  issues: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: human-approval-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr }}
  cancel-in-progress: true

jobs:
  human-approval:
    # Ignore ordinary new comments and all issue-only comments. Edits/deletes must re-evaluate even when the
    # new body is no longer an approval command, otherwise an edited-away authorization would stay green.
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request &&
       (github.event.action != 'created' || startsWith(github.event.comment.body, '/agent approve ')))
    runs-on: ubuntu-latest
    steps:
      # Check out the BASE (trusted main) for the gate script — NEVER the PR head. The gate reads PR metadata
      # via the API only; no untrusted PR code is executed.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Evaluate human-approval gate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr }}
          # Who to engage when a PR parks in human-required scope (assign + request-review → GitHub notifies
          # them). Comma/space-separated GitHub logins; falls back to the repo owner when unset.
          MAINTAINERS: ${{ vars.PUBLIC_AGENT_MAINTAINERS }}
        run: bun scripts/human-approval-gate.ts
