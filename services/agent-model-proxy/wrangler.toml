name = "volter-agent-model-proxy"
main = "src/index.ts"
compatibility_date = "2026-06-15"

# Keep the default *.workers.dev URL live (the proxy's known endpoint). The public
# open-autonomy.org custom domain is attached separately in the Cloudflare dashboard.
workers_dev = true

[vars]
DEFAULT_MAX_USD_CENTS = "500"
DEFAULT_MAX_REQUESTS = "200"
DEFAULT_EXPIRES_SECONDS = "7200"
MAX_BODY_BYTES = "1048576"
MODEL_PRICES_JSON = "{}"
MAX_RUN_USD_CENTS = "500"
MAX_RUN_REQUESTS = "200"
MAX_ACTIVE_RUNS_GLOBAL = "24"
MAX_ACTIVE_RUNS_PER_REPO = "12"
MAX_ACTIVE_RUNS_PER_ACTOR = "12"
# Reserved lane for trusted, self-scheduled cron/system agents (pm/planner/strategist). Separate from
# the user/event caps above so a user-triggered leak can never starve the heartbeat — and bounded so a
# runaway cron can't fork-bomb.
MAX_ACTIVE_RUNS_SYSTEM = "4"
MAX_RUNS_PER_REPO_PER_DAY = "5000"
MAX_RUNS_PER_ACTOR_PER_DAY = "5000"
MAX_RUNS_PER_ISSUE_PER_DAY = "200"
MAX_GLOBAL_DAILY_USD_CENTS = "5000"
# Account-balance hard-stop. The funding tree is bootstrapped (scripts/fund-bootstrap.ts: volter root
# funds open-autonomy, which funds its testbeds), so enforcement is ON — a project's agent spend is
# hard-stopped on its own balance, and a run won't start for an unfunded project.
ENFORCE_ACCOUNT_BALANCE = "true"
DEFAULT_FUNDING_ACCOUNT = "volter-ai/open-autonomy"
DEFAULT_SPONSOR_ACCOUNT = "volter-ai/open-autonomy"
GITHUB_OIDC_AUDIENCE = "volter-agent-model-proxy"
GITHUB_OIDC_ALLOWED_WORKFLOW = "volter-ai/open-autonomy/.github/workflows/public-agent.yml@,volter-ai/open-autonomy-testbed/.github/workflows/public-agent.yml@,volter-ai/open-autonomy-self-driving-testbed/.github/workflows/public-agent.yml@,volter-test-fixtures/*"
# Org health monitor (detect + surface, #66): an org silent past SILENCE is "down"; past DEAD it's
# "dormant" (long idle, not an outage). GET /health classifies by these — it surfaces the signal; notifying
# a human is the substrate runner's engage avenue, not the watcher's.
HEALTH_SILENCE_MINUTES = "180"
HEALTH_DEAD_MINUTES = "10080"

# Monthly sponsorship accrual (credits active recurring sponsors into the pool; idempotent per month).
# (The org health monitor is pull-only via GET /health — there is no sweep cron; only the monthly accrual runs here.)
[triggers]
crons = ["0 6 1 * *"]

[[durable_objects.bindings]]
name = "RUNS"
class_name = "RunBudget"

[[durable_objects.bindings]]
name = "LIMITS"
class_name = "LimitLedger"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RunBudget", "LimitLedger"]
