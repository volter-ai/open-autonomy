name: smoke
# The world-smoke gate (scripts/world-smoke.mjs) — proves the WHOLE evidence environment
# end-to-end (sealed world boot+doctor, the egress negative test, seed+idempotency, a
# vendor mock-coverage probe against whatever external services the app's world.config.json
# twins, a real headless Playwright capture, and the evidence-adapter dry-run) BEFORE any
# development is attempted. See profiles/simple-gh-sdlc-visual/skills/develop/SKILL.md
# §Smoke — this workflow is the CI-side twin of that local, blocking precondition. The probe
# itself is adopter-specific (see scripts/world-smoke.mjs's own header) — this workflow only
# runs whatever `npm run smoke` resolves to for the adopting app.
#
# Deliberately a SEPARATE check from `ci` (required: typecheck + ztrack check, seconds) and
# `security` (zizmor + supply-chain). This one boots a real sealed world (openssl-backed TLS
# redirect proxy, three services) AND a headless Chromium — heavier and, on a shared CI
# runner, more prone to environmental flakiness than a Node CI could ever cause. Bundling it
# into `ci` would mean a one-line docs PR waits on a world boot; keeping it a separate,
# non-required check keeps `ci`/`security` fast while still gating the thing that matters
# whenever the world/app/visual-edit surface actually changes.
#
# HONESTY NOTE on sealed mode in CI: `volter-world up --mode sealed` needs `openssl` on PATH
# to mint its session CA for the ambient TLS redirect proxy (see
# node_modules/@volter/twin-world/src/redirect-proxy.ts); it does NOT need docker or tmux
# (verified by reading the runtime — the doctor-prereqs docker check is for a different,
# unrelated CLI feature). GitHub's ubuntu-latest image ships openssl standard, and this
# workflow's own `npm run smoke` run below IS the proof — read its logs for the real,
# current answer rather than trusting this comment as it ages.
on:
  pull_request:
    paths:
      - "world.config.json"
      - "apps/**"
      - "apps/web/.visual-edit/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/smoke.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install
        run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: World smoke gate
        run: npm run smoke
