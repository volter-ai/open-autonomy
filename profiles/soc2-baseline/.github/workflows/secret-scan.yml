name: secret-scan
# C12 no-signup, no-GHAS blocking secret scan. repository_dispatch fixes the workflow revision to the
# default branch; only the credentialless analysis job sees candidate bytes.
on:
  repository_dispatch:
    types: [open-autonomy-secret-scan]
permissions:
  contents: read
jobs:
  publish-pending:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Bind exact PR head and post pending
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state=pending -f context=secret-scan -f description="scanning for committed secrets (gitleaks)" >/dev/null

  scan:
    needs: publish-pending
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Check out candidate without retaining a repository credential
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.client_payload.sha }}
          path: candidate
          persist-credentials: false
      - name: Gitleaks scan without a status credential
        run: |
          url="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[]|select(.name|test("linux_x64.tar.gz$"))|.browser_download_url' | head -1)"
          test -n "$url"
          curl -fsSL "$url" | tar xz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source candidate --no-git --redact --no-banner

  publish-result:
    needs: [publish-pending, scan]
    if: ${{ always() && needs.publish-pending.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Re-bind exact PR head and publish immutable scan result
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
          SCAN_RESULT: ${{ needs.scan.result }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          state=failure; desc="gitleaks found a committed secret or failed"
          if [ "$SCAN_RESULT" = success ]; then
            state=success; desc="no committed secrets detected (gitleaks)"
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" -f context=secret-scan -f description="$desc" >/dev/null
          test "$state" = success
