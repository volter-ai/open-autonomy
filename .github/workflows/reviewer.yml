name: reviewer
on:
  workflow_dispatch:
    inputs:
      issue_number: { description: "issue/PR number to act on", required: false, type: string }
  issue_comment:
    types: [created]
  pull_request_target:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
permissions: {}
concurrency:
  group: >-
    reviewer-${{ github.event.issue.number || inputs.issue_number }}${{
    (startsWith(github.event.comment.body || '', '/agent cancel') || startsWith(github.event.comment.body || '', '/agent pause') || startsWith(github.event.comment.body || '', '/agent resume') || startsWith(github.event.comment.body || '', '/agent status') || startsWith(github.event.comment.body || '', '/agent retry')) && '-control' || '' }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  control:
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ') && !startsWith(github.event.comment.body, '/agent reviewer') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, actions: write }
    env:
      GH_TOKEN: ${{ github.token }}
      CONTROL_WORKFLOW: reviewer.yml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: node .github/agent-control.mjs
  setup:
    if: vars.PUBLIC_AGENT_REPO_PAUSED != 'true' && ((github.event_name != 'issue_comment' && github.event_name != 'pull_request_target' && github.event_name != 'issues') || (github.event_name == 'issues' && github.event.action == 'labeled') || (github.event_name == 'pull_request_target' && (github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))) || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent reviewer') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)))
    runs-on: ubuntu-latest
    outputs:
      review_pr: ${{ steps.review_target.outputs.pr }}
      review_sha: ${{ steps.review_target.outputs.sha }}
    permissions: { contents: read, issues: read, pull-requests: read }
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
    steps:
      - name: Lock down egress (block token exfiltration from untrusted-derived work)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            agent.api.stepsecurity.io:443
            prod.app-api.stepsecurity.io:443
            ${{ vars.PUBLIC_AGENT_PROXY_HOST || 'volter-agent-model-proxy.aaron-0ed.workers.dev' }}:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Bind review target
        id: review_target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref="${TARGET_REF}"
          pr="$(gh pr view "$ref" --json number --jq .number)"
          sha="$(gh pr view "$ref" --json headRefOid --jq .headRefOid)"
          test -n "$pr" && test -n "$sha"
          echo "pr=$pr" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - name: Provide subject
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${TARGET_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh api "repos/${{ github.repository }}/issues/$ref" --jq '{number,title,body,user:{login:.user.login},labels:[.labels[].name]}' > .agent-run/issue.json
  reviewer:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { contents: read, issues: read, pull-requests: read, id-token: write }
    env:
      MODEL_PROXY_URL: ${{ vars.MODEL_PROXY_URL }}
      MODEL_PROXY_OIDC_AUDIENCE: ${{ vars.MODEL_PROXY_OIDC_AUDIENCE || 'volter-agent-model-proxy' }}
      PUBLIC_AGENT_MODEL: ${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}
      PUBLIC_AGENT_CITED_VERSION: ${{ vars.PUBLIC_AGENT_CLAUDE_CODE_VERSION }}
      GH_TOKEN: ${{ github.token }}
      MAINTAINERS: ${{ vars.PUBLIC_AGENT_MAINTAINERS }}
      TARGET_REF: ${{ github.event.issue.number || github.event.inputs.issue_number || github.event.pull_request.number }}
      SUBJECT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
      ACTOR_ROLE: ${{ github.event.comment.author_association }}
    steps:
      - name: Lock down egress (block token exfiltration from untrusted-derived work)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            agent.api.stepsecurity.io:443
            prod.app-api.stepsecurity.io:443
            ${{ vars.PUBLIC_AGENT_PROXY_HOST || 'volter-agent-model-proxy.aaron-0ed.workers.dev' }}:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - name: Provide subject
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .agent-run
          ref="${TARGET_REF}"
          if [ -z "$ref" ]; then echo "no subject.ref forwarded by the trigger"; exit 1; fi
          gh api "repos/${{ github.repository }}/issues/$ref" --jq '{number,title,body,user:{login:.user.login},labels:[.labels[].name]}' > .agent-run/issue.json
      - name: Wait for required checks before model review
        id: review_prerequisites
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/review-prerequisites.ts --pr "${{ needs.setup.outputs.review_pr }}" --sha "${{ needs.setup.outputs.review_sha }}" --result .agent-run/artifacts/result.json --github-output "$GITHUB_OUTPUT" --parallel human-approval
      - name: Mint bounded model token
        if: steps.review_prerequisites.outputs.run_model == 'true'
        run: bun scripts/model-proxy-mint.ts --run-id "ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }}" --models "${{ vars.PUBLIC_AGENT_MODEL || 'deepseek/deepseek-v4-flash' }}" --max-usd-cents "${{ vars.PUBLIC_AGENT_MAX_USD_CENTS || '200' }}" --max-requests "${{ vars.PUBLIC_AGENT_MAX_REQUESTS || '250' }}" --issue .agent-run/issue.json
      - name: install Claude Code CLI
        if: steps.review_prerequisites.outputs.run_model == 'true'
        run: npm install -g "@anthropic-ai/claude-code@${PUBLIC_AGENT_CITED_VERSION:-latest}" && claude --version
      - name: Exchange OIDC for the bounded token
        if: steps.review_prerequisites.outputs.run_model == 'true'
        run: bun scripts/model-proxy-exchange.ts --run-id "ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }}" --audience "$MODEL_PROXY_OIDC_AUDIENCE"
      - name: Run agent (Claude Code + skill)
        if: steps.review_prerequisites.outputs.run_model == 'true'
        env:
          OSS_AGENT_TASK_DIR: .agent-run
          OSS_AGENT_ISSUE_PATH: .agent-run/issue.json
          OSS_AGENT_RESULT_PATH: .agent-run/artifacts/result.json
          OSS_AGENT_RESULT_SCHEMA_PATH: .agent-run/result-schema.json
        run: |
          cat > .agent-run/result-schema.json <<'OPEN_AUTONOMY_RESULT_SCHEMA'
          {"$id":"open-autonomy.review.v1","type":"object","additionalProperties":false,"required":["schema","pr","headSha","verdict","outcome","summary","findings","humanApprovalRequired"],"properties":{"schema":{"const":"open-autonomy.review.v1"},"pr":{"type":"integer","minimum":1},"headSha":{"type":"string","pattern":"^[0-9a-fA-F]{40}$"},"verdict":{"enum":["success","failure","skip"]},"outcome":{"enum":["approved","changes-requested","human-required","not-applicable"]},"summary":{"type":"string","minLength":1,"maxLength":1000},"findings":{"type":"array","maxItems":50,"items":{"type":"string","maxLength":2000}},"humanApprovalRequired":{"type":"boolean"},"humanTask":{"type":"object","additionalProperties":false,"required":["ask","assignTo","completion"],"properties":{"ask":{"type":"string","minLength":1,"maxLength":2000},"assignTo":{"type":"string","minLength":1,"maxLength":200},"completion":{"type":"object","additionalProperties":false,"required":["ac","via","check"],"properties":{"ac":{"type":"string","minLength":1,"maxLength":2000},"via":{"enum":["review","label","artifact","command"]},"check":{"enum":["deterministic","judge","both"]}}}}}},"allOf":[{"if":{"properties":{"verdict":{"const":"success"}},"required":["verdict"]},"then":{"properties":{"outcome":{"const":"approved"}}}},{"if":{"properties":{"verdict":{"const":"failure"}},"required":["verdict"]},"then":{"properties":{"outcome":{"enum":["changes-requested","human-required"]},"humanApprovalRequired":{"const":false}}}},{"if":{"properties":{"verdict":{"const":"skip"}},"required":["verdict"]},"then":{"properties":{"outcome":{"const":"not-applicable"},"humanApprovalRequired":{"const":false}}}},{"if":{"properties":{"outcome":{"const":"human-required"}},"required":["outcome"]},"then":{"required":["humanTask"]},"else":{"not":{"required":["humanTask"]}}}]}
          OPEN_AUTONOMY_RESULT_SCHEMA
          bun scripts/claude-agent-run.ts --skill .codex/skills/reviewer/SKILL.md --run-id "ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }}"; rc=$?; bun scripts/agent-visual-verify.ts || true; echo "::group::agent transcript (ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }})"; cat .agent-run/artifacts/transcript.md 2>/dev/null || true; echo "::endgroup::"; exit $rc
      - name: Save the agent run result (durable transcript artifact)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-run-reviewer
          path: .agent-run/
          include-hidden-files: true
          retention-days: 30
          if-no-files-found: ignore
      - name: Release the run slot (revoke minted token)
        if: always() && steps.review_prerequisites.outputs.run_model == 'true'
        run: |
          for i in 1 2 3 4 5; do bun scripts/model-proxy-revoke.ts --run-id "ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }}" && exit 0 || sleep 3; done
          echo "::warning::run-slot revoke failed after retries for ir-reviewer-${{ github.run_id }}-${{ github.run_attempt }}; slot will auto-reap at token TTL"
  review_effect:
    needs: [setup, reviewer]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, pull-requests: write, statuses: write, actions: write }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: agent-run-reviewer
          path: .agent-finalize
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Finalize the bound review result (fail closed)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPECTED_PR: ${{ needs.setup.outputs.review_pr }}
          EXPECTED_SHA: ${{ needs.setup.outputs.review_sha }}
          REVIEWER_JOB_RESULT: ${{ needs['reviewer'].result }}
          REVIEW_RESULT_PATH: .agent-finalize/artifacts/result.json
          HUMAN_APPROVAL_WORKFLOW: human-approval.yml
        run: bun scripts/finalize-agent-review.ts
