schema: open-autonomy.review-rubric.v1
criteria:
  - id: scope
    title: Scope control
    pass: Change matches the issue, roadmap item, and maintainer comments.
    fail: Change includes unrelated refactors, hidden behavior, or broad rewrites.
  - id: safety
    title: Safety and policy
    pass: Risky paths/topics are absent or clearly escalated.
    fail: Workflow, auth, secret, billing, deployment, or trust changes lack human review.
  - id: tests
    title: Verification
    pass: Tests or deterministic fixtures cover the changed behavior.
    fail: User-facing or gate behavior changes without relevant verification.
  - id: evidence
    title: Evidence quality
    pass: Decisions, comments, and artifacts explain what happened and why.
    fail: The agent silently skips, retries indefinitely, or leaves ambiguous status.
  - id: portability
    title: OSS portability
    pass: Behavior works in a newly scaffolded repository with documented setup.
    fail: Behavior depends on private mothership-only code or uncommitted local state.
  - id: architecture
    title: Architecture invariants (the immune system)
    # Enforce the project's declared architecture invariants. This criterion is FASTIDIOUS by construction:
    # enumerate, do not sample. Read .open-autonomy/architecture-invariants.yml and, for EACH invariant whose
    # `review` scope the diff touches, produce a checked-off verdict line with cited file:line evidence — never
    # a holistic vibe. The invariants are human-owned (the optimizer may not move its own stick).
    pass: Every applicable invariant is adhered to, each with a cited per-invariant verdict; none is violated or amended.
    fail: A change accidentally VIOLATES an invariant — post failure naming the invariant id + the offending line (rework it back inside the boundary).
    human_required: A change AMENDS an invariant (an intentional architecture change), edits architecture-invariants.yml, or its adherence is genuinely AMBIGUOUS — a maintainer rules; the loop may not re-architect itself. When you believe a NEW invariant is warranted, PROPOSE it (do not self-add) for maintainer ratification.
verdicts:
  pass_low:
    requires:
      - all applicable criteria pass
      - CI passes
      - no human-required policy trigger
  fail:
    use_when: A finding needs another developer attempt. Post agent-review=failure with the specific
      findings; the PM decides from the issue/PR history whether to re-dispatch the developer with that
      context or escalate. You do NOT trigger a retry yourself — there is no auto-retry loop.
  human_required:
    use_when: Risk is high, policy says so, or intent is ambiguous.
