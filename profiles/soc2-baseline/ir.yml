# soc2-baseline — simple-gh-sdlc + a DETERMINISTIC SOC 2 control layer. Same 4-agent PR loop
# (pm/draft/develop/reviewer) and the same merge boundary (code:propose ≠ code:review, native auto-merge),
# but every install ships the SOC 2-relevant controls baked in as deterministic CI/config/branch-protection/
# policy files — NOT as agent behavior. The agents run the SDLC; the controls are enforced by the substrate
# and GitHub, so an adopter repo is "Type-I-ready by design". See docs/SOC2-BASELINE-PROFILE.md for the full
# control map (C1–C20), the can/can't-be-a-default split, and the honest ceiling (Type II still needs the org
# program + the observation window). One unit: an agent = behavior + capabilities + triggers(+params)(+review).
schema: autonomy.ir.v1
# Same runner ⟂ code host independence as simple-gh-sdlc: github code host, either runner.
targets: [gh-actions, local]
codeHost: github

# The agents are IDENTICAL to simple-gh-sdlc — the SDLC loop is unchanged; SOC 2 is a control layer over it,
# not a different team. (Behavior skills are per-profile and carried verbatim.)
agents:
  # The only dispatcher. Sweeps the ztrack board on a tick, enforces WIP, and LAUNCHES the next eligible
  # worker (draft/develop) through the Runner. Review happens on the PR, not by a launched worker.
  pm:
    behavior: pm
    capabilities: [tasks:converse, agent:launch, agent:list]
    triggers:
      - cron: "*/15 * * * *"

  # Turns an untriaged request into a verifiable Ready issue (sources + 1-3 ACs + evidence scaffold).
  draft:
    behavior: draft
    capabilities: [tasks:author, tasks:converse]
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # Implements one Ready issue with evidence and pushes its branch; the substrate opens an auto-merging
  # PR. Its proposals are reviewed by `reviewer` (the merge boundary). Holds code:propose, never code:review.
  develop:
    behavior: develop
    capabilities: [code:propose, tasks:converse]
    review: reviewer
    triggers:
      - dispatch: true
        params: { ZTRACK_ISSUE: subject.ref }

  # The independent GitHub reviewer verifies the developer's PR and returns a bound result; the trusted
  # runner effect posts `agent-review` last. Holds NO contents:write, so it cannot merge; native auto-merge lands the
  # PR once the required checks are green (docs/SPEC.md#capabilities — the merge boundary).
  reviewer:
    behavior: reviewer
    capabilities: [code:review, tasks:converse]
    result: { schema: open-autonomy.review.v1 }
    triggers:
      - event: issue_comment
        config: { types: [created] }
        params:
          TARGET_REF: subject.ref
          SUBJECT_TEXT: subject.text
          ACTOR_ROLE: subject.actorRole
      - event: pull_request_target
        config: { types: [opened, synchronize, reopened, ready_for_review] }
    timeout: 20

  # W12 — the executive ASSISTANT (drafter). On a `soc2-control-due` issue (opened by the cadence watchdog),
  # it runs the control's PLAYBOOK, fills the evidence, and opens the gated PR with a one-screen decision brief
  # for the executive to read + sign. code:propose (never code:review/merge). Reviewed by `reviewer` (the
  # required agent-review) AND second-checked by `compliance-verifier` (advisory). SELF-FILTERS: an `issues`
  # `labeled` event fires on ANY label, so the skill no-ops unless the applied label is `soc2-control-due`
  # (W12.2 — the spec-allowed self-no-op instead of an emit-level label guard).
  compliance-drafter:
    behavior: compliance-drafter
    capabilities: [code:propose, tasks:converse]
    review: reviewer
    triggers:
      - event: issues
        config: { types: [labeled] }
        params:
          TARGET_REF: subject.ref
    timeout: 20

  # W12 — the EA's second set of eyes (verifier). On the drafter's compliance PR it checks the draft for
  # missing/wrong + that evidence pointers resolve, and posts an ADVISORY `compliance-check` status (NOT the
  # required `agent-review` — that stays the generic reviewer's, W12.4). An assistant pre-check, NOT an
  # independent SoD control. SELF-FILTERS to compliance-evidence PRs (touching compliance/evidence-ledger.yml).
  compliance-verifier:
    behavior: compliance-verifier
    capabilities: [code:review, tasks:converse]
    triggers:
      - event: pull_request_target
        config: { types: [opened, synchronize, reopened, ready_for_review] }
    timeout: 20

policy:
  maxConcurrent: 2   # the WIP ceiling: at most one in-progress + one in-review at a time
  box:
    # gh-actions runner config. soc2-baseline declares the EXTRA blocking required-check gates the propose
    # effect must dispatch on a bot PR (a bot PR fires no pull_request, so an undispatched required check would
    # wedge — the proposer kicks each so its status posts on the head SHA). These make `supply-chain` + `code-scan`
    # (Semgrep) + `secret-scan` (gitleaks) blocking on the agent-PR path. model/proxy/bot fall back to defaults.
    gh-actions:
      # No-signup BLOCKING gates dispatched on bot PRs. code-scan (Semgrep OSS) + secret-scan (gitleaks) are the
      # zero-account, no-GHAS enforcers for C8/C12 — they work on PRIVATE repos where CodeQL/GitHub secret
      # scanning would need GHAS. codeql-gate stays for richer SAST where GHAS/public is available.
      propose_dispatch_checks: [supply-chain.yml, code-scan.yml, secret-scan.yml, codeql-gate.yml]
      # W12.4 — the advisory compliance-verifier is a SECOND agent-reviewer; a bot PR fires no
      # pull_request_target, so the proposer kicks it with issue_number=<pr> (the agent-reviewer dispatch
      # shape, not the gate sha/pr shape) so it runs autonomously on the drafter's PR and posts compliance-check.
      propose_dispatch_reviews: [compliance-verifier.yml]
      # C6 — re-create the agent commit via GitHub's git/commits API so the job's GITHUB_TOKEN
      # (github-actions[bot]) signs it "Verified" (keyless). provision.json requires signed commits via a ruleset
      # (which blocks native auto-merge → operator-merges; see README C6). A plain `git commit` is unsigned;
      # a PAT-created API commit is unsigned too — only
      # the Actions bot / a GitHub App identity gets GitHub's signature.
      commit_signing: verified-api
      # No-account egress lockdown that ENFORCES on PRIVATE repos (the common adopter case) where the free
      # harden-runner block only audits. The SUBSTRATE ships both halves when this is set: the job step and
      # scripts/egress-guard.sh itself — a self-managed iptables allowlist (GitHub /meta ranges + the
      # agent's hosts) with default-deny. Runner security, so the implementation is substrate-owned; this
      # profile carries no copy (any flag-setting profile gets a working install).
      private_egress_guard: true
    # (the WIP ceiling — one develop in flight, one in review — is the PM doctrine in standards/workflow.md;
    # policy.maxConcurrent is the enforced runner cap. No component reads a wip.* key.)
    tracker:
      # bin/autonomy-compile.ts's local-runner "next steps" print resolves the ztrack preset name from
      # THIS key first, falling back to the profile directory's basename only if it's absent. FORKING this
      # profile? Keep this key — renaming the directory without it silently selects a nonexistent preset
      # (BL-29); the CLI warns loudly if the basename fallback doesn't match a bundled name, but an
      # explicit declaration survives the rename outright.
      ztrackPreset: soc2-baseline
    autonomy:
      max_develop_attempts: 2
    # The human-seam engage config (docs/SPEC.md#handoffs). soc2-baseline ships the human-approval gate
    # (.github/workflows/human-approval.yml) as a required check, so a PR in human-required scope parks for a
    # maintainer's per-head-SHA Approve — the SOC 2 change-management control (CC8). `maintainers_var` names
    # the repo variable (comma-separated logins) of who to engage; falls back to the repo owner if unset.
    human:
      maintainers_var: PUBLIC_AGENT_MAINTAINERS
      sla_minutes: 1440
    risk:
      # The OA harness is human-required (an agent must never auto-merge a change to the runner/loop/skills/
      # manifest), PLUS the SOC 2 governance surface: the compliance/ policy+evidence tree and the security
      # workflows are change-managed (no agent rewrites a policy or a control workflow without a maintainer).
      # Listed by name (NOT broad globs) so an adopter's OWN scripts/ product code isn't blocked — every
      # OA-injected file under scripts/ is enumerated; an adopter's files are not. Mirrors standards/risk-and-review.md.
      human_required_paths:
        - .github/workflows/**
        - .codex/skills/**
        - .claude/skills/**
        # Governance files are human-required — but NOT `.open-autonomy/**` broadly: the propose effect injects
        # the run transcript into `.open-autonomy/history/**` on EVERY agent PR, so a broad glob makes the
        # reviewer reject every PR (the loop could never merge). List the governance files explicitly; history
        # is agent evidence, not a human-required change.
        - .open-autonomy/autonomy.yml
        - .open-autonomy/roadmap.yml
        - .open-autonomy/architecture-invariants.yml
        - .open-autonomy/review-rubric.yml
        - .open-autonomy/strategy-rubric.yml
        - .open-autonomy/human-required-paths.json
        - compliance/**                 # SOC 2 policies, risk register, subprocessor list, control matrix — change-managed
        - SECURITY.md
        - provision.json                # the branch-protection / required-checks manifest is a control itself
        - "**/bun.lock"               # merge-dangerous: next bun install executes deps (dependency-trust)
        - package.json
        - scheduler/run.mjs
        - scheduler/schedule.json
        - scripts/prompts/**
        - scripts/agent.ts
        - scripts/agent-propose.ts
        - scripts/agent-visual-verify.ts
        - scripts/autonomy-runner.mjs
        - scripts/check-supply-chain.ts
        - scripts/claude-agent-run.ts
        - scripts/finalize-agent-review.ts
        - scripts/review-result.ts
        - scripts/human-approval-gate.ts
        - scripts/native-approval-adapter.ts
        - scripts/model-proxy-exchange.ts
        - scripts/model-proxy-mint.ts
        - scripts/model-proxy-revoke.ts
        - scripts/rearm-auto-merge.ts
        - scripts/reconcile-merged-issues.ts
        - scripts/run-agent.mjs
        - scripts/runner-defaults.mjs
        - scripts/runner.ts
        - scripts/transcript.ts
        - profiles/**/skills/**
        - .volter/tracker/validation/**

# Code-host + governance files carried verbatim into the installation. The first block is the SHARED SDLC
# standard set (byte-identical to simple-gh-sdlc — check-profiles enforces it). The second block is the
# soc2-baseline-only deterministic compliance layer (workflows + policy/evidence tree). Security WORKFLOWS stay
# derived (upgrade re-pushes improvements); the compliance/ POLICY TREE is install-owned (seed-once — the
# adopter edits it to their org; never clobbered on upgrade). See docs/SOC2-BASELINE-PROFILE.md G2.
resources:
  # --- shared SDLC standard (identical to simple-gh-sdlc) ---
  - .open-autonomy/architecture-invariants.yml
  - .claude/settings.json
  - .codex/hooks.json
  - .github/workflows/merge.yml
  - .github/workflows/security.yml
  - .github/dependabot.yml
  - standards/workflow.md
  - standards/issue-and-evidence.md
  - standards/risk-and-review.md
  # --- SOC 2 control workflows (soc2-baseline-only; codeql + human-approval are byte-identical to self-driving) ---
  - .github/workflows/codeql.yml            # C8  SAST monitoring (semantic static analysis → Security tab)
  - .github/workflows/codeql-gate.yml       # C8  richer SAST gate (dispatched; posts `codeql` status) — NOT in required_checks; code-scan.yml (Semgrep) is the no-GHAS blocker
  - .github/workflows/supply-chain.yml      # C7  supply-chain BLOCKING gate on bot PRs (dispatched; posts `supply-chain` status)
  - .github/workflows/human-approval.yml    # C4  deterministic per-head-SHA maintainer change gate
  - .github/workflows/native-approval.yml   # optional native APPROVE adapter; not a substitute for C4
  - .github/workflows/code-scan.yml         # C8  no-signup SAST gate (Semgrep OSS) — enforces on private, no GHAS
  - .github/workflows/secret-scan.yml       # C12 no-signup secret-scan gate (gitleaks) — enforces on private, no GHAS
  - .github/workflows/dependency-review.yml # C9  PR-time dependency vulnerability review (GHAS)
  - .github/workflows/sbom.yml              # C10 CycloneDX SBOM on push + weekly
  - .github/workflows/evidence-collect.yml  # C16 tamper-evident control-evidence snapshot → compliance-evidence branch
  - .github/workflows/retention.yml         # C14 transcript retention sweep (gated PR — deletions are reviewed)
  - .github/workflows/heartbeat.yml         # C17 fleet liveness watchdog (Availability)
  - .github/workflows/compliance-cadence.yml # W4/W7/W11 cadence watchdog + watcher-of-the-watchdog
  - .github/workflows/soc2-register-check.yml # W8 register drift + structural + currency gate in CI
  # --- SOC 2 policy + evidence tree (install-owned: seed-once, adopter-edited) ---
  - SECURITY.md
  - standards/compliance.md
  # (scripts/egress-guard.sh is NOT here: since 2026-07-06 the substrate emits it with the
  # private_egress_guard step — runner security is substrate-owned, the inverse of the gate-script move)
  - scripts/soc2-register.ts       # W1-W11 the VISIBLE control-register tool (render/verify/check/watchdog)
  # the gate scripts the carried workflows call — shared standards, byte-identical across carrying
  # profiles (docs/CODE_HOST_RESOURCES.md)
  - scripts/rearm-auto-merge.ts        # merge.yml
  - scripts/reconcile-merged-issues.ts # merge.yml
  - scripts/human-approval-gate.ts     # C4 human-approval.yml
  - scripts/native-approval-adapter.ts # optional native-approval.yml
  - scripts/check-supply-chain.ts      # C7 security.yml + supply-chain.yml
  - docs/NATIVE-APPROVAL.md            # optional adapter identity + fail-closed setup contract
  - package.json                   # runnable-install seed (install-owned) — makes `bun install` work so the agents run
  - bun.lock                       # matching lockfile (frozen-lockfile) — merge-dangerous, human-required
  - provision.json
  - compliance/README.md
  - compliance/control-matrix.md
  - compliance/control-register.yml  # W1/W2 the 61-criterion register (source of truth)
  - compliance/control-register.md   # W2 rendered auditor-facing pane (generated; drift-guarded)
  - compliance/evidence-ledger.yml   # W6 per-interval Type-II evidence ledger (source of `last`)
  - compliance/risk-register.md
  - compliance/subprocessors.md
  - compliance/policies/information-security-policy.md
  - compliance/policies/access-control-policy.md
  - compliance/policies/change-management-policy.md
  - compliance/policies/vendor-management-policy.md
  - compliance/policies/data-classification-and-retention-policy.md
  - compliance/policies/encryption-policy.md
  - compliance/policies/incident-response-policy.md
  - compliance/policies/business-continuity-dr-policy.md
  - compliance/policies/secure-sdlc-policy.md
  - compliance/policies/risk-management-policy.md
  - compliance/policies/acceptable-use-policy.md
  - compliance/policies/hr-security-policy.md
  - compliance/policies/privacy-policy.md
  - compliance/ONBOARDING.md
