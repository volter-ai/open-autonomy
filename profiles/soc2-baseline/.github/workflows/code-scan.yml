name: code-scan
# C8 no-signup, no-GHAS blocking static analysis. repository_dispatch fixes the workflow revision to the
# default branch; only the credentialless analysis job sees candidate bytes, and GitHub's job conclusion is
# the sole result consumed by the exact-head status publisher.
on:
  repository_dispatch:
    types: [open-autonomy-code-scan]
permissions:
  contents: read
jobs:
  publish-pending:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Bind exact PR head and post pending
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state=pending -f context=code-scan -f description="static analysis (Semgrep OSS)" >/dev/null

  scan:
    needs: publish-pending
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Check out candidate without retaining a repository credential
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.client_payload.sha }}
          path: candidate
          persist-credentials: false
      - name: Semgrep scan without a status credential
        run: |
          python3 -m pip install --quiet semgrep || pipx install semgrep
          semgrep --quiet --config=p/security-audit --config=p/javascript --config=p/secrets \
            --severity=ERROR --json --output sem.json candidate
          test -f sem.json
          n="$(jq '.results | length' sem.json)"
          if [ "$n" -gt 0 ]; then
            jq -r '.results[] | "  - " + (.check_id) + " @ " + (.path) + ":" + (.start.line|tostring)' sem.json | head -5
            exit 1
          fi

  publish-result:
    needs: [publish-pending, scan]
    if: ${{ always() && needs.publish-pending.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read, statuses: write }
    steps:
      - name: Re-bind exact PR head and publish immutable scan result
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.client_payload.pr }}
          SHA: ${{ github.event.client_payload.sha }}
          SCAN_RESULT: ${{ needs.scan.result }}
        run: |
          actual="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)"
          test "$actual" = "$SHA"
          state=failure; desc="Semgrep found an error-severity finding or failed"
          if [ "$SCAN_RESULT" = success ]; then
            state=success; desc="Semgrep clean (no error-severity findings)"
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" -f context=code-scan -f description="$desc" >/dev/null
          test "$state" = success
