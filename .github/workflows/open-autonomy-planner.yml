name: planner
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}
permissions: { contents: write, id-token: write, pull-requests: write, checks: read, issues: write }
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  planner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - run: bun scripts/agent-planner.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: planner-${{ github.run_id }}
          path: .agent-run
          if-no-files-found: warn
