name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      sha:
        description: "commit SHA to test + post a 'ci' status on"
        required: false
        type: string
      pr:
        description: "PR number (context)"
        required: false
        type: string

permissions:
  contents: read
  statuses: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      # Workflow static analysis is the substrate-emitted security.yml (zizmor), not a per-profile step.
      - id: check
        run: bun run check
      - name: Post ci commit status
        if: ${{ always() && github.event_name == 'workflow_dispatch' && github.event.inputs.sha }}
        # Untrusted/dispatch inputs flow through env (not ${{ }} in run) — no template injection.
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.inputs.sha }}
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          state=success; [ "$OUTCOME" = "success" ] || state=failure
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" -f context="ci" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f description="CI $state"
